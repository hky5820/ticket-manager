<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f4f6fb">
<title>티켓 보관함</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="티켓 보관함">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg-grad:linear-gradient(160deg,#f8fafc 0%,#eef2fb 100%);
    --card:#ffffff; --ink:#1f2637; --ink-soft:#5b6474; --ink-faint:#98a0b3;
    --line:#e9edf5; --accent:#6c8cff; --accent-ink:#4361ee; --accent-soft:#eef2ff;
    --danger:#ff6b7a; --danger-ink:#e5455c; --danger-soft:#fff2f4; --danger-bd:#ffd2d9; --ok:#3ecf8e; --warn:#f5a524;
    --shadow-sm:0 1px 3px rgba(31,46,84,.06);
    --shadow:0 6px 18px -8px rgba(31,46,84,.20), 0 2px 6px -3px rgba(31,46,84,.12);
    --shadow-lg:0 20px 44px -18px rgba(31,46,84,.32);
    --inset:inset 0 1px 0 rgba(255,255,255,.75);
    --glass:rgba(255,255,255,.52);
    --glass2:rgba(255,255,255,.78);
    --glass-bd:rgba(255,255,255,.75);
    --blur:saturate(180%) blur(14px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;
    background:#eef2fb;color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4;min-height:100vh;position:relative}
  body::before{content:"";position:fixed;inset:-12%;z-index:-1;pointer-events:none;
    background:
      radial-gradient(38% 32% at 12% 8%, rgba(124,151,255,.42), transparent 70%),
      radial-gradient(32% 28% at 90% 14%, rgba(255,143,177,.34), transparent 70%),
      radial-gradient(44% 40% at 84% 90%, rgba(77,212,172,.32), transparent 70%),
      radial-gradient(40% 38% at 6% 88%, rgba(176,136,255,.34), transparent 70%),
      linear-gradient(160deg,#f6f8fe,#e9f0fb);}
  .wrap{max-width:680px;margin:0 auto;padding:12px 12px 96px}

  /* top bar */
  .topbar{display:flex;align-items:center;gap:10px;justify-content:space-between;margin-bottom:10px}
  .seg{display:inline-flex;background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--glass-bd);border-radius:12px;padding:3px;box-shadow:var(--shadow-sm),var(--inset)}
  .seg button{border:none;background:transparent;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:.15s}
  .seg button.on{background:#fff;color:var(--accent-ink);box-shadow:var(--shadow-sm)}
  .pill{border:1px solid var(--glass-bd);background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:999px;padding:7px 11px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink-soft);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:5px;white-space:nowrap}
  .pill .dot{width:7px;height:7px;border-radius:99px;background:var(--ink-faint)}
  .pill.on{color:var(--accent-ink);border-color:#d6def8;background:#f4f7ff}
  .pill.on .dot{background:var(--ok)}
  .icon-btn{border:1px solid var(--glass-bd);background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:999px;width:32px;height:32px;flex:0 0 auto;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center}
  .icon-btn.on{background:var(--danger-soft);border-color:var(--danger-bd);color:var(--danger-ink)}

  /* stats strip */
  .stats{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin:2px 2px 10px}
  .stats b{color:var(--ink);font-weight:800}
  .stats .sep{color:var(--ink-faint)}
  .stats .x b{color:var(--warn)}
  #pending{margin-bottom:6px}
  .pend-card{display:flex;align-items:center;gap:8px;background:linear-gradient(145deg,#fff8ea,#fffdf8);border:1px solid #f2e3bf;border-radius:12px;padding:9px 12px;font-size:12.5px;color:#8a6d1f;margin-bottom:8px;box-shadow:var(--shadow-sm),var(--inset)}
  .pend-card b{color:#7a5b12;font-weight:800}
  .pend-card .pend-sub{color:var(--ink-faint)}
  .pend-card{justify-content:space-between}
  .pend-card.err{background:#fff1f2;border-color:#ffd7db;color:var(--danger)}
  .pend-actions{display:flex;gap:4px;margin-left:auto}
  .pend-actions button{border:none;background:transparent;color:inherit;font-size:15px;cursor:pointer;line-height:1;padding:2px 4px;opacity:.75}
  .pend-actions button:active{opacity:1}
  .pend-card.err .pend-actions button{color:var(--danger)}
  .pend-spin{width:14px;height:14px;border:2px solid #f0dca8;border-top-color:#e0a92e;border-radius:50%;animation:spin .8s linear infinite;flex:none;display:inline-block;vertical-align:middle;margin-right:5px}
  .pend-chev{margin-left:auto;font-size:18px;color:var(--ink-faint);font-weight:700}
  .pend-item{display:flex;gap:12px;padding:10px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;background:var(--card)}
  .pend-thumb{width:72px;height:72px;flex:none;object-fit:cover;border-radius:10px;cursor:pointer;background:#eef1f7;box-shadow:var(--shadow-sm)}
  .pend-item-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;gap:8px}
  .pend-st{font-size:13px;font-weight:700;color:#8a6d1f;display:flex;align-items:center}
  .pend-st.err{color:var(--danger)}
  .pend-item-btns{display:flex;gap:8px}
  .pend-item-btns .sb-btn{flex:1;text-align:center}

  /* search */
  .search{position:relative;margin-bottom:12px}
  .search input{width:100%;border:1px solid var(--glass-bd);background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:13px;padding:10px 12px 10px 36px;font-size:14px;color:var(--ink);box-shadow:var(--shadow-sm);outline:none}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-faint)}

  /* tile grid */
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .tk{background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--glass-bd);border-radius:16px;padding:11px 12px;box-shadow:var(--shadow),var(--inset);cursor:pointer;transition:transform .15s;animation:pop .2s;-webkit-touch-callout:none;user-select:none}
  .tk:active{transform:scale(.98)}
  @keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
  .tk-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:7px}
  .badge{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:999px;color:#fff;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .tk-name{font-size:14.5px;font-weight:800;letter-spacing:-.3px;line-height:1.25;margin-bottom:5px;word-break:keep-all}
  .tk-date{font-size:12px;color:var(--accent-ink);font-weight:700;margin-bottom:4px}
  .tk-meta{font-size:11.5px;color:var(--ink-soft)}
  .xtag{font-size:10px;font-weight:800;color:#fff;background:var(--warn);padding:2px 7px;border-radius:999px;white-space:nowrap}
  .tk-icons{display:flex;align-items:center;gap:5px}
  .tk-cam{font-size:13px;line-height:1}
  .tk-share{border:none;background:#eef2ff;color:var(--accent-ink);border-radius:8px;width:26px;height:26px;font-size:13px;cursor:pointer;flex:none;line-height:1;padding:0}
  .tk-share:active{transform:scale(.9)}
  .lrow .tk-share{margin-left:auto}
  .chk{display:flex;align-items:center;gap:9px;background:#fbfcff;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:8px;cursor:pointer}
  .chk input{width:18px;height:18px;accent-color:var(--accent-ink)}
  .share-prev{white-space:pre-wrap;font-size:12.5px;color:var(--ink-soft);background:#f7f9fe;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin:0 0 10px;line-height:1.6}
  .share-thumb{width:100%;max-height:200px;object-fit:contain;border-radius:11px;border:1px solid var(--line);margin-bottom:12px;background:#fafbff}
  .tk-seat{display:inline-block;font-size:10.5px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);padding:2px 6px;border-radius:6px;margin-top:6px;margin-right:4px}

  /* list */
  .list{display:flex;flex-direction:column;gap:7px}
  .lrow{display:flex;align-items:center;gap:11px;background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--glass-bd);border-radius:13px;padding:9px 12px;box-shadow:var(--shadow-sm),var(--inset);cursor:pointer;-webkit-touch-callout:none;user-select:none}
  .act-title{font-size:15px;font-weight:800;text-align:center;margin:2px 0 14px;color:var(--ink)}
  .act-btn{width:100%;border:1px solid rgba(255,255,255,.8);background:rgba(255,255,255,.62);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:14px;padding:15px;font-size:15px;font-weight:700;color:var(--ink);font-family:inherit;cursor:pointer;margin-bottom:9px;text-align:center;box-shadow:var(--shadow-sm),var(--inset)}
  .act-btn:active{transform:scale(.98)}
  .act-btn.danger{color:var(--danger);background:rgba(255,241,242,.7);border-color:rgba(255,190,196,.6)}
  .act-btn.cancel{background:rgba(240,242,250,.7);color:var(--ink-soft);border-color:transparent;box-shadow:none;margin-top:2px}
  .lrow:active{background:var(--glass2)}
  .ldate{flex:none;width:42px;text-align:center;line-height:1.1}
  .ldate b{display:block;font-size:15px;font-weight:800;color:var(--ink)}
  .ldate span{font-size:10.5px;color:var(--ink-faint);font-weight:700}
  .ldate.none b{font-size:16px;color:var(--ink-faint)}
  .lbody{flex:1;min-width:0}
  .lname{font-size:14px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:6px}
  .lname .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lsub{font-size:11.5px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ldot{flex:none;width:9px;height:9px;border-radius:99px}

  /* calendar */
  .cal{background:var(--glass2);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--glass-bd);border-radius:18px;padding:10px;box-shadow:var(--shadow),var(--inset)}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:2px 4px}
  .cal-head .mon{font-size:15px;font-weight:800}
  .cal-head button{border:none;background:#f2f4fa;border-radius:9px;width:32px;height:32px;font-size:17px;cursor:pointer;color:var(--ink-soft);font-weight:800}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-wd{text-align:center;font-size:10.5px;font-weight:700;color:var(--ink-faint);padding:2px 0}
  .cal-wd.sun{color:#ff8a8a}.cal-wd.sat{color:#8aa5ff}
  .cal-cell{min-height:52px;border-radius:9px;padding:3px;background:rgba(255,255,255,.4);border:1px solid transparent;cursor:pointer;overflow:hidden}
  .cal-cell.empty{background:transparent;cursor:default}
  .cal-cell.sel{border-color:var(--accent);background:var(--accent-soft)}
  .cal-cell.today .cal-day{background:var(--accent);color:#fff;border-radius:6px}
  .cal-day{font-size:11px;font-weight:700;color:var(--ink-soft);width:19px;height:17px;display:flex;align-items:center;justify-content:center}
  .cal-cell.sun .cal-day{color:#ff8a8a}.cal-cell.sat .cal-day{color:#8aa5ff}
  .cal-chip{display:block;font-size:9.5px;font-weight:700;color:#fff;border-radius:4px;padding:1px 4px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5;pointer-events:none}
  .cal-more{font-size:9px;color:var(--ink-faint);font-weight:700;margin-top:1px;padding-left:2px;pointer-events:none}
  .cal-cell.has{cursor:pointer}
  .cal-cell.has:active{background:var(--accent-soft)}
  .cal-grid{touch-action:pan-y}
  .cal-hint{text-align:center;font-size:10.5px;color:var(--ink-faint);margin-top:8px;user-select:none}
  .cal-daylist{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:7px}
  .cal-daylist .dl-title{font-size:12.5px;font-weight:800;color:var(--ink-soft);margin:0 2px 2px}
  .cal-empty{font-size:12.5px;color:var(--ink-faint);text-align:center;padding:14px 0}
  .undated{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
  .undated .u-t{font-size:11.5px;color:var(--ink-faint);font-weight:700;margin:0 2px 6px}

  /* empty state */
  .empty{text-align:center;padding:52px 20px;color:var(--ink-faint)}
  .empty .ico{font-size:46px;margin-bottom:8px}
  .empty p{margin:3px 0;font-size:13.5px}
  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* util + fab */
  .util{display:flex;gap:8px;justify-content:center;margin-top:20px;flex-wrap:wrap}
  .util button{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:var(--shadow-sm)}
  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;z-index:40;background:linear-gradient(145deg,#7d97ff,#4361ee);color:#fff;border:none;padding:13px 24px;border-radius:999px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 12px 26px -8px rgba(67,97,238,.6),var(--inset);display:flex;align-items:center;gap:7px;font-family:inherit}
  .fab:active{transform:translateX(-50%) scale(.96)}
  .fab-ai{position:fixed;right:16px;bottom:22px;z-index:40;width:54px;height:54px;border-radius:50%;border:none;background:linear-gradient(145deg,#ffd873,#ffb020);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 12px 26px -8px rgba(255,160,0,.6),var(--inset)}
  .fab-ai:active{transform:scale(.94)}

  .select-bar{position:fixed;left:0;right:0;bottom:0;z-index:45;display:none;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:var(--glass2,rgba(255,255,255,.85));-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-top:1px solid var(--glass-bd);box-shadow:0 -8px 24px -12px rgba(0,0,0,.25)}
  .select-bar.on{display:flex}
  .select-bar #selectCount{font-size:13px;font-weight:800;color:var(--ink-soft);white-space:nowrap}
  .sb-actions{display:flex;gap:8px}
  .sb-btn{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink-soft);box-shadow:var(--shadow-sm);transition:.12s}
  .sb-btn:active{transform:scale(.96)}
  .sb-btn.danger{background:var(--danger-soft);color:var(--danger-ink);border:1px solid var(--danger-bd);font-weight:800}
  .sb-btn.danger:active{background:#ffe6ea}
  body.selecting .fab, body.selecting .fab-ai{display:none}
  .tk-check{position:absolute;top:10px;left:10px;width:20px;height:20px;border-radius:50%;border:2px solid #c9d2e6;background:#fff;box-shadow:var(--shadow-sm);z-index:2}
  .tk-check.on{background:var(--accent,#4361ee);border-color:var(--accent,#4361ee)}
  .tk-check.on::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
  .tk.sel-mode{position:relative;padding-left:34px}
  .lrow .tk-check{position:static;margin-right:2px}

  /* sheets / overlays */
  .overlay{position:fixed;inset:0;background:rgba(26,31,52,.30);-webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.on{display:flex;animation:fade .18s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{position:relative;background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(244,247,255,.9));-webkit-backdrop-filter:saturate(200%) blur(24px);backdrop-filter:saturate(200%) blur(24px);width:100%;max-width:680px;border-radius:26px 26px 0 0;max-height:92vh;overflow-y:auto;padding:6px 16px 24px;box-shadow:0 -20px 50px -14px rgba(31,46,84,.34),inset 0 1px 0 rgba(255,255,255,.95);border-top:1px solid rgba(255,255,255,.9);animation:up .26s cubic-bezier(.2,.8,.2,1)}
  .sheet::before{content:"";position:absolute;top:0;left:0;right:0;height:120px;border-radius:26px 26px 0 0;pointer-events:none;z-index:0;background:radial-gradient(80% 100% at 20% 0%,rgba(124,151,255,.16),transparent 70%),radial-gradient(80% 100% at 85% 0%,rgba(255,143,177,.13),transparent 70%)}
  .sheet>*{position:relative;z-index:1}
  @keyframes up{from{transform:translateY(36px)}to{transform:none}}
  .grab{width:42px;height:5px;background:#dfe4f0;border-radius:99px;margin:8px auto 8px}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .modal-head h2{margin:0}
  .modal-head-actions{display:flex;gap:6px}
  .img-view-overlay{background:rgba(10,12,20,.92)}
  .img-view-overlay .sheet{background:transparent;box-shadow:none;-webkit-backdrop-filter:none;backdrop-filter:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .img-view-overlay img{max-width:100%;max-height:80vh;border-radius:14px;box-shadow:var(--shadow-lg)}
  .img-view-close{margin-top:16px;border:none;background:rgba(255,255,255,.15);color:#fff;border-radius:999px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .sheet h2{font-size:17px;font-weight:800;margin:4px 2px 14px;letter-spacing:-.4px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin:0 2px 5px}
  .field input,.field textarea{width:100%;border:1px solid var(--line);background:#fbfcff;border-radius:11px;padding:11px 12px;font-size:15px;color:var(--ink);outline:none;font-family:inherit}
  .field input:focus,.field textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-soft)}
  .field textarea{resize:vertical;min-height:52px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  /* vendor button */
  .vbtn{width:100%;border:1px solid var(--line);background:#fbfcff;border-radius:11px;padding:11px 12px;font-size:15px;color:var(--ink);font-family:inherit;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
  .vbtn .vlabel{display:flex;align-items:center;gap:8px}
  .vbtn .vdot{width:12px;height:12px;border-radius:99px}
  .vbtn .chev{color:var(--ink-faint);font-size:13px}
  .vbtn.placeholder{color:var(--ink-faint)}
  /* seat editor */
  .seat-edit{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;background:#fafbff;position:relative}
  .seat-edit .four{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seat-edit .rm{position:absolute;top:7px;right:7px;border:none;background:#fff1f2;color:var(--danger);border-radius:7px;width:24px;height:24px;font-size:14px;cursor:pointer;line-height:1}
  .seat-edit label{font-size:11px}
  .seat-edit input{padding:9px 10px;font-size:14px}
  .gwrap{display:flex;flex-direction:column}
  .gbtn{width:100%;border:1px solid var(--line);background:#fbfcff;border-radius:9px;padding:9px 10px;font-size:14px;color:var(--ink);font-family:inherit;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:700}
  .gbtn.placeholder{color:var(--ink-faint);font-weight:400}
  .gbtn .chev{color:var(--ink-faint);font-size:11px}
  .add-seat{width:100%;border:1px dashed var(--accent);background:var(--accent-soft);color:var(--accent-ink);border-radius:11px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:4px}
  /* switch */
  .switch-row{display:flex;align-items:center;justify-content:space-between;background:#fbfcff;border:1px solid var(--line);border-radius:11px;padding:11px 12px}
  .switch-row .sl{font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px}
  .switch{position:relative;display:inline-block;width:46px;height:27px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .switch .track{position:absolute;inset:0;background:#d7dced;border-radius:99px;transition:.2s}
  .switch .track:before{content:"";position:absolute;width:21px;height:21px;left:3px;top:3px;background:#fff;border-radius:99px;transition:.2s;box-shadow:var(--shadow-sm)}
  .switch input:checked+.track{background:var(--warn)}
  .switch input:checked+.track:before{transform:translateX(19px)}
  .transfer-box{margin-top:10px;padding:12px;border-radius:12px;background:#fffaf0;border:1px solid #f3e6c4;display:none}
  .transfer-box.on{display:block}
  /* save row */
  .save-row{display:flex;gap:9px;margin-top:16px}
  .save-row button{flex:1;border:none;border-radius:13px;padding:14px;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit}
  .save-row .cancel{background:#f2f4fa;color:var(--ink-soft);flex:0 0 32%}
  .save-row .save{background:linear-gradient(145deg,#7d97ff,#4361ee);color:#fff;box-shadow:0 8px 20px -8px rgba(67,97,238,.55)}
  .save-row .save:disabled{opacity:.6}

  /* vendor picker */
  .vlist{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;max-height:46vh;overflow-y:auto;padding:2px}
  .vitem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:#fbfcff;border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s}
  .vitem:active{background:#f2f5ff}
  .vitem.sel{border-color:var(--accent);background:var(--accent-soft)}
  .vitem .vd{width:14px;height:14px;border-radius:99px;flex:none}
  .vitem .vn{flex:1;font-size:14.5px;font-weight:700}
  .vitem .vchk{color:var(--accent-ink);font-weight:800;font-size:15px}
  .vitem .vdel{border:none;background:transparent;color:var(--ink-faint);font-size:17px;cursor:pointer;padding:2px 4px;border-radius:6px}
  .vitem .vdel:active{background:#fff1f2;color:var(--danger)}
  .vadd{display:flex;gap:8px;border-top:1px solid var(--line);padding-top:12px}
  .vadd input{flex:1;border:1px solid var(--line);background:#fbfcff;border-radius:11px;padding:11px 12px;font-size:15px;outline:none;font-family:inherit}
  .vadd input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .vadd button{border:none;background:linear-gradient(145deg,#7d97ff,#4361ee);color:#fff;border-radius:11px;padding:0 18px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}

  .statusbox{border-radius:12px;padding:13px;font-size:13px;margin-bottom:12px;border:1px solid var(--line)}
  .statusbox.good{background:#f1fbf6;border-color:#c9efdd;color:#1f7a4d}
  .statusbox.warn{background:#fffaf0;border-color:#f3e6c4;color:#8a6d1f}
  .btn-ghost{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--card);color:var(--ink-soft);margin-top:8px}
  .btn-danger{width:100%;border:1px solid var(--danger-bd);border-radius:12px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;background:var(--danger-soft);color:var(--danger-ink);margin-top:8px;transition:.12s}
  .btn-danger:active{background:#ffe6ea}
  .btn-primary{width:100%;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;background:linear-gradient(145deg,#7d97ff,#4361ee);color:#fff}

  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);z-index:60;background:#1f2637;color:#fff;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;max-width:86vw;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(-6px)}
</style>
</head>
<body>

  추가
</button>

<!-- Ticket modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="sheet">
    <div class="grab"></div>
    <div class="modal-head">
      <h2 id="modalTitle">티켓 추가</h2>
      <span class="modal-head-actions" id="modalHeadActions" style="display:none">
        <button type="button" class="icon-btn" id="modalImgBtn" onclick="viewCurrentImage()" title="첨부 사진 보기" style="display:none">🖼️</button>
        <button type="button" class="icon-btn" onclick="shareCurrent()" title="공유">📤</button>
      </span>
    </div>

    <div class="field">
      <label>예매처</label>
      <button type="button" class="vbtn placeholder" id="fVendorBtn" onclick="openVendorPicker()">
        <span class="vlabel"><span class="vdot" id="fVendorDot" style="display:none"></span><span id="fVendorText">예매처 선택</span></span>
        <span class="chev">▾</span>
      </button>
    </div>

    <div class="field">
      <label>공연명</label>
      <input id="fName" type="text" placeholder="예: 뮤지컬 〈오페라의 유령〉">
    </div>

    <div class="two">
      <div class="field"><label>공연 날짜</label><input id="fDate" type="date"></div>
      <div class="field"><label>시간</label><input id="fTime" type="time"></div>
    </div>

    <div class="two">
      <div class="field"><label>매수</label><input id="fQty" type="number" inputmode="numeric" min="0" placeholder="0"></div>

    </div>

    <div class="field">
      <label>자리</label>

      <button class="add-seat" type="button" onclick="addSeatRow()">+ 자리 추가 (등급·층·구역·번호)</button>

    <div class="field">
      <label>양도</label>
      <div class="switch-row">
        <span class="sl">🔁 이 티켓을 양도했어요</span>
        <label class="switch"><input type="checkbox" id="fTransfer" onchange="toggleTransfer()"><span class="track"></span></label>
      </div>
      <div class="transfer-box" id="transferBox">
        <div class="two">
          <div class="field" style="margin-bottom:10px"><label>양도 금액 (원)</label><input id="fTPrice" type="number" inputmode="numeric" placeholder="0"></div>
          <div class="field" style="margin-bottom:10px"><label>양도한 곳(플랫폼)</label><input id="fTPlatform" list="platformList" placeholder="티켓베이 등"></div>
        </div>
        <div class="field" style="margin-bottom:0"><label>누구에게 (대상)</label><input id="fTTo" type="text" placeholder="예: 홍길동 / @아이디"></div>
        <datalist id="platformList">
          <option value="티켓베이"><option value="중고나라"><option value="당근마켓"><option value="번개장터"><option value="트위터/X"><option value="지인"><option value="기타">
        </datalist>
      </div>
    </div>

    <div class="field">
      <label>메모 (선택)</label>
      <textarea id="fMemo" placeholder="티켓 수령 방법, 동행인, 취소 마감일 등"></textarea>

    <button type="button" id="delBtn" class="btn-danger" style="display:none" onclick="delCurrent()">🗑 이 티켓 삭제</button>

    <div class="save-row">
      <button class="cancel" type="button" onclick="closeModal()">취소</button>
      <button class="save" id="saveBtn" type="button" onclick="save()">저장하기</button>

</div>

<!-- Vendor picker -->
<div class="overlay" id="vendorOverlay" onclick="if(event.target===this)closeVendor()">
  <div class="sheet">

    <div class="vlist" id="vlist"></div>

    <label class="chk"><input type="checkbox" id="shTxt" checked><span>📄 공연 정보(텍스트)</span></label>
    <div class="share-prev" id="sharePrev"></div>

    <button class="btn-primary" id="shareGo" onclick="doShare()">📤 공유하기</button>

  </div>
</div>

<!-- Sync sheet -->
<div class="overlay" id="syncOverlay" onclick="if(event.target===this)closeSync()">
  <div class="sheet"><div class="grab"></div><div id="syncBody"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== storage ===== */
const LS_TICKETS='tm_tickets_v1', LS_VENDORS='tm_vendors_v1', LS_CFG='tm_cfg_v1', LS_VIEW='tm_view_v1', LS_GRADES='tm_grades_v1';
const DEFAULT_VENDORS=['티켓링크','멜론티켓','세종문화회관','YES24','클립서비스','NOL 인터파크','샤롯데씨어터'];
const DEFAULT_GRADES=['VIP','R','S','A'];
const PALETTE=['#6c8cff','#ff8fb1','#ffa94d','#4dd4ac','#b088ff','#5bc0eb','#ff6b7a','#7bc86c','#f4a259','#5d9cec'];
const WD=['일','월','화','수','목','금','토'];
const BUILTIN_CFG={url:'https://ydqabdlwzseommowiupw.supabase.co',key:'sb_publishable_t5MlvS1Ea8ftD7IkfzqaiA_BCrzU80J'};

let tickets=load(LS_TICKETS,[]);
let pendings=[];
let vendors=load(LS_VENDORS,DEFAULT_VENDORS.slice());
let grades=load(LS_GRADES,DEFAULT_GRADES.slice());
let gradeTargetBtn=null;
let view=load(LS_VIEW,'tile');
let editingId=null, formVendor='';
let sb=null, mode='local', loading=false;
const _now=new Date();
let calY=_now.getFullYear(), calM=_now.getMonth(); // 0-based
let selDay=ymd(_now);

function load(k,def){try{const v=JSON.parse(localStorage.getItem(k));return v??def;}catch(e){return def;}}
function saveLocal(){localStorage.setItem(LS_TICKETS,JSON.stringify(tickets));localStorage.setItem(LS_VENDORS,JSON.stringify(vendors));}
function getCfg(){const c=load(LS_CFG,null);return (c&&c.url&&c.key)?c:{...BUILTIN_CFG};}
function colorFor(v){let h=0;v=v||'';for(let i=0;i<v.length;i++)h=(h*31+v.charCodeAt(i))>>>0;return PALETTE[h%PALETTE.length];}
function won(n){return (Number(n)||0).toLocaleString('ko-KR');}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function numOrNull(v){return v===''||v==null?null:Number(v);}
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(d,t){ if(!d)return ''; const p=d.split('-').map(Number); if(p.length<3)return d+(t?' '+t:''); const dt=new Date(p[0],p[1]-1,p[2]); return `${p[1]}/${p[2]} (${WD[dt.getDay()]})`+(t?` ${t}`:''); }

/* ===== blob mapping (time + transfer packed into jsonb 'seats' column, no DB change) ===== */
function parseBlob(raw){
  if(Array.isArray(raw)) return {seats:raw,time:'',transfer:{done:false}};
  raw=(raw&&typeof raw==='object')?raw:{};
  return {seats:Array.isArray(raw.seats)?raw.seats:[], time:raw.time||'', transfer:raw.transfer||{done:false}, hasImg:!!raw.hasImg};
}
function rowToTicket(r){const b=parseBlob(r.seats);return {id:r.id,vendor:r.vendor,name:r.name,date:r.show_date||'',time:b.time,qty:r.qty,price:r.price,memo:r.memo,seats:b.seats,transfer:b.transfer,hasImg:b.hasImg};}
function ticketToDB(t){return {vendor:t.vendor,name:t.name,show_date:t.date||null,qty:numOrNull(t.qty),price:numOrNull(t.price),memo:t.memo||null,
  seats:{seats:t.seats||[],time:t.time||'',transfer:t.transfer||{done:false},hasImg:!!t.hasImg}};}

/* ===== backend ===== */
async function boot(){
  render();
  const cfg=getCfg();
  if(cfg.url&&cfg.key&&window.supabase){
    try{ sb=window.supabase.createClient(cfg.url,cfg.key); mode='cloud'; await refresh(); }
    catch(e){ console.error(e); mode='local'; tickets=load(LS_TICKETS,[]); render(); }
  }
  updateSyncPill();
}
async function refresh(){
  if(mode!=='cloud'||!sb)return;
  loading=true; render();
  const {data,error}=await sb.from('tickets').select('id,vendor,name,show_date,qty,price,memo,seats,created_at').order('created_at',{ascending:true});
  loading=false;
  if(error){ toast('불러오기 실패: '+error.message); render(); return; }
  tickets=(data||[]).map(rowToTicket);
  try{ const {data:pd}=await sb.from('pending_uploads').select('id,status,result').neq('status','done').order('created_at',{ascending:false}); pendings=pd||[]; }catch(e){}
  render();
}
function renderPending(){
  const el=document.getElementById('pending'); if(!el)return;
  if(!pendings.length){ el.innerHTML=''; return; }
  const pend=pendings.filter(p=>p.status==='pending').length;
  const errs=pendings.filter(p=>p.status==='error').length;
  let label;
  if(pend&&errs) label=`<span class="pend-spin"></span><span>AI 인식 중 <b>${pend}</b> · 실패 <b>${errs}</b> <span class="pend-sub">· 탭해서 관리</span></span>`;
  else if(pend)  label=`<span class="pend-spin"></span><span>AI가 인식 중… <b>${pend}건</b> <span class="pend-sub">· 탭해서 관리</span></span>`;
  else           label=`<span>⚠️ 인식 실패 <b>${errs}건</b> <span class="pend-sub">· 탭해서 관리</span></span>`;
  el.innerHTML=`<div class="pend-card ${pend?'':'err'}" onclick="openPendManage()" style="cursor:pointer">${label}<span class="pend-chev">›</span></div>`;
}
// 대기열 관리 팝업 — 썸네일, 보기, 교체, 삭제
let pendFull=[]; // {id,status,result,image_b64}
async function openPendManage(){
  if(!(mode==='cloud'&&sb))return;
  const body=document.getElementById('pendBody');
  body.innerHTML=`<div class="empty" style="padding:24px 0"><div class="spinner"></div></div>`;
  openOv('pendOverlay');
  try{
    const {data}=await sb.from('pending_uploads').select('id,status,result,image_b64').neq('status','done').order('created_at',{ascending:false});
    pendFull=data||[];
  }catch(e){ pendFull=[]; }
  renderPendList();
}
function renderPendList(){
  const body=document.getElementById('pendBody');
  if(!pendFull.length){ body.innerHTML=`<p class="hint" style="text-align:center;padding:16px 0">대기 중인 업로드가 없어요.</p>`; return; }
  body.innerHTML=pendFull.map(p=>{
    const st=p.status==='error'
      ? `<span class="pend-st err">⚠️ 인식 실패${p.result?' · '+esc(p.result):''}</span>`
      : `<span class="pend-st"><span class="pend-spin"></span>AI가 인식 중…</span>`;
    return `<div class="pend-item" data-id="${p.id}">
      <img class="pend-thumb" src="data:image/jpeg;base64,${p.image_b64}" onclick="viewPendImage('${p.id}')" alt="업로드 사진">
      <div class="pend-item-body">
        ${st}
        <div class="pend-item-btns">
          <button class="sb-btn" onclick="replacePendingPhoto('${p.id}')">🖼️ 교체</button>
          <button class="sb-btn danger" onclick="cancelPending('${p.id}')">🗑 삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function closePend(){ closeOv('pendOverlay'); }
function viewPendImage(id){
  const p=pendFull.find(x=>String(x.id)===String(id)); if(!p||!p.image_b64)return;
  document.getElementById('imgViewImg').src='data:image/jpeg;base64,'+p.image_b64;
  openOv('imgViewOverlay');
}
function dismissPending(id){ cancelPending(id); }
function cancelPending(id){
  if(!(mode==='cloud'&&sb))return;
  if(!confirm('이 업로드 항목을 삭제할까요?'))return;
  sb.from('pending_uploads').delete().eq('id',id).then(()=>{
    pendings=pendings.filter(p=>String(p.id)!==String(id));
    pendFull=pendFull.filter(p=>String(p.id)!==String(id));
    renderPending(); renderPendList();
    if(!pendFull.length)closePend();
    toast('삭제됨');
  });
}
let pendReplaceId=null;
function replacePendingPhoto(id){
  if(!(mode==='cloud'&&sb))return;
  pendReplaceId=id;
  document.getElementById('pendReplaceFile').click();
}
async function pendReplaceFile(e){
  const file=(e.target.files||[])[0]; e.target.value='';
  const id=pendReplaceId; pendReplaceId=null;
  if(!file||!id||!(mode==='cloud'&&sb))return;
  try{
    const b64=await fileToB64(file);
    const {error}=await sb.from('pending_uploads').update({image_b64:b64,status:'pending',result:null}).eq('id',id);
    if(error)throw error;
    // 로컬 캐시도 갱신해 팝업 썸네일/상태 즉시 반영
    const p=pendFull.find(x=>String(x.id)===String(id));
    if(p){ p.image_b64=b64; p.status='pending'; p.result=null; }
    const pp=pendings.find(x=>String(x.id)===String(id)); if(pp){ pp.status='pending'; pp.result=null; }
    renderPending(); renderPendList();
    toast('사진 교체됨 · 다시 인식해요 🤖');
  }catch(err){ toast('교체 실패: '+(err.message||err)); }
}
function updateSyncPill(){
  const pill=document.getElementById('syncPill'), txt=document.getElementById('syncPillTxt');
  if(mode==='cloud'){pill.classList.add('on');txt.textContent='동기화';}else{pill.classList.remove('on');txt.textContent='오프라인';}
}

/* ===== render ===== */
let selectMode=false, selectedIds=new Set();
function toggleSelectMode(){
  if(view==='calendar'){ toast('캘린더 보기에서는 사용할 수 없어요'); return; }
  selectMode=!selectMode; selectedIds.clear(); render();
}
function cancelSelectMode(){ selectMode=false; selectedIds.clear(); render(); }
function toggleSelect(id){
  id=String(id);
  if(selectedIds.has(id))selectedIds.delete(id); else selectedIds.add(id);
  renderSelectBar();
  document.querySelectorAll(`[data-id="${id}"] .tk-check`).forEach(el=>el.classList.toggle('on',selectedIds.has(id)));
}
function selectAllToggle(){
  const ids=byDate(filtered()).map(t=>String(t.id));
  const allSel=ids.length&&ids.every(id=>selectedIds.has(id));
  if(allSel)selectedIds.clear(); else ids.forEach(id=>selectedIds.add(id));
  render();
}
function renderSelectBar(){
  const bar=document.getElementById('selectBar'); if(!bar)return;
  bar.classList.toggle('on',selectMode);
  document.body.classList.toggle('selecting',selectMode);
  document.getElementById('selBtn').classList.toggle('on',selectMode);
  if(!selectMode)return;
  document.getElementById('selectCount').textContent=`${selectedIds.size}개 선택`;
  const ids=byDate(filtered()).map(t=>String(t.id));
  const allSel=ids.length&&ids.every(id=>selectedIds.has(id));
  document.getElementById('selAllBtn').textContent=allSel?'전체해제':'전체선택';
}
async function bulkDelete(){
  if(!selectedIds.size){ toast('선택된 티켓이 없어요'); return; }
  const ids=[...selectedIds];
  if(!confirm(`선택한 ${ids.length}개 티켓을 삭제할까요?`))return;
  try{
    if(mode==='cloud'&&sb){ const {error}=await sb.from('tickets').delete().in('id',ids); if(error)throw error; }
    tickets=tickets.filter(t=>!selectedIds.has(String(t.id)));
    if(mode!=='cloud')saveLocal();
    selectMode=false; selectedIds.clear();
    render(); toast(`${ids.length}개 삭제되었어요`);
  }catch(e){ toast('삭제 실패: '+(e.message||e)); }
}
function setView(v){view=v;localStorage.setItem(LS_VIEW,JSON.stringify(v));if(v==='calendar'){selectMode=false;selectedIds.clear();}render();}
function filtered(){
  const q=(document.getElementById('search').value||'').trim().toLowerCase();
  let a=tickets.slice();
  if(q)a=a.filter(t=>(t.name||'').toLowerCase().includes(q)||(t.vendor||'').toLowerCase().includes(q));
  return a;
}
function byDate(a){return a.slice().sort((x,y)=>{const dx=x.date||'9999',dy=y.date||'9999';if(dx!==dy)return dx<dy?-1:1;return (x.time||'')<(y.time||'')?-1:1;});}

function render(){
  // seg
  document.querySelectorAll('#viewSeg button').forEach(b=>b.classList.toggle('on',b.dataset.v===view));
  // stats
  const tq=tickets.reduce((s,t)=>s+(Number(t.qty)||0),0);
  const tp=tickets.reduce((s,t)=>s+(Number(t.price)||0),0);
  const tx=tickets.filter(t=>t.transfer&&t.transfer.done).length;
  document.getElementById('stats').innerHTML=
    `<span>공연 <b>${tickets.length}</b></span><span class="sep">·</span>`+
    `<span>매수 <b>${tq}</b></span><span class="sep">·</span>`+
    `<span>지출 <b>₩${won(tp)}</b></span>`+
    (tx?`<span class="sep">·</span><span class="x">양도 <b>${tx}</b></span>`:'');

  renderPending();
  renderSelectBar();

  const root=document.getElementById('viewRoot');
  if(loading&&tickets.length===0){root.innerHTML=`<div class="empty"><div class="spinner"></div><p>불러오는 중…</p></div>`;return;}
  if(view==='calendar'){root.innerHTML=renderCalendar();return;}
  const a=byDate(filtered());
  if(a.length===0){root.innerHTML=emptyHTML();return;}
  root.innerHTML = view==='list' ? `<div class="list">${a.map(listRow).join('')}</div>`
                                 : `<div class="tiles">${a.map(tileCard).join('')}</div>`;
}
function emptyHTML(){const has=tickets.length>0;return `<div class="empty"><div class="ico">🎭</div><p><b>${has?'검색 결과가 없어요':'아직 등록된 티켓이 없어요'}</b></p><p>${has?'다른 키워드로 찾아보세요':'아래 + 버튼으로 추가해 보세요'}</p></div>`;}

function tileCard(t){
  const c=colorFor(t.vendor);
  const seat=(t.seats||[]).find(s=>s.grade)||{};
  const sel=selectedIds.has(String(t.id));
  const click=selectMode?`toggleSelect('${t.id}')`:`edit('${t.id}')`;
  return `<div class="tk ${selectMode?'sel-mode':''}" data-id="${t.id}" onclick="${click}">
    ${selectMode?`<span class="tk-check ${sel?'on':''}"></span>`:''}
    <div class="tk-row"><span class="badge" style="background:${c}">${esc(t.vendor||'예매처')}</span><span class="tk-icons">${t.hasImg?'<span class="tk-cam" title="예매내역 사진 첨부">📷</span>':''}${t.transfer&&t.transfer.done?'<span class="xtag">양도</span>':''}${selectMode?'':`<button class="tk-share" onclick="event.stopPropagation();openShare('${t.id}')" title="공유">📤</button>`}</span></div>
    <div class="tk-name">${esc(t.name||'(공연명 없음)')}</div>
    ${t.date?`<div class="tk-date">📅 ${esc(fmtDate(t.date,t.time))}</div>`:''}
    <div class="tk-meta">🎟 ${Number(t.qty)||0} · ₩${won(t.price)}</div>
    ${seat.grade?`<span class="tk-seat">${esc(seat.grade)}</span>`:''}
    ${t.transfer&&t.transfer.done&&t.transfer.price?`<span class="tk-seat" style="color:#8a6d1f;background:#fff3d6">양도 ₩${won(t.transfer.price)}</span>`:''}
  </div>`;
}
function listRow(t){
  const c=colorFor(t.vendor);
  let dm='—',dw='';
  if(t.date){const p=t.date.split('-').map(Number);const dt=new Date(p[0],p[1]-1,p[2]);dm=p[1]+'/'+p[2];dw=WD[dt.getDay()];}
  const sel=selectedIds.has(String(t.id));
  const click=selectMode?`toggleSelect('${t.id}')`:`edit('${t.id}')`;
  return `<div class="lrow" data-id="${t.id}" onclick="${click}">
    ${selectMode?`<span class="tk-check ${sel?'on':''}"></span>`:''}
    <div class="ldate ${t.date?'':'none'}"><b>${t.date?dm:'—'}</b>${dw?`<span>${dw}</span>`:''}</div>
    <div class="lbody">
      <div class="lname"><span class="nm">${esc(t.name||'(공연명 없음)')}</span>${t.transfer&&t.transfer.done?'<span class="xtag">양도</span>':''}</div>
      <div class="lsub">${esc(t.vendor||'')} · 🎟${Number(t.qty)||0} · ₩${won(t.price)}${t.time?' · '+esc(t.time):''}</div>
    </div>
    ${t.hasImg?'<span class="tk-cam">📷</span>':''}
    ${selectMode?'':`<button class="tk-share" onclick="event.stopPropagation();openShare('${t.id}')" title="공유">📤</button>`}
    <span class="ldot" style="background:${c}"></span>
  </div>`;
}

function renderCalendar(){
  const first=new Date(calY,calM,1), start=first.getDay(), days=new Date(calY,calM+1,0).getDate();
  const today=ymd(new Date());
  const byDay={};
  tickets.forEach(t=>{if(t.date){(byDay[t.date]=byDay[t.date]||[]).push(t);}});
  let cells='';
  for(let i=0;i<start;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const wd=(start+d-1)%7;
    const list=byDay[ds]||[];
    const chips=list.slice(0,2).map(t=>`<span class="cal-chip" style="background:${colorFor(t.vendor)}">${esc(t.name||'공연')}</span>`).join('');
    const more=list.length>2?`<div class="cal-more">+${list.length-2}</div>`:'';
    cells+=`<div class="cal-cell ${wd===0?'sun':''} ${wd===6?'sat':''} ${ds===today?'today':''} ${list.length?'has':''}" onclick="calOpen('${ds}')">
      <div class="cal-day">${d}</div>${chips}${more}</div>`;
  }
  const wdh=WD.map((w,i)=>`<div class="cal-wd ${i===0?'sun':''} ${i===6?'sat':''}">${w}</div>`).join('');
  const undated=tickets.filter(t=>!t.date);
  const undHTML=undated.length?`<div class="undated"><div class="u-t">📌 날짜 미정 ${undated.length}건</div><div class="list">${undated.map(listRow).join('')}</div></div>`:'';
  return `<div class="cal">
    <div class="cal-head"><button onclick="calMove(-1)">‹</button><div class="mon">${calY}년 ${calM+1}월</div><button onclick="calMove(1)">›</button></div>
    <div class="cal-grid">${wdh}${cells}</div>
    <div class="cal-hint">← 좌우로 넘겨 월 이동 →</div>
    ${undHTML}
  </div>`;
}
function calMove(n){calM+=n;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}render();}
function calOpen(ds){
  const list=tickets.filter(t=>String(t.date)===ds);
  if(!list.length)return;
  const p=ds.split('-').map(Number), dt=new Date(p[0],p[1]-1,p[2]);
  document.getElementById('dayTitle').textContent=`${p[1]}월 ${p[2]}일 (${WD[dt.getDay()]}) · ${list.length}건`;
  document.getElementById('dayBody').innerHTML=`<div class="list">${byDate(list).map(listRow).join('')}</div>`;
  openOv('dayOverlay');
}
function closeDay(){ closeOv('dayOverlay'); }

function addVendorInline(){

  saveLocal(); inp.value=''; formVendor=n; renderVendorList(); syncVendorBtn(); toast('예매처 추가됨');

function deleteVendor(v){

  vendors=vendors.filter(x=>x!==v);

}

/* ===== modal ===== */
function openModal(){
  editingId=null; formVendor='';
  document.getElementById('modalTitle').textContent='티켓 추가';
  ['fName','fDate','fTime','fQty','fPrice','fMemo','fTPrice','fTTo','fTPlatform'].forEach(id=>document.getElementById(id).value='');

  document.getElementById('modalHeadActions').style.display='none';
  syncVendorBtn();
  openOv('overlay');
}
function closeModal(){closeOv('overlay');}
function edit(id){
  const t=tickets.find(x=>String(x.id)===String(id)); if(!t)return;
  editingId=t.id; formVendor=t.vendor||'';
  document.getElementById('modalTitle').textContent='티켓 수정';
  document.getElementById('fName').value=t.name||'';
  document.getElementById('fDate').value=t.date||'';
  document.getElementById('fTime').value=t.time||'';
  document.getElementById('fQty').value=t.qty??'';
  document.getElementById('fPrice').value=t.price??'';
  document.getElementById('fMemo').value=t.memo||'';
  const tr=t.transfer||{};
  document.getElementById('fTransfer').checked=!!tr.done; toggleTransfer();
  document.getElementById('fTPrice').value=tr.price??'';
  document.getElementById('fTTo').value=tr.to||'';
  document.getElementById('fTPlatform').value=tr.platform||'';
  const box=document.getElementById('seatBox'); box.innerHTML='';
  (t.seats&&t.seats.length?t.seats:[null]).forEach(s=>addSeatRow(s));
  document.getElementById('delBtn').style.display='block';
  document.getElementById('modalHeadActions').style.display='flex';
  document.getElementById('modalImgBtn').style.display=t.hasImg?'flex':'none';
  syncVendorBtn();
  openOv('overlay');
}
function shareCurrent(){ if(!editingId)return; const id=editingId; closeModal(); openShare(id); }
function viewCurrentImage(){
  if(!editingId||!(mode==='cloud'&&sb))return;
  const id=editingId;
  sb.from('tickets').select('img').eq('id',id).single().then(({data})=>{
    if(!data||!data.img){ toast('사진을 불러올 수 없어요'); return; }
    document.getElementById('imgViewImg').src='data:image/jpeg;base64,'+data.img;
    openOv('imgViewOverlay');
  });
}
function closeImgView(){ closeOv('imgViewOverlay'); }
async function save(){
  const name=document.getElementById('fName').value.trim();
  if(!name){toast('공연명을 입력해 주세요');return;}
  const done=document.getElementById('fTransfer').checked;
  const data={
    vendor:formVendor||'기타', name,
    date:document.getElementById('fDate').value,
    time:document.getElementById('fTime').value,
    qty:document.getElementById('fQty').value,
    price:document.getElementById('fPrice').value,
    memo:document.getElementById('fMemo').value.trim(),
    seats:collectSeats(),
    transfer:{done,
      price:done?numOrNull(document.getElementById('fTPrice').value):null,
      to:done?document.getElementById('fTTo').value.trim():'',
      platform:done?document.getElementById('fTPlatform').value.trim():''},
    hasImg: editingId ? !!((tickets.find(x=>String(x.id)===String(editingId))||{}).hasImg) : false
  };
  const btn=document.getElementById('saveBtn'); btn.disabled=true;
  try{
    if(mode==='cloud'&&sb){
      if(editingId){
        const {data:row,error}=await sb.from('tickets').update(ticketToDB(data)).eq('id',editingId).select().single();
        if(error)throw error; const i=tickets.findIndex(x=>x.id===editingId); if(i>-1)tickets[i]=rowToTicket(row); toast('수정되었어요');
      }else{
        const {data:row,error}=await sb.from('tickets').insert(ticketToDB(data)).select().single();
        if(error)throw error; tickets.push(rowToTicket(row)); toast('추가되었어요 🎉');
      }
    }else{
      if(editingId){const i=tickets.findIndex(x=>x.id===editingId);if(i>-1)tickets[i]={...tickets[i],...data};toast('수정되었어요');}
      else{tickets.push({id:'t'+Date.now()+Math.floor(Math.random()*1000),...data});toast('추가되었어요 🎉');}
      saveLocal();
    }
    if(data.date){const p=data.date.split('-').map(Number);calY=p[0];calM=p[1]-1;selDay=data.date;}
    render(); closeModal();
  }catch(e){ toast('저장 실패: '+(e.message||e)); }
  finally{ btn.disabled=false; }
}
async function del(id){
  const t=tickets.find(x=>String(x.id)===String(id));
  if(!confirm(`"${t?t.name:'이 티켓'}"을(를) 삭제할까요?`))return;
  try{
    if(mode==='cloud'&&sb){const {error}=await sb.from('tickets').delete().eq('id',id);if(error)throw error;}
    tickets=tickets.filter(x=>String(x.id)!==String(id));
    if(mode!=='cloud')saveLocal();
    render(); closeModal(); toast('삭제되었어요');
  }catch(e){ toast('삭제 실패: '+(e.message||e)); }
}

    box.innerHTML=`<h2>동기화 상태</h2><div class="statusbox good">✅ 클라우드에 자동 저장 중이에요. 폰·PC 어디서 열어도 같은 목록이 보입니다. 로그인 필요 없어요.</div>
      <button class="btn-ghost" onclick="refresh().then(()=>toast('새로고침됨'))">🔄 지금 새로고침</button>
      <button class="btn-ghost" onclick="closeSync()">닫기</button>`;
  }else{
    box.innerHTML=`<h2>동기화 상태</h2><div class="statusbox warn">⚠️ 지금은 오프라인이라 이 기기에 임시 저장돼요. 인터넷 연결 후 새로고침하면 다시 동기화됩니다.</div>
      <button class="btn-primary" onclick="location.reload()">새로고침</button><button class="btn-ghost" onclick="closeSync()">닫기</button>`;
  }
}

/* ===== backup ===== */
function exportData(){
  const blob=new Blob([JSON.stringify({tickets,vendors},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='티켓보관함_백업.json';a.click();toast('백업 저장됨');
}
async function importData(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=async()=>{try{
    const d=JSON.parse(r.result); if(!Array.isArray(d.tickets))throw 0;
    if(!confirm('백업을 현재 데이터에 합칠까요?')){e.target.value='';return;}
    if(Array.isArray(d.vendors))d.vendors.forEach(v=>{if(!vendors.includes(v))vendors.push(v);});
    if(mode==='cloud'&&sb){const {error}=await sb.from('tickets').insert(d.tickets.map(ticketToDB));if(error)throw error;await refresh();}
    else{const ids=new Set(tickets.map(t=>String(t.id)));d.tickets.forEach(t=>{if(!ids.has(String(t.id)))tickets.push(t);});saveLocal();render();}
    toast('불러오기 완료');
  }catch(err){toast('올바른 백업 파일이 아니에요');}};
  r.readAsText(f);e.target.value='';
}

/* ===== 공유 (카톡·문자) ===== */
let shareId=null, shareImgB64=null;
function ticketText(t){
  const L=[`🎫 ${t.name||'(공연명 없음)'}`];
  if(t.vendor)L.push(`예매처: ${t.vendor}`);
  if(t.date)L.push(`일시: ${fmtDate(t.date,t.time)}`);
  if(Number(t.qty))L.push(`매수: ${Number(t.qty)}`);
  if(Number(t.price))L.push(`가격: ${won(t.price)}원`);
  const ss=(t.seats||[]).filter(s=>s.grade||s.floor||s.zone||s.no)
    .map(s=>[s.grade,(s.floor?s.floor+'층':''),(s.zone?s.zone+'구역':''),s.no].filter(Boolean).join(' ')).join(' / ');
  if(ss)L.push(`좌석: ${ss}`);
  if(t.transfer&&t.transfer.done)L.push(`양도: ${[t.transfer.price?won(t.transfer.price)+'원':'',t.transfer.to,t.transfer.platform].filter(Boolean).join(' · ')||'완료'}`);
  if(t.memo)L.push(`메모: ${t.memo}`);
  return L.join('\n');
}
function b64ToFile(b64,name){ const bin=atob(b64), a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return new File([a],name,{type:'image/jpeg'}); }
async function openShare(id){
  const t=tickets.find(x=>String(x.id)===String(id)); if(!t)return;
  shareId=id; shareImgB64=null; shareStep=0; resetShareBtn();
  document.getElementById('sharePrev').textContent=ticketText(t);
  const wrap=document.getElementById('shImgWrap'), thumb=document.getElementById('shareThumb');
  thumb.style.display='none'; thumb.removeAttribute('src');
  if(t.hasImg&&mode==='cloud'&&sb){
    wrap.style.display=''; document.getElementById('shImg').checked=true;
    sb.from('tickets').select('img').eq('id',id).single().then(({data})=>{
      shareImgB64=(data&&data.img)||null;
      if(shareImgB64 && String(shareId)===String(id)){ thumb.src='data:image/jpeg;base64,'+shareImgB64; thumb.style.display='block'; }
      else if(!shareImgB64){ wrap.style.display='none'; }
    });
  } else { wrap.style.display='none'; }
  openOv('shareOverlay');
}
function closeShare(){ shareStep=0; resetShareBtn(); closeOv('shareOverlay'); }
function resetShareBtn(){ const b=document.getElementById('shareGo'); if(b)b.textContent='📤 공유하기'; }
let shareStep=0;
async function doShare(){
  const t=tickets.find(x=>String(x.id)===String(shareId)); if(!t)return;
  const wantTxt=document.getElementById('shTxt').checked;
  const wantImg=document.getElementById('shImg').checked && t.hasImg && shareImgB64;
  if(!wantTxt&&!wantImg){ toast('보낼 항목을 선택하세요'); return; }
  const title=t.name||'티켓', text=ticketText(t);
  const fname=(t.name||'예매내역').replace(/[\\/:*?"<>|]/g,'')+'.jpg';
  const imgFile=wantImg?b64ToFile(shareImgB64,fname):null;
  const canShareImg=wantImg&&navigator.share&&navigator.canShare&&navigator.canShare({files:[imgFile]});
  try{
    // 텍스트+사진을 한 번의 navigator.share() 호출에 같이 넘기면 카톡/문자 등 대부분 앱이 사진만 받고
    // 텍스트를 버린다. 그렇다고 코드에서 곧바로 두 번 연달아 share()를 부르면, 두 번째 호출은 모바일 브라우저의
    // "사용자 제스처" 요건을 잃어서 조용히 실패한다 → 반드시 버튼을 두 번 눌러(제스처 2회) 순서대로 보낸다.
    if(wantTxt&&wantImg&&navigator.share){
      if(shareStep===0){
        await navigator.share({title,text});
        if(canShareImg){
          shareStep=1;
          document.getElementById('shareGo').textContent='📷 이어서 사진 공유하기 (탭)';
          toast('텍스트 공유됨 · 아래 버튼을 한 번 더 눌러 사진도 보내세요');
          return; // 팝업 유지, 다음 탭에서 사진 전송
        }else{
          const a=document.createElement('a'); a.href='data:image/jpeg;base64,'+shareImgB64; a.download=fname; a.click();
          toast('사진은 파일로 저장했어요 (이 기기는 사진 공유 미지원)');
        }
      }else{
        await navigator.share({files:[imgFile]});
      }
    }else if(wantTxt&&wantImg){
      if(navigator.clipboard)await navigator.clipboard.writeText(text);
      const a=document.createElement('a'); a.href='data:image/jpeg;base64,'+shareImgB64; a.download=fname; a.click();
      toast('이 기기는 공유 시트 미지원 · 텍스트 복사/사진 저장했어요');
    }else if(wantImg){
      if(canShareImg){ await navigator.share({files:[imgFile]}); }
      else{
        const a=document.createElement('a'); a.href='data:image/jpeg;base64,'+shareImgB64; a.download=fname; a.click();
        toast('이 기기는 사진 공유 미지원 · 파일로 저장했어요');
      }
    }else if(wantTxt){
      if(navigator.share){ await navigator.share({title,text}); }
      else{ if(navigator.clipboard)await navigator.clipboard.writeText(text); toast('이 기기는 공유 시트 미지원 · 텍스트 복사했어요'); }
    }
    closeShare();
  }catch(e){ if(e&&e.name!=='AbortError')toast('공유 실패: '+(e.message||e)); }
}
function copyShareText(){ const t=tickets.find(x=>String(x.id)===String(shareId)); if(!t)return; (navigator.clipboard?navigator.clipboard.writeText(ticketText(t)):Promise.reject()).then(()=>toast('텍스트 복사됨'),()=>toast('복사 미지원')); }

/* ===== AI 캡처 업로드 (예매내역 자동 인식 대기열) ===== */
function fileToB64(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const max=1400; let w=img.naturalWidth,h=img.naturalHeight;
      const s=Math.min(1,max/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',0.82).split(',')[1]);
    };
    img.onerror=rej;
    const fr=new FileReader(); fr.onload=()=>{img.src=fr.result;}; fr.onerror=rej; fr.readAsDataURL(file);
  });
}
async function aiUpload(e){
  const files=[...(e.target.files||[])]; e.target.value=''; if(!files.length)return;
  if(mode!=='cloud'||!sb){ toast('오프라인이라 지금은 안 돼요'); return; }
  toast(`캡처 ${files.length}장 처리 중…`);
  let ok=0, fail=0;
  for(const f of files){
    try{
      const b64=await fileToB64(f);
      const {error}=await sb.from('pending_uploads').insert({image_b64:b64,status:'pending'});
      if(error)throw error; ok++;
    }catch(err){ fail++; }
  }
  toast(`${ok}장 접수됨${fail?` · ${fail}장 실패`:''} · AI가 곧 인식해요 🤖`);
  refresh();
}

/* ===== toast ===== */
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2000);}

/* ===== overlay manager: history(back) + swipe-to-close ===== */
let _trap=false, _ignorePop=false;
function openOv(id){
  const el=document.getElementById(id), sh=el.querySelector('.sheet');
  if(sh){sh.style.transition='';sh.style.transform='';}
  el.classList.add('on'); document.body.style.overflow='hidden';
  if(!_trap){_trap=true;history.pushState({ov:1},'');}
}
function closeOv(id){
  document.getElementById(id).classList.remove('on');
  if(!document.querySelector('.overlay.on')){
    document.body.style.overflow='';
    if(_trap){_trap=false;_ignorePop=true;history.back();}
  }
}
window.addEventListener('popstate',()=>{
  if(_ignorePop){_ignorePop=false;return;}
  const open=[...document.querySelectorAll('.overlay.on')];
  if(open.length){
    open[open.length-1].classList.remove('on');
    if(document.querySelector('.overlay.on')){history.pushState({ov:1},'');}
    else{document.body.style.overflow='';_trap=false;}
  }else{_trap=false;}
});
function initSheetDrag(){
  document.querySelectorAll('.overlay .sheet').forEach(sheet=>{
    let sy=0,cy=0,drag=false;
    sheet.addEventListener('touchstart',e=>{ if(sheet.scrollTop>2){drag=false;return;} sy=e.touches[0].clientY;cy=0;drag=true;sheet.style.transition='none'; },{passive:true});
    sheet.addEventListener('touchmove',e=>{ if(!drag)return; cy=e.touches[0].clientY-sy; sheet.style.transform=cy>0?('translateY('+cy+'px)'):''; },{passive:true});
    sheet.addEventListener('touchend',()=>{ if(!drag)return; drag=false; sheet.style.transition='transform .22s cubic-bezier(.2,.8,.2,1)';
      if(cy>110){ sheet.style.transform='translateY(100%)'; const ov=sheet.closest('.overlay'); setTimeout(()=>{ sheet.style.transform='';sheet.style.transition=''; if(ov)closeOv(ov.id); },170); }
      else{ sheet.style.transform=''; } cy=0; });
  });
}

/* ===== long-press action menu ===== */
let actionId=null, lpTimer=null, lpFired=false, lpX=0, lpY=0;
let calSX=0, calSY=0, calSwiped=false, calTrack=false;
function openActions(id){
  const t=tickets.find(x=>String(x.id)===String(id)); if(!t)return;
  actionId=id; document.getElementById('actTitle').textContent=t.name||'티켓';
  openOv('actionOverlay');
  if(navigator.vibrate)navigator.vibrate(15);
}
function closeActions(){ closeOv('actionOverlay'); }
function actEdit(){ const id=actionId; closeActions(); edit(id); }
function actDelete(){ const id=actionId; closeActions(); del(id); }
function actDuplicate(){ const id=actionId; closeActions(); duplicateTicket(id); }
function actShare(){ const id=actionId; closeActions(); openShare(id); }
async function duplicateTicket(id){
  const t=tickets.find(x=>String(x.id)===String(id)); if(!t)return;
  const copy={vendor:t.vendor,name:t.name,date:t.date,time:t.time,qty:t.qty,price:t.price,memo:t.memo,
    seats:(t.seats||[]).map(s=>({...s})), transfer:{...(t.transfer||{done:false})}};
  try{
    if(mode==='cloud'&&sb){ const {data:row,error}=await sb.from('tickets').insert(ticketToDB(copy)).select().single(); if(error)throw error; tickets.push(rowToTicket(row)); }
    else{ tickets.push({id:'t'+Date.now()+Math.floor(Math.random()*1000),...copy}); saveLocal(); }
    render(); toast('복제되었어요 📋');
  }catch(e){ toast('복제 실패: '+(e.message||e)); }
}
function initLongPress(){
  const root=document.getElementById('viewRoot');
  root.addEventListener('pointerdown',e=>{
    const el=e.target.closest('[data-id]'); if(!el||e.target.closest('.cal-chip'))return;
    lpFired=false; lpX=e.clientX; lpY=e.clientY;
    clearTimeout(lpTimer);
    lpTimer=setTimeout(()=>{ lpFired=true; openActions(el.dataset.id); },460);
  });
  root.addEventListener('pointermove',e=>{ if(Math.hypot(e.clientX-lpX,e.clientY-lpY)>12)clearTimeout(lpTimer); });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>root.addEventListener(ev,()=>clearTimeout(lpTimer)));
  root.addEventListener('scroll',()=>clearTimeout(lpTimer),true);
  root.addEventListener('click',e=>{ if(lpFired||calSwiped){ e.preventDefault(); e.stopPropagation(); lpFired=false; calSwiped=false; } },true);
  root.addEventListener('contextmenu',e=>{ const el=e.target.closest('[data-id]'); if(el&&!e.target.closest('.cal-chip')){ e.preventDefault(); openActions(el.dataset.id); } });
}
function initCalSwipe(){
  const root=document.getElementById('viewRoot');
  root.addEventListener('touchstart',e=>{ const g=e.target.closest('.cal-grid'); if(!g){calTrack=false;return;} const t=e.touches[0]; calSX=t.clientX; calSY=t.clientY; calTrack=true; calSwiped=false; },{passive:true});
  root.addEventListener('touchmove',e=>{ if(!calTrack)return; const t=e.touches[0]; if(Math.abs(t.clientX-calSX)>Math.abs(t.clientY-calSY)&&Math.abs(t.clientX-calSX)>12)calSwiped=true; },{passive:true});
  root.addEventListener('touchend',e=>{ if(calTrack&&calSwiped){ const dx=e.changedTouches[0].clientX-calSX; if(Math.abs(dx)>45)calMove(dx<0?1:-1); } calTrack=false; });
}

boot();
initLongPress();
initCalSwipe();
initSheetDrag();
/* 처리 현황·새 티켓 자동 갱신(팝업 열려있을 땐 건너뜀) */
setInterval(()=>{ if(mode==='cloud'&&sb&&!document.querySelector('.overlay.on')&&!document.hidden)refresh(); }, 25000);
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
