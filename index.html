let shareId=null, shareImgB64=null;
function ticketText(t){
  const L=[`🎫 ${t.name||'(공연명 없음)'}`];
  if(t.vendor)L.push(`예매처: ${t.vendor}`);
  if(t.date)L.push(`일시: ${fmtDate(t.date,t.time)}`);
  if(Number(t.qty))L.push(`매수: ${Number(t.qty)}`);
  if(Number(t.price))L.push(`가격: ${won(t.price)}원`);
  const seatStr=s=>{const no=s.no?(/^\d+$/.test(s.no)?s.no+'번':s.no):'';
    return [s.grade,(s.floor?s.floor+'층':''),(s.zone?s.zone+'구역':''),(s.row?s.row+'열':''),no].filter(Boolean).join(' ');};
  const ss=(t.seats||[]).filter(s=>s.grade||s.floor||s.zone||s.row||s.no).map(seatStr).join(' / ');
  if(ss)L.push(`좌석: ${ss}`);
  if(t.transfer&&t.transfer.done)L.push(`양도: ${[t.transfer.price?won(t.transfer.price)+'원':'',t.transfer.to,t.transfer.platform].filter(Boolean).join(' · ')||'완료'}`);
  if(t.memo)L.push(`메모: ${t.memo}`);
  return L.join('\n');
}

// 글자 줄바꿈(한글은 글자 단위)
function wrapCanvasText(x,text,maxW){
  let line='',out=[];
  for(const ch of String(text)){
    if(ch==='\n'){ out.push(line); line=''; continue; }
    if(line&&x.measureText(line+ch).width>maxW){ out.push(line); line=ch; } else line+=ch;
  }
  if(line)out.push(line);
  return out.length?out:[''];
}
// 공연정보를 '실물 티켓 패스' 이미지 1장으로(앱 홈 히어로와 같은 모양. 스크린샷은 별도 파일로 함께 보냄)
function composeInfoCard(t){
  const W=880, M=44, r=30, pad=38;                 // 캔버스 폭·바깥 여백·티켓 라운드·티켓 안 여백
  const TW=W-M*2, cw=TW-pad*2;                     // 티켓 폭·내용 폭
  const c=document.createElement('canvas'), x=c.getContext('2d');
  const vcol=colorFor(t.vendor);
  const today=ymd(new Date());
  const dd=t.date?ddayInfo(t.date,today):null;
  const xfd=t.transfer&&t.transfer.done;
  const badge=xfd?'양도완료':(dd?(dd.diff<0?'관람 완료':(dd.diff===1?'내일':dd.label)):'날짜 미정');
  const rr=(x0,y0,w,h,rad)=>{x.beginPath();x.moveTo(x0+rad,y0);x.arcTo(x0+w,y0,x0+w,y0+h,rad);x.arcTo(x0+w,y0+h,x0,y0+h,rad);x.arcTo(x0,y0+h,x0,y0,rad);x.arcTo(x0,y0,x0+w,y0,rad);x.closePath();};
  // 내용 측정
  const titleFont='800 44px system-ui,-apple-system,sans-serif';
  const seatFont='500 24px system-ui,sans-serif';
  x.textBaseline='top';
  x.font=titleFont; const titleLines=wrapCanvasText(x,t.name||'(공연명 없음)',cw);
  const seatStr=s=>{const base=seatLabel(s);return s.x?base+' (취소)':s.t?base+' (양도)':base;};
  const seats=(t.seats||[]).filter(s=>s.grade||s.floor||s.zone||s.row||s.no).map(seatStr);
  x.font=seatFont; const seatLines=seats.length?wrapCanvasText(x,seats.join('  ·  '),cw-190):['좌석 정보 없음'];
  const qp=[Number(t.qty)?Number(t.qty)+'매':'',Number(t.price)?'₩'+won(t.price):''].filter(Boolean).join(' · ');
  const topH=pad+34+18+titleLines.length*56+40+30;                              // 헤더+제목+일시
  const botH=24+Math.max(seatLines.length*34+(qp?40:0)+(xfd?34:0),96)+30;       // 좌석/가격(+양도) vs 바코드
  const TH=topH+botH, H=TH+M*2;
  c.width=W; c.height=H;
  // 배경(연회색) + 티켓 흰 카드
  x.fillStyle='#eef0f4'; x.fillRect(0,0,W,H);
  x.save(); x.shadowColor='rgba(20,25,40,.18)'; x.shadowBlur=30; x.shadowOffsetY=10;
  rr(M,M,TW,TH,r); x.fillStyle='#ffffff'; x.fill(); x.restore();
  // 헤더: 예매처(색점) + D-day 칩
  let y=M+pad;
  x.beginPath(); x.arc(M+pad+9,y+12,9,0,7); x.fillStyle=vcol; x.fill();
  x.font='700 23px system-ui,sans-serif'; x.fillStyle='#8b8d95'; x.fillText(t.vendor||'',M+pad+28,y);
  x.font='800 23px system-ui,sans-serif';
  const bw=x.measureText(badge).width+36;
  rr(M+TW-pad-bw,y-6,bw,40,11); x.fillStyle='#191b23'; x.fill();
  x.fillStyle='#ffffff'; x.fillText(badge,M+TW-pad-bw+18,y+1);
  y+=34+18;
  // 제목 + 일시
  x.font=titleFont; x.fillStyle='#191b23';
  titleLines.forEach(l=>{x.fillText(l,M+pad,y); y+=56;});
  y+=6;
  x.font='600 24px ui-monospace,Consolas,monospace'; x.fillStyle='#8b8d95';
  x.fillText(t.date?fmtDate(t.date,t.time):'날짜 미정',M+pad,y);
  // 절취선 + 양쪽 노치
  const py=M+topH;
  x.setLineDash([10,8]); x.strokeStyle='#e4e4e8'; x.lineWidth=3;
  x.beginPath(); x.moveTo(M+22,py); x.lineTo(M+TW-22,py); x.stroke(); x.setLineDash([]);
  x.fillStyle='#eef0f4';
  x.beginPath(); x.arc(M,py,16,0,7); x.fill();
  x.beginPath(); x.arc(M+TW,py,16,0,7); x.fill();
  // 아래: 좌석·매수·가격(좌) + 바코드(우)
  y=py+28;
  x.font=seatFont; x.fillStyle='#4c4e56';
  seatLines.forEach(l=>{x.fillText(l,M+pad,y); y+=34;});
  if(qp){ x.font='800 28px system-ui,sans-serif'; x.fillStyle='#191b23'; x.fillText(qp,M+pad,y+4); }
  if(xfd){ const xi=[t.transfer.price?'₩'+won(t.transfer.price):'',t.transfer.platform].filter(Boolean).join(' · '); if(xi){x.font='600 21px system-ui,sans-serif'; x.fillStyle='#8b8d95'; x.fillText('양도 '+xi,M+pad,y+44);} }
  // 바코드(id 기반 결정적 패턴)
  const bx=M+TW-pad-150, by=py+26, seed=String(t.id).split('').reduce((a,ch)=>(a*31+ch.charCodeAt(0))>>>0,7);
  let sx2=bx, s2=seed; x.fillStyle='#191b23';
  while(sx2<bx+150){ s2=(s2*1103515245+12345)>>>0; const w2=1.5+(s2%4)*1.6; x.fillRect(sx2,by,w2,60); sx2+=w2+2+(s2>>8)%4; }
  x.font='600 17px ui-monospace,Consolas,monospace'; x.fillStyle='#b0b2b9';
  x.fillText(ticketNo(t),bx,by+72);
  // 양도완료 스탬프
  if(xfd){ x.save(); x.translate(W/2,py); x.rotate(-0.22); x.globalAlpha=.3;
    x.font='900 54px system-ui,sans-serif'; const sw=x.measureText('양도완료').width;
    x.strokeStyle='#2E63F0'; x.lineWidth=5; rr(-sw/2-24,-46,sw+48,92,14); x.stroke();
    x.fillStyle='#2E63F0'; x.fillText('양도완료',-sw/2,-27); x.restore(); }
  return c.toDataURL('image/jpeg',0.92).split(',')[1];
}

/* ===== AI 캡처 업로드 (예매내역 자동 인식 대기열) ===== */
function fileToB64(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      // 좌석 등 작은 글씨 인식률을 위해 해상도·품질을 넉넉히(긴 변 2200px, JPEG 0.92)
      const max=2200; let w=img.naturalWidth,h=img.naturalHeight;
      const s=Math.min(1,max/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      const ctx=c.getContext('2d'); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',0.92).split(',')[1]);
    };
    img.onerror=rej;
    const fr=new FileReader(); fr.onload=()=>{img.src=fr.result;}; fr.onerror=rej; fr.readAsDataURL(file);
  });
}
async function aiUpload(e){

  refresh();
}

let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2000);}

/* ===== overlay manager: 팝업마다 history 항목 1개 → 뒤로가기가 항상 최상단 팝업만 닫음 ===== */
let _ovStack=[], _ignorePop=false;
function openOv(id){
  const el=document.getElementById(id), sh=el.querySelector('.sheet');
  if(sh){sh.style.transition='';sh.style.transform='';}
  el.classList.add('on'); document.body.style.overflow='hidden';
  _ovStack.push(id);
  history.pushState({ov:_ovStack.length},'');
}
function closeOv(id){
  const idx=_ovStack.lastIndexOf(id);
  document.getElementById(id).classList.remove('on');
  if(idx===-1){ if(!_ovStack.length)document.body.style.overflow=''; return; }
  _ovStack.splice(idx,1);
  if(!_ovStack.length)document.body.style.overflow='';
  // 이 팝업을 위해 push했던 history 항목 1개 소비(뒤로가기 유발하되 popstate는 무시)
  _ignorePop=true; history.back();
}
window.addEventListener('popstate',()=>{
  if(_ignorePop){_ignorePop=false;return;}
  // 사용자가 뒤로가기 → 최상단 팝업만 닫기(앱은 유지)
  const id=_ovStack.pop();
  if(id){ document.getElementById(id).classList.remove('on'); if(!_ovStack.length)document.body.style.overflow=''; }
});
function initSheetDrag(){
  document.querySelectorAll('.overlay:not(.img-view-overlay):not(.centered) .sheet').forEach(sheet=>{
    let sy=0,cy=0,drag=false;
    sheet.addEventListener('touchstart',e=>{ if(sheet.scrollTop>2){drag=false;return;} sy=e.touches[0].clientY;cy=0;drag=true;sheet.style.transition='none'; },{passive:true});
    sheet.addEventListener('touchmove',e=>{ if(!drag)return; cy=e.touches[0].clientY-sy; sheet.style.transform=cy>0?('translateY('+cy+'px)'):''; },{passive:true});
    sheet.addEventListener('touchend',()=>{ if(!drag)return; drag=false; sheet.style.transition='transform .22s cubic-bezier(.2,.8,.2,1)';
      if(cy>110){ sheet.style.transform='translateY(100%)'; const ov=sheet.closest('.overlay'); setTimeout(()=>{ sheet.style.transform='';sheet.style.transition=''; if(ov)closeOv(ov.id); },170); }
      else{ sheet.style.transform=''; } cy=0; });
  });
}

/* ===== long-press action menu ===== */
let actionId=null, lpTimer=null, lpFired=false, lpX=0, lpY=0;
let calSX=0, calSY=0, calSwiped=false, calTrack=false, swInGrid=false;
const SWIPE_VIEWS=['home','calendar','list']; // 좌우 스와이프로 순환할 뷰 순서(독 버튼 순서와 동일)
function swipeView(dir){ const i=SWIPE_VIEWS.indexOf(view), n=i+dir; if(i<0||n<0||n>=SWIPE_VIEWS.length)return; setView(SWIPE_VIEWS[n]); } // dir +1=다음(왼쪽 스와이프)·-1=이전. 양끝에선 무시(순환 안 함)
function openActions(id){
  const t=tickets.find(x=>String(x.id)===String(id)); if(!t)return;
  actionId=id; document.getElementById('actTitle').textContent=t.name||'티켓';
  openOv('actionOverlay');
  if(navigator.vibrate)navigator.vibrate(15);
}
function closeActions(){ closeOv('actionOverlay'); }
function actEdit(){ const id=actionId; closeActions(); edit(id); }
function actDelete(){ const id=actionId; closeActions(); del(id); }
function actDuplicate(){ const id=actionId; closeActions(); duplicateTicket(id); }
function actShare(){ const id=actionId; closeActions(); openShare(id); }
async function duplicateTicket(id){
  const t=tickets.find(x=>String(x.id)===String(id)); if(!t)return;
  const copy={vendor:t.vendor,name:t.name,date:t.date,time:t.time,qty:t.qty,price:t.price,memo:t.memo,
    seats:(t.seats||[]).map(s=>({...s})), transfer:{...(t.transfer||{done:false})}};
  try{
    if(mode==='cloud'&&sb){ const {data:row,error}=await sb.from('tickets').insert(ticketToDB(copy)).select().single(); if(error)throw error; tickets.push(rowToTicket(row)); }
    else{ tickets.push({id:'t'+Date.now()+Math.floor(Math.random()*1000),...copy}); saveLocal(); }
    dataVer++;
    render(); toast('복제되었어요 📋');
  }catch(e){ toast('복제 실패: '+(e.message||e)); }
}
function initLongPress(){
  const root=document.getElementById('viewRoot');
  root.addEventListener('pointerdown',e=>{
    const el=e.target.closest('[data-id]'); if(!el||e.target.closest('.cal-chip'))return;
    lpFired=false; lpX=e.clientX; lpY=e.clientY;
    clearTimeout(lpTimer);
    lpTimer=setTimeout(()=>{ lpFired=true; openActions(el.dataset.id); },460);
  });
  root.addEventListener('pointermove',e=>{ if(Math.hypot(e.clientX-lpX,e.clientY-lpY)>12)clearTimeout(lpTimer); });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>root.addEventListener(ev,()=>clearTimeout(lpTimer)));
  root.addEventListener('scroll',()=>clearTimeout(lpTimer),true);
  root.addEventListener('click',e=>{ if(lpFired||calSwiped){ e.preventDefault(); e.stopPropagation(); lpFired=false; calSwiped=false; } },true);
  root.addEventListener('contextmenu',e=>{ const el=e.target.closest('[data-id]'); if(el&&!e.target.closest('.cal-chip')){ e.preventDefault(); openActions(el.dataset.id); } });
}
// 손가락을 따라 화면이 실시간으로 움직이는 인터랙티브 뷰 전환(아이폰 페이지 전환처럼).
// - 캘린더 그리드 안: 좌우 드래그로 월 이동(손가락 따라 살짝 이동 후 릴리즈 시 확정)
// - 그 외 영역·타일·리스트: 인입 뷰를 실제로 렌더해 손가락 따라 슬라이드(임계 넘으면 전환, 아니면 되돌림)
// - 헤더·검색창은 #viewRoot 밖이라 여기 안 잡힘
function initCalSwipe(){
  const root=document.getElementById('viewRoot');
  let sx=0, sy=0, active=false, decided=false, kind=null, dir=0, W=0, pane=null, commit=null, settleEase='', settleMs=200, passRatio=0.22;
  const EASE='transform .2s cubic-bezier(.2,.8,.2,1)'; // 뷰 전환 릴리즈(빠릿)
  const EASE_MONTH='transform .36s cubic-bezier(.3,.1,.3,1)'; // 월 이동 릴리즈(부드럽게 안착 — 쫀드기처럼 빨려가지 않게)
  function clearPane(){ if(pane){ pane.remove(); pane=null; } }
  function endSwipe(){ document.body.classList.remove('swiping'); }
  function resetRoot(anim){ root.style.transition=anim?settleEase:'none'; root.style.transform='translate3d(0,0,0)'; }
  function makePane(html){ // 인입 콘텐츠를 현재 뷰 위에 겹쳐 배치(방향 반대편에서 시작)
    pane=document.createElement('div'); pane.className='view-pane'; pane.style.position='absolute';
    pane.innerHTML=html;
    root.parentNode.insertBefore(pane, root.nextSibling);
    pane.style.top=root.offsetTop+'px'; pane.style.left=root.offsetLeft+'px'; pane.style.width=root.offsetWidth+'px';
    pane.style.transition='none'; root.style.transition='none';
    pane.style.transform='translate3d('+(dir>0?W:-W)+'px,0,0)';
  }
  root.addEventListener('touchstart',e=>{
    if(_viewAnim||e.touches.length>1)return;
    if(e.target.closest('.pdeck'))return; // 홈 패스 캐러셀은 자체 가로 스크롤 → 뷰 전환 드래그 제외
    const t=e.touches[0]; sx=t.clientX; sy=t.clientY; active=true; decided=false; kind=null; dir=0; commit=null; calSwiped=false;
    settleEase=EASE; settleMs=200; passRatio=0.22; // 기본(뷰 전환). 월 이동이면 아래에서 교체
    W=root.offsetWidth||320;
  },{passive:true});
  root.addEventListener('touchmove',e=>{
    if(!active)return;
    if(e.touches.length>1&&!decided){ active=false; return; } // 두 번째 손가락(핀치) → 스와이프 포기
    const t=e.touches[0], dx=t.clientX-sx, dy=t.clientY-sy;
    if(!decided){
      if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
      if(Math.abs(dy)>=Math.abs(dx)){ active=false; return; } // 세로 제스처 → 스크롤에 양보
      decided=true; calSwiped=true; dir=dx<0?1:-1;
      document.body.classList.add('swiping'); // 무한 애니메이션 일시정지 + GPU 레이어 승격
      const inGrid=view==='calendar'&&!!e.target.closest('.cal-grid');
      if(inGrid){ // 캘린더 월 이동도 뷰 전환과 동일하게 인접 달을 실제 렌더해 손가락 따라 슬라이드
        let ty=calY, tm=calM+dir; if(tm<0){tm=11;ty--;} if(tm>11){tm=0;ty++;}
        settleEase=EASE_MONTH; settleMs=380; passRatio=0.14; // 월 이동: 안착은 부드럽게, 임계값은 더 낮춰 민감하게
        kind='pane'; makePane(calHTMLFor(ty,tm)); commit=()=>{ calY=ty; calM=tm; };
      }else{
        const ni=SWIPE_VIEWS.indexOf(view)+dir;
        if(ni<0||ni>=SWIPE_VIEWS.length){ kind='edge'; } // 양끝 → 고무줄
        else{ kind='pane'; makePane(viewHTML(SWIPE_VIEWS[ni]));
          commit=()=>{ view=SWIPE_VIEWS[ni]; localStorage.setItem(LS_VIEW,JSON.stringify(view)); if(view==='calendar'||view==='home'){selectMode=false;selectedIds.clear();} }; }
      }
    }
    if(kind==='pane'){
      e.preventDefault();
      const dxc=dir>0?Math.max(-W,Math.min(0,dx)):Math.min(W,Math.max(0,dx)); // 방향 고정 + 한 화면 이내
      root.style.transform='translate3d('+dxc+'px,0,0)';
      pane.style.transform='translate3d('+((dir>0?W:-W)+dxc)+'px,0,0)';
    }else if(kind==='edge'){
      e.preventDefault(); root.style.transform='translate3d('+dx*0.28+'px,0,0)'; // 양끝: 고무줄
    }
  },{passive:false});
  root.addEventListener('touchend',e=>{
    if(!active)return; active=false; if(!decided){ return; }
    const dx=e.changedTouches[0].clientX-sx, pass=Math.abs(dx)>W*passRatio;
    if(kind==='pane'){
      root.style.transition=settleEase; pane.style.transition=settleEase;
      if(pass){ // 전환 확정: 현재 뷰 완전히 밀어내고 인입 뷰를 제자리로
        root.style.transform='translate3d('+(dir>0?-W:W)+'px,0,0)'; pane.style.transform='translate3d(0,0,0)';
        setTimeout(()=>{ commit(); resetRoot(false); render(); clearPane(); endSwipe(); },settleMs);
      }else{ // 임계 미달 → 되돌림
        resetRoot(true); pane.style.transform='translate3d('+(dir>0?W:-W)+'px,0,0)'; setTimeout(()=>{ clearPane(); endSwipe(); },settleMs+10);
      }
    }else if(kind==='edge'){ resetRoot(true); setTimeout(()=>{root.style.transition=''; endSwipe();},settleMs+10); }
  });
  root.addEventListener('touchcancel',()=>{ if(active){ active=false; if(kind==='pane'){resetRoot(true);setTimeout(()=>{clearPane();endSwipe();},settleMs+10);}else{resetRoot(true);endSwipe();} } });
}

boot();
initLongPress();
initCalSwipe();
initSheetDrag();
initImgZoom();

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
