<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta id="metaTheme" name="theme-color" content="#f4f6fb">
<title>티켓 보관함</title>
<script>
  // 첫 페인트 전에 테마 지정(깜빡임 방지)
  (function(){try{var s=localStorage.getItem('tm_theme')||'auto';var d=s==='dark'||(s!=='light'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');var m=document.getElementById('metaTheme');if(m)m.content=d?'#0b0e15':'#f4f6fb';}catch(e){}})();
</script>
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="티켓 보관함">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg-grad:linear-gradient(160deg,#f8fafc 0%,#eef2fb 100%);
    --card:#ffffff; --ink:#1f2637; --ink-soft:#5b6474; --ink-faint:#98a0b3;
    --line:#e9edf5; --accent:#6c8cff; --accent-ink:#4361ee; --accent-soft:#eef2ff;
    --danger:#ff6b7a; --danger-ink:#e5455c; --danger-soft:#fff2f4; --danger-bd:#ffd2d9; --ok:#3ecf8e; --warn:#f5a524;
    --shadow-sm:0 1px 3px rgba(31,46,84,.06);
    --shadow:0 6px 18px -8px rgba(31,46,84,.20), 0 2px 6px -3px rgba(31,46,84,.12);
    --shadow-lg:0 20px 44px -18px rgba(31,46,84,.32);
    --inset:inset 0 1px 0 rgba(255,255,255,.75);
    --glass:rgba(255,255,255,.52);
    --glass2:rgba(255,255,255,.78);
    --card-solid:rgba(255,255,255,.9); /* 카드 표면(불투명, 틴트+광택으로 글라스 표현) */
    --glass-bd:rgba(255,255,255,.75);
    --blur:saturate(180%) blur(14px);
    --sheen:rgba(255,255,255,.62); /* 리퀴드 글래스 상단 빛반사 */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;
    background:#eef2fb;color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4;min-height:100vh;position:relative}
  body::before{content:"";position:fixed;inset:-12%;z-index:-1;pointer-events:none;
    background:
      radial-gradient(38% 32% at 12% 8%, rgba(124,151,255,.42), transparent 70%),
      radial-gradient(32% 28% at 90% 14%, rgba(255,143,177,.34), transparent 70%),
      radial-gradient(44% 40% at 84% 90%, rgba(77,212,172,.32), transparent 70%),
      radial-gradient(40% 38% at 6% 88%, rgba(176,136,255,.34), transparent 70%),
      linear-gradient(160deg,#f6f8fe,#e9f0fb);
    transform:translateZ(0);backface-visibility:hidden;}
  .wrap{max-width:680px;margin:0 auto;padding:12px 12px 96px;overflow-x:clip;position:relative} /* 뷰 전환 슬라이드 시 가로 스크롤바 방지 + 드래그 pane 기준 */
  #viewRoot{touch-action:pan-y;will-change:transform} /* 세로는 브라우저 스크롤, 가로는 JS가 뷰 전환 드래그로 처리 */
  .view-pane{will-change:transform;z-index:2} /* 스와이프 중 인입되는 뷰(현재 뷰 위로 슬라이드) */

  /* top bar */
  .topbar{display:flex;align-items:center;gap:10px;justify-content:space-between;margin-bottom:10px}
  .topbar-right{display:flex;align-items:center;gap:8px}
  .seg{display:inline-flex;background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:1px solid var(--glass-bd);border-radius:12px;padding:3px;box-shadow:var(--shadow-sm),var(--inset)}
  .seg button{border:none;background:transparent;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:.15s}
  .seg button.on{background:#fff;color:var(--accent-ink);box-shadow:var(--shadow-sm)}
  .pill{border:1px solid var(--glass-bd);background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:999px;padding:7px 11px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink-soft);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:5px;white-space:nowrap}
  .pill .dot{width:7px;height:7px;border-radius:99px;background:var(--ink-faint)}
  .pill.on{color:var(--accent-ink);border-color:#d6def8;background:#f4f7ff}
  .pill.on .dot{background:var(--ok)}
  .icon-btn{border:1px solid var(--glass-bd);background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:999px;width:32px;height:32px;flex:0 0 auto;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center}
  .icon-btn.on{background:var(--danger-soft);border-color:var(--danger-bd);color:var(--danger-ink)}

  /* stats strip */
  .stats{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin:2px 2px 10px}
  .stats b{color:var(--ink);font-weight:800}
  .stats .sep{color:var(--ink-faint)}
  .stats .x b{color:var(--warn)}
  #pending{margin-bottom:6px}
  .pend-card{display:flex;align-items:center;gap:8px;background:linear-gradient(145deg,#fff8ea,#fffdf8);border:1px solid #f2e3bf;border-radius:12px;padding:9px 12px;font-size:12.5px;color:#8a6d1f;margin-bottom:8px;box-shadow:var(--shadow-sm),var(--inset)}
  .pend-card b{color:#7a5b12;font-weight:800}
  .pend-card .pend-sub{color:var(--ink-faint)}
  .pend-card{justify-content:space-between}
  .pend-card.err{background:#fff1f2;border-color:#ffd7db;color:var(--danger)}
  .pend-actions{display:flex;gap:4px;margin-left:auto}
  .pend-actions button{border:none;background:transparent;color:inherit;font-size:15px;cursor:pointer;line-height:1;padding:2px 4px;opacity:.75}
  .pend-actions button:active{opacity:1}
  .pend-card.err .pend-actions button{color:var(--danger)}
  .pend-spin{width:14px;height:14px;border:2px solid #f0dca8;border-top-color:#e0a92e;border-radius:50%;animation:spin .8s linear infinite;flex:none;display:inline-block;vertical-align:middle;margin-right:5px}
  .pend-chev{margin-left:auto;font-size:18px;color:var(--ink-faint);font-weight:700}
  .pend-item{display:flex;gap:12px;padding:10px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;background:var(--card)}
  .pend-thumb{width:72px;height:72px;flex:none;object-fit:cover;border-radius:10px;cursor:pointer;background:#eef1f7;box-shadow:var(--shadow-sm)}
  .pend-item-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;gap:8px}
  .pend-st{font-size:13px;font-weight:700;color:#8a6d1f;display:flex;align-items:center}
  .pend-st.err{color:var(--danger)}
  .pend-item-btns{display:flex;gap:8px}
  .pend-item-btns .sb-btn{flex:1;text-align:center}

  /* search */
  .search{position:relative;margin-bottom:12px}
  .search input{width:100%;border:1px solid var(--glass-bd);background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:13px;padding:10px 12px 10px 36px;font-size:14px;color:var(--ink);box-shadow:var(--shadow-sm);outline:none}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-faint)}

  /* month grouping header */
  .month-head{display:flex;align-items:center;gap:8px;margin:16px 2px 9px;font-size:13px;font-weight:800;color:var(--ink-soft)}
  .grouped>.month-head:first-child,.list>.month-head:first-child{margin-top:2px}
  .month-head .mh-count{font-size:11px;font-weight:700;color:var(--ink-faint);background:var(--card-solid);border:1px solid var(--line);padding:1px 8px;border-radius:999px}
  .month-head .mh-line{flex:1;height:1px;background:var(--line)}

  /* tile grid — 위:언제 / 가운데:공연명 / 아래:등급·가격 */
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(146px,1fr));gap:8px;align-items:stretch}
  .tk{position:relative;display:flex;flex-direction:column;height:126px;overflow:hidden;background:var(--card-solid);border:1px solid var(--glass-bd);border-radius:14px;padding:9px 10px;box-shadow:0 8px 18px -8px rgba(31,46,84,.28),0 2px 5px -2px rgba(31,46,84,.16),var(--inset);cursor:pointer;transition:transform .15s,box-shadow .15s;-webkit-touch-callout:none;user-select:none}
  .tk:active{box-shadow:0 3px 8px -4px rgba(31,46,84,.24),var(--inset)}
  .tk:active{transform:scale(.98)}
  .tk-top{display:flex;align-items:baseline;justify-content:space-between;gap:6px;height:18px;margin-bottom:3px}
  .tk-when{font-size:14.5px;font-weight:800;color:var(--ink);letter-spacing:-.3px;white-space:nowrap}
  .tk-when small{font-size:10px;font-weight:700;color:var(--ink-faint);margin-left:3px}
  .tk-when.nodate{color:var(--ink-faint)}
  .tk-vendor{display:flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;color:var(--ink-soft);white-space:nowrap;overflow:hidden;max-width:48%}
  .tk-vendor i{width:6px;height:6px;border-radius:99px;flex:none}
  .tk-vendor span{overflow:hidden;text-overflow:ellipsis}
  .tk-name{font-size:13px;font-weight:800;letter-spacing:-.3px;line-height:1.25;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:33px;margin-bottom:4px}
  .tk-seatline{font-size:11px;font-weight:700;color:var(--ink-soft);background:rgba(120,133,152,.12);border-radius:6px;padding:2px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;align-self:flex-start;max-width:100%;height:19px;line-height:15px}
  .tk-bottom{margin-top:auto;display:flex;align-items:baseline;justify-content:space-between;gap:6px;padding-top:6px;border-top:1px solid var(--line)}
  .tk-qty{font-size:11.5px;font-weight:800;color:var(--ink-soft);white-space:nowrap}
  .tk-price{font-size:13.5px;font-weight:800;color:var(--ink);white-space:nowrap}
  .tk-price.xf{color:var(--warn)}
  /* 양도된 티켓: 카드 자체를 다르게 */
  .tk.is-transfer{background:linear-gradient(180deg,#fff8ea,#fff2dc);border-color:#eeddb0}
  .tk.is-transfer .tk-when{color:#b07d17}
  .tk.is-transfer .tk-name{color:#7a5b12}
  .tk-ribbon{position:absolute;top:12px;right:-30px;width:110px;transform:rotate(40deg);background:linear-gradient(145deg,#ffbe52,#f5a524);color:#fff;font-size:9px;font-weight:800;text-align:center;padding:3px 0;letter-spacing:.4px;box-shadow:0 4px 9px -3px rgba(180,120,0,.55);pointer-events:none;z-index:1}
  .tk-ribbon.cancel{background:linear-gradient(145deg,#98a1b3,#6b7488);box-shadow:0 4px 9px -3px rgba(60,70,95,.45)}
  .tk.is-cancel{background:linear-gradient(180deg,#f1f3f8,#e7ebf2);border-color:#d2d9e4}
  .tk.is-cancel .tk-name{color:#5b6474}
  .xtag.cancel{background:#7c8598}
  .lrow.is-cancel{position:relative;background:linear-gradient(90deg,#eef1f6,#f6f8fb);border-color:#d2d9e4;padding-left:16px}
  .lrow.is-cancel::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:99px;background:linear-gradient(180deg,#98a1b3,#6b7488)}
  .lrow.is-cancel .nm{color:#5b6474}
  .tk-cam{font-size:12px;line-height:1}
  .badge{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:999px;color:#fff;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .xtag{font-size:9.5px;font-weight:800;color:#fff;background:var(--warn);padding:2px 6px;border-radius:999px;white-space:nowrap}
  .tk-share{border:none;background:#eef2ff;color:var(--accent-ink);border-radius:8px;width:26px;height:26px;font-size:13px;cursor:pointer;flex:none;line-height:1;padding:0}
  .tk-share:active{transform:scale(.9)}
  .lrow .tk-share{margin-left:auto}
  .chk{display:flex;align-items:center;gap:9px;background:#fbfcff;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:8px;cursor:pointer}
  .chk input{width:18px;height:18px;accent-color:var(--accent-ink)}
  .share-prev{white-space:pre-wrap;font-size:12.5px;color:var(--ink-soft);background:#f7f9fe;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin:0 0 10px;line-height:1.6}
  .share-thumb{width:100%;max-height:200px;object-fit:contain;border-radius:11px;border:1px solid var(--line);margin-bottom:12px;background:#fafbff}
  .tk-seat{display:inline-block;font-size:10px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);padding:2px 6px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58%}

  /* list */
  .list{display:flex;flex-direction:column;gap:7px}
  .lrow{display:flex;align-items:center;gap:11px;background:var(--card-solid);border:1px solid var(--glass-bd);border-radius:13px;padding:9px 12px;box-shadow:var(--shadow-sm),var(--inset);cursor:pointer;-webkit-touch-callout:none;user-select:none}
  .act-title{font-size:15px;font-weight:800;text-align:center;margin:2px 0 14px;color:var(--ink)}
  .act-btn{width:100%;border:1px solid rgba(255,255,255,.8);background:rgba(255,255,255,.62);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-radius:14px;padding:15px;font-size:15px;font-weight:700;color:var(--ink);font-family:inherit;cursor:pointer;margin-bottom:9px;text-align:center;box-shadow:var(--shadow-sm),var(--inset)}
  .act-btn:active{transform:scale(.98)}
  .act-btn.danger{color:var(--danger);background:rgba(255,241,242,.7);border-color:rgba(255,190,196,.6)}
  .act-btn.cancel{background:rgba(240,242,250,.7);color:var(--ink-soft);border-color:transparent;box-shadow:none;margin-top:2px}
  .lrow:active{background:var(--glass2)}
  .ldate{flex:none;width:42px;text-align:center;line-height:1.1}
  .ldate b{display:block;font-size:15px;font-weight:800;color:var(--ink)}
  .ldate span{font-size:10.5px;color:var(--ink-faint);font-weight:700}
  .ldate.none b{font-size:16px;color:var(--ink-faint)}
  .lbody{flex:1;min-width:0}
  .lname{font-size:14px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:6px}
  .lname .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lname .ltags{flex:none;margin-left:auto;display:flex;gap:4px}
  .lseat{font-size:11px;font-weight:700;color:var(--ink-soft);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lsub{font-size:11.5px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lsub b{color:var(--ink);font-weight:800}
  .lsub .lxf{color:var(--warn);font-weight:800}
  .lrow.is-transfer{position:relative;background:linear-gradient(90deg,#fff6e2,#fffaf0);border-color:#eeddb0;padding-left:16px}
  .lrow.is-transfer::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:99px;background:linear-gradient(180deg,#ffbe52,#f5a524)}
  .lrow.is-transfer .nm{color:#7a5b12}
  .ldot{flex:none;width:9px;height:9px;border-radius:99px}

  /* 다가오는 공연 요약 */
  .upnext{margin-bottom:14px}
  .up-h{font-size:13px;font-weight:800;color:var(--ink);margin:0 2px 9px;display:flex;align-items:center;gap:6px}
  .up-h span{font-size:11px;font-weight:700;color:var(--ink-faint);background:var(--card-solid);border:1px solid var(--line);padding:1px 8px;border-radius:999px}
  .up-scroll{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 4px;scroll-snap-type:x proximity}
  .up-scroll::-webkit-scrollbar{display:none}
  .up-card{position:relative;flex:0 0 auto;width:126px;height:92px;scroll-snap-align:start;background:var(--card-solid);border:1px solid var(--glass-bd);border-radius:13px;padding:8px 10px;box-shadow:var(--shadow),var(--inset);cursor:pointer;display:flex;flex-direction:column;gap:3px;overflow:hidden;animation:upIn .5s cubic-bezier(.2,.85,.25,1) both}
  .up-card:active{transform:scale(.97)}
  @keyframes upIn{from{opacity:0;transform:translateY(12px) scale(.96)}to{opacity:1;transform:none}}
  .upnext.no-anim .up-card{animation:none} /* 최초 로드 등 등장 애니메이션 생략(is-soon 광택·soon 펄스는 별도 셀렉터라 유지) */
  /* 리퀴드 글래스 광택이 카드 위를 훑고 지나가는 효과 */
  .up-card::after{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-18deg);pointer-events:none}
  .up-card.is-soon::after{animation:sheenSweep 3.2s ease-in-out infinite}
  @keyframes sheenSweep{0%{left:-60%}45%,100%{left:130%}}
  .up-dday{align-self:flex-start;font-size:10px;font-weight:800;color:#fff;background:linear-gradient(145deg,#7d97ff,#4361ee);padding:1px 7px;border-radius:999px}
  .up-dday.soon{background:linear-gradient(145deg,#ffb36b,#ff7a59);animation:soonPulse 1.9s ease-in-out infinite}
  @keyframes soonPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,122,89,.0)}50%{box-shadow:0 0 10px 1px rgba(255,122,89,.6)}}
  .up-name{font-size:12px;font-weight:800;line-height:1.25;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .up-date{font-size:10.5px;color:var(--accent-ink);font-weight:700;margin-top:auto}

  /* calendar */
  .cal{background:var(--card-solid);border:1px solid var(--glass-bd);border-radius:18px;padding:12px 10px;box-shadow:var(--shadow),var(--inset)}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px}
  .cal-head .mon{font-size:17px;font-weight:800}
  .cal-head button{border:1px solid var(--line);background:#fff;border-radius:10px;width:36px;height:36px;font-size:18px;cursor:pointer;color:var(--ink-soft);font-weight:800;box-shadow:var(--shadow-sm)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-wd{text-align:center;font-size:11px;font-weight:800;color:var(--ink-faint);padding:0 0 4px}
  .cal-wd.sun{color:#ff7a7a}.cal-wd.sat{color:#6f93ff}
  .cal-cell{position:relative;min-height:58px;border-radius:10px;padding:5px 3px 4px;background:#fff;border:1px solid var(--line);cursor:pointer;overflow:hidden;display:flex;flex-direction:column;align-items:center;gap:4px}
  .cal-cell.empty{background:transparent;border-color:transparent;cursor:default;padding:5px 3px 4px} /* .empty 플레이스홀더(padding:52px)가 새어들어와 첫 주가 세로로 길어지던 것 차단 */
  .cal-cell.has{background:var(--accent-soft);border-color:#d8e0ff}
  .cal-cell.has:active{filter:brightness(.96)}
  .cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
  .cal-day{font-size:13.5px;font-weight:800;color:var(--ink);line-height:1}
  .cal-cell.today .cal-day{color:var(--accent-ink)}
  .cal-cell.sun .cal-day{color:#ff7a7a}.cal-cell.sat .cal-day{color:#6f93ff}
  .cal-dots{display:flex;gap:3px;align-items:center;justify-content:center;flex-wrap:wrap;line-height:1}
  .cal-dots i{width:7px;height:7px;border-radius:50%;display:block}
  /* 다가올 공연(2주 이내): 점 통통 + 테두리 강조 + 밖으로 퍼지는 링(리플) — 튀는 색(핫핑크) */
  .cal-cell.up{overflow:visible;background:#fff0f6;animation:calBorder 1.5s ease-in-out infinite}
  .cal-cell.up .cal-dots i{animation:calDot 1.4s ease-in-out infinite}

  @keyframes calBorder{0%,100%{border-color:#ffb3d1}50%{border-color:#ff2d78}}
  .cal-cell.up::after{content:"";position:absolute;inset:-1px;border-radius:11px;border:2px solid #ff2d78;opacity:0;pointer-events:none;animation:calRipple 1.5s ease-out infinite}
  @keyframes calRipple{0%{transform:scale(1);opacity:.7}70%,100%{transform:scale(1.18);opacity:0}}
  .cal-dots em{font-size:9px;font-style:normal;font-weight:800;color:var(--ink-soft)}

  .cal-hint{text-align:center;font-size:10.5px;color:var(--ink-faint);margin-top:10px;user-select:none}
  .cal-daylist{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:7px}

  /* empty state */
  .empty{text-align:center;padding:52px 20px;color:var(--ink-faint)}
  .empty .ico{font-size:46px;margin-bottom:8px}
  .empty p{margin:3px 0;font-size:13.5px}
  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* util + fab */
  .util{display:flex;gap:8px;justify-content:center;margin-top:20px;flex-wrap:wrap}
  .util button{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:var(--shadow-sm)}
  /* 추가 스피드다이얼(부채꼴) */
  .fab-wrap{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;z-index:41}
  .fab{position:relative;z-index:2;background:linear-gradient(145deg,#7d97ff,#4361ee);color:#fff;border:none;padding:13px 24px;border-radius:999px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 12px 26px -8px rgba(67,97,238,.6),var(--inset);display:flex;align-items:center;gap:7px;font-family:inherit}
  .fab:active{transform:scale(.96)}
  .fab-plus{transition:transform .3s cubic-bezier(.2,.9,.3,1.3)}
  .fab-wrap.open .fab-plus{transform:rotate(135deg)}
  .fab-item{position:absolute;left:50%;bottom:5px;margin-left:-28px;z-index:1;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;color:#fff;font-family:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;box-shadow:0 12px 24px -8px rgba(31,46,84,.5),var(--inset);opacity:0;transform:translateY(8px) scale(.35);pointer-events:none;transition:transform .32s cubic-bezier(.2,.9,.3,1.45),opacity .2s}
  .fab-item .fi-ic{font-size:21px;line-height:1}
  .fab-item .fi-lb{font-size:9.5px;font-weight:800;letter-spacing:-.2px}
  .fab-item.manual{background:linear-gradient(145deg,#7d97ff,#4361ee)}
  .fab-item.photo{background:linear-gradient(145deg,#ffcf5e,#ff9f1c)}
  .fab-wrap.open .fab-item{opacity:1;pointer-events:auto}
  .fab-wrap.open .fab-item.manual{transform:translate(-54px,-66px) scale(1)}
  .fab-wrap.open .fab-item.photo{transform:translate(54px,-66px) scale(1);transition-delay:.05s}
  .fab-item:active{filter:brightness(.95)}
  .fab-scrim{position:fixed;inset:0;background:rgba(18,22,38,.28);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
  .fab-scrim.on{opacity:1;pointer-events:auto}

  .select-bar{position:fixed;left:0;right:0;bottom:0;z-index:45;display:none;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:var(--glass2,rgba(255,255,255,.85));-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-top:1px solid var(--glass-bd);box-shadow:0 -8px 24px -12px rgba(0,0,0,.25)}
  .select-bar.on{display:flex}
  .select-bar #selectCount{font-size:13px;font-weight:800;color:var(--ink-soft);white-space:nowrap}
  .sb-actions{display:flex;gap:8px}
  .sb-btn{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink-soft);box-shadow:var(--shadow-sm);transition:.12s}
  .sb-btn:active{transform:scale(.96)}
  .sb-btn.danger{background:var(--danger-soft);color:var(--danger-ink);border:1px solid var(--danger-bd);font-weight:800}
  .sb-btn.danger:active{background:#ffe6ea}
  body.selecting .fab-wrap,body.selecting .fab-settings{display:none}
  .fab-settings{position:fixed;right:16px;bottom:24px;z-index:41;width:48px;height:48px;border-radius:50%;border:1px solid var(--glass-bd);background:var(--card-solid);color:var(--ink-soft);font-size:20px;cursor:pointer;box-shadow:var(--shadow),var(--inset);display:flex;align-items:center;justify-content:center}
  .fab-settings:active{transform:scale(.94)}
  .tk-check{position:absolute;top:10px;left:10px;width:20px;height:20px;border-radius:50%;border:2px solid #c9d2e6;background:#fff;box-shadow:var(--shadow-sm);z-index:2}
  .tk-check.on{background:var(--accent,#4361ee);border-color:var(--accent,#4361ee)}
  .tk-check.on::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
  .tk.sel-mode{position:relative;padding-left:34px}
  .lrow .tk-check{position:static;margin-right:2px}

  /* sheets / overlays */
  .overlay{position:fixed;inset:0;background:rgba(26,31,52,.30);-webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.on{display:flex;animation:fade .18s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{position:relative;background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(244,247,255,.9));-webkit-backdrop-filter:saturate(200%) blur(24px);backdrop-filter:saturate(200%) blur(24px);width:100%;max-width:680px;border-radius:26px 26px 0 0;max-height:92vh;overflow-y:auto;padding:6px 16px 24px;box-shadow:0 -20px 50px -14px rgba(31,46,84,.34),inset 0 1px 0 rgba(255,255,255,.95);border-top:1px solid rgba(255,255,255,.9);animation:up .26s cubic-bezier(.2,.8,.2,1)}
  .sheet::before{content:"";position:absolute;top:0;left:0;right:0;height:120px;border-radius:26px 26px 0 0;pointer-events:none;z-index:0;background:radial-gradient(80% 100% at 20% 0%,rgba(124,151,255,.16),transparent 70%),radial-gradient(80% 100% at 85% 0%,rgba(255,143,177,.13),transparent 70%)}
  .sheet>*{position:relative;z-index:1}
  @keyframes up{from{transform:translateY(36px)}to{transform:none}}
  .grab{width:42px;height:5px;background:#dfe4f0;border-radius:99px;margin:8px auto 8px}
  /* 중앙에 뜨는 '진짜 팝업'(아래서 올라오는 시트 대신) */
  .overlay.centered{align-items:center;padding:18px}
  .overlay.centered .sheet{width:100%;max-width:460px;border-radius:22px;max-height:86vh;animation:popIn .2s cubic-bezier(.2,.85,.25,1)}
  .overlay.centered .sheet::before{border-radius:22px 22px 0 0}
  .overlay.centered .grab{display:none}
  @keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
  /* 금액 상세(실지출·양도차익) */
  .bd-link{cursor:pointer;display:inline-flex;align-items:center;padding:1px 7px;border-radius:999px;background:rgba(124,151,255,.13);transition:background .15s,transform .08s}
  .bd-link:hover{background:rgba(124,151,255,.2)}
  .bd-link:active{transform:scale(.95);background:rgba(124,151,255,.28)}
  .bd-link::after{content:"›";font-weight:800;opacity:.5;margin-left:3px}
  :root[data-theme="dark"] .bd-link{background:rgba(124,151,255,.2)}
  .bd-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:11px 6px;border-bottom:1px solid var(--line);cursor:pointer}
  .bd-row:active{background:rgba(124,151,255,.08)}
  .bd-l{min-width:0}
  .bd-nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bd-calc{font-size:11px;color:var(--ink-soft);margin-top:3px;line-height:1.4}
  .bd-v{font-weight:800;font-size:14px;white-space:nowrap}
  .bd-total{display:flex;justify-content:space-between;align-items:center;padding:13px 6px 2px;margin-top:4px;border-top:2px solid var(--line);font-weight:800}
  .bd-total .bd-v{font-size:16px}
  .bd-pos{color:var(--accent)} .bd-neg{color:var(--warn)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .modal-head h2{margin:0}
  .modal-head-actions{display:flex;gap:6px}
  .img-view-overlay{background:rgba(10,12,20,.92)}
  .img-view-overlay .sheet{background:transparent;box-shadow:none;-webkit-backdrop-filter:none;backdrop-filter:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;overflow:hidden}
  .img-view-stage{width:100%;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none}
  .img-view-overlay img{max-width:100%;max-height:80vh;border-radius:14px;box-shadow:var(--shadow-lg);transform-origin:center center;will-change:transform;user-select:none;-webkit-user-drag:none}
  .img-view-hint{color:rgba(255,255,255,.55);font-size:12px;margin-top:6px}
  .img-view-close{margin-top:16px;border:none;background:rgba(255,255,255,.15);color:#fff;border-radius:999px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .sheet h2{font-size:17px;font-weight:800;margin:4px 2px 14px;letter-spacing:-.4px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin:0 2px 5px}
  .field input,.field textarea{width:100%;border:1px solid var(--line);background:#fbfcff;border-radius:11px;padding:11px 12px;font-size:15px;color:var(--ink);outline:none;font-family:inherit}
  .field input:focus,.field textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-soft)}
  .field textarea{resize:vertical;min-height:52px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  /* vendor button */
  .vbtn{width:100%;border:1px solid var(--line);background:#fbfcff;border-radius:11px;padding:11px 12px;font-size:15px;color:var(--ink);font-family:inherit;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
  .vbtn .vlabel{display:flex;align-items:center;gap:8px}
  .vbtn .vdot{width:12px;height:12px;border-radius:99px}
  .vbtn .chev{color:var(--ink-faint);font-size:13px}
  .vbtn.placeholder{color:var(--ink-faint)}
  /* seat editor */
  .seat-edit{border:1px solid var(--line);border-radius:12px;padding:34px 10px 10px;margin-bottom:8px;background:#fafbff;position:relative}
  .seat-edit .sgrid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seat-edit .sgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
  .seat-flags{position:absolute;top:8px;left:10px;display:flex;gap:7px}

  .cn-tag{font-size:10px;color:#fff;background:var(--danger);padding:1px 6px;border-radius:99px}

  .seat-edit .rm{position:absolute;top:7px;right:8px;border:1px solid var(--danger-bd);background:var(--danger-soft);color:var(--danger-ink);border-radius:8px;height:24px;padding:0 10px;font-size:12px;font-weight:700;cursor:pointer;line-height:22px}
  .seat-edit .rm::before{content:"삭제 "}

  .seat-edit input{padding:9px 10px;font-size:14px}
  .gwrap{display:flex;flex-direction:column}
  .gbtn{width:100%;border:1px solid var(--line);background:#fbfcff;border-radius:9px;padding:9px 10px;font-size:14px;color:var(--ink);font-family:inherit;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:700}

  .add-seat{width:100%;border:1px dashed var(--accent);background:var(--accent-soft);color:var(--accent-ink);border-radius:11px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:4px}
  .cancel-note{margin-top:10px;border:1px solid var(--danger-bd);background:var(--danger-soft);border-radius:11px;padding:10px 12px}
  .cancel-note .cn-t{font-size:12px;font-weight:800;color:var(--danger-ink);margin-bottom:6px}
  .cancel-note .cn-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px;color:var(--ink-soft);padding:3px 0}
  .cancel-note .cn-row button{border:1px solid var(--line);background:var(--card);color:var(--accent-ink);border-radius:8px;padding:4px 10px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit}
  /* switch */
  .switch-row{display:flex;align-items:center;justify-content:space-between;background:#fbfcff;border:1px solid var(--line);border-radius:11px;padding:11px 12px}
  .switch-row .sl{font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px}
  .switch{position:relative;display:inline-block;width:46px;height:27px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .switch .track{position:absolute;inset:0;background:#d7dced;border-radius:99px;transition:.2s}
  .switch .track:before{content:"";position:absolute;width:21px;height:21px;left:3px;top:3px;background:#fff;border-radius:99px;transition:.2s;box-shadow:var(--shadow-sm)}
  .switch input:checked+.track{background:var(--warn)}
  .switch input:checked+.track:before{transform:translateX(19px)}
  .transfer-box{margin-top:10px;padding:12px;border-radius:12px;background:#fffaf0;border:1px solid #f3e6c4;display:none}
  .transfer-box.on{display:block}
  #seatXferList .sxl-t{font-size:12px;font-weight:800;color:var(--warn);margin-bottom:8px}
  .sxl-item{border:1px solid rgba(245,181,68,.4);border-radius:10px;padding:9px 10px;margin-bottom:8px;background:rgba(255,255,255,.55)}
  .sxl-item:last-child{margin-bottom:0}
  .sxl-item .sxl-seat{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:7px}
  .sxl-item .sgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .sxl-item label{font-size:11px}
  .sxl-item input{padding:9px 10px;font-size:14px;width:100%}
  :root[data-theme="dark"] .sxl-item{background:rgba(255,255,255,.05)}
  /* save row */
  .save-row{display:flex;gap:9px;margin-top:16px}

  .save-row .cancel{background:#f2f4fa;color:var(--ink-soft);flex:0 0 32%}
  .save-row .save{background:linear-gradient(145deg,#7d97ff,#4361ee);color:#fff;box-shadow:0 8px 20px -8px rgba(67,97,238,.55)}

  /* vendor picker */
  .vlist{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;max-height:46vh;overflow-y:auto;padding:2px}
  .vitem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:#fbfcff;border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s}
  .vitem:active{background:#f2f5ff}
  .vitem.sel{border-color:var(--accent);background:var(--accent-soft)}

  .vitem .vn{flex:1;font-size:14.5px;font-weight:700}
  .vitem .vchk{color:var(--accent-ink);font-weight:800;font-size:15px}
  .vitem .vd{border:2px solid rgba(255,255,255,.6);cursor:pointer;box-shadow:var(--shadow-sm)}
  .vcm-hint{font-size:12.5px;color:var(--ink-soft);margin:-4px 0 10px}
  .vcm-sec{font-size:11.5px;font-weight:800;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.03em;margin:14px 2px 6px}

  #vcolorMgrOverlay .sheet{max-height:80vh;overflow:auto}
  #vcolorMgrList .vitem{cursor:pointer}
  #vcolorMgrList .vitem .vn{flex:1}

  #vcolorMgrList .chev{color:var(--ink-faint);font-size:18px}

  /* ===== 다크모드 (data-theme='dark' 일 때. JS가 자동/라이트/다크 설정에 따라 지정) ===== */
  :root[data-theme="dark"]{
    --card:#1b2130; --ink:#e8ebf3; --ink-soft:#a6adbe; --ink-faint:#727b90;
    --line:#2c3345; --accent:#7d97ff; --accent-ink:#a9bcff; --accent-soft:rgba(109,140,255,.18);
    --danger:#ff6b7a; --danger-ink:#ff96a1; --danger-soft:rgba(255,107,122,.15); --danger-bd:rgba(255,107,122,.4); --ok:#3ecf8e; --warn:#f5b544;
    --shadow-sm:0 1px 3px rgba(0,0,0,.4);
    --shadow:0 8px 20px -8px rgba(0,0,0,.55),0 2px 6px -3px rgba(0,0,0,.4);

function load(k,def){try{const v=JSON.parse(localStorage.getItem(k));return v??def;}catch(e){return def;}}
function saveLocal(){localStorage.setItem(LS_TICKETS,JSON.stringify(tickets));localStorage.setItem(LS_VENDORS,JSON.stringify(vendors));}
function getCfg(){const c=load(LS_CFG,null);return (c&&c.url&&c.key)?c:{...BUILTIN_CFG};}
function colorFor(v){v=v||'';if(vcolors[v])return vcolors[v];if(VENDOR_COLORS[v])return VENDOR_COLORS[v];let h=0;for(let i=0;i<v.length;i++)h=(h*31+v.charCodeAt(i))>>>0;return PALETTE[h%PALETTE.length];}
function hexA(hex,a){const m=/^#?([0-9a-f]{6})$/i.exec(String(hex||''));if(!m)return `rgba(108,140,255,${a})`;const n=parseInt(m[1],16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
// 리퀴드 글래스 배경: 상단 빛반사 스펙큘러 + 예매처색 그라데이션 + 카드 표면
function glassBg(c,top,bot){return `radial-gradient(135% 95% at 12% -18%,var(--sheen),transparent 52%),linear-gradient(155deg,${hexA(c,top)},${hexA(c,bot)} 74%),var(--card-solid)`;}
// 테마별 틴트 세기: 다크/라이트 모두 글라스 느낌(라이트는 광택으로 유리감, 글자는 중립색이라 가독성 유지)
function tintBg(c,strong){const dark=document.documentElement.getAttribute('data-theme')==='dark';
  return dark?glassBg(c,strong?.17:.15,strong?.04:.03):glassBg(c,strong?.13:.11,strong?.035:.028);}
function won(n){return (Number(n)||0).toLocaleString('ko-KR');}
function money(v){v=Math.round(v);return (v<0?'−₩':'₩')+won(Math.abs(v));} // 음수는 −₩ 로
function signMoney(v){v=Math.round(v);return (v>0?'+₩':v<0?'−₩':'₩')+won(Math.abs(v));} // 양도차익용: +/− 부호 표시
// 티켓 단위 회계: 매수(취소만 제외)·실지출(원가−취소환불−양도수령)·양도차익(양도수령−양도석 원가). 단가=price/qty
function ticketAcct(t){
  const qty=Number(t.qty)||0, price=Number(t.price)||0, unit=qty>0?price/qty:0;
  const seats=t.seats||[];
  const canceled=seats.filter(s=>s.x).length;
  let xfer, recv;
  if(t.transfer&&t.transfer.done){ recv=Number(t.transfer.price)||0; xfer=Math.max(0,qty-canceled); } // 전체 양도: 취소 뺀 나머지 전부 양도
  else{ const xs=seats.filter(s=>s.t); xfer=xs.length; recv=xs.reduce((a,s)=>a+(Number(s.tp)||0),0); } // 부분 양도: 좌석별 tp 합
  const kept=Math.max(0,qty-canceled-xfer); // 취소도 양도도 아닌 실제 관람 좌석
  return { held: qty-canceled, kept, spend: kept*unit, profit: recv - xfer*unit }; // 실지출=관람 좌석 원가만(양도수령·양도석 원가는 양도차익에서만 계산)
}
function ticketRecv(t){ if(t.transfer&&t.transfer.done)return Number(t.transfer.price)||0; return (t.seats||[]).filter(s=>s.t).reduce((a,s)=>a+(Number(s.tp)||0),0); } // 양도로 받은 총액(카드 표시용)
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
// inline onclick="f('...')" 처럼 'HTML속성 안의 JS 문자열'에 값을 넣을 때 사용. JS 이스케이프(\ ' 개행) 후 속성용 HTML 인코딩. esc()+replace(/'/)는 esc가 먼저 '를 &#39;로 바꿔 replace가 무효라 깨졌었음
function jsAttr(s){return String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r?\n/g,'\\n').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function numOrNull(v){return v===''||v==null?null:Number(v);}
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(d,t){ if(!d)return ''; const p=d.split('-').map(Number); if(p.length<3)return d+(t?' '+t:''); const dt=new Date(p[0],p[1]-1,p[2]); return `${p[1]}/${p[2]} (${WD[dt.getDay()]})`+(t?` ${t}`:''); }

/* ===== blob mapping (time + transfer packed into jsonb 'seats' column, no DB change) ===== */
function parseBlob(raw){
  if(Array.isArray(raw)) return {seats:raw,time:'',transfer:{done:false}};
  raw=(raw&&typeof raw==='object')?raw:{};
  return {seats:Array.isArray(raw.seats)?raw.seats:[], time:raw.time||'', transfer:raw.transfer||{done:false}, hasImg:!!raw.hasImg};
}
function rowToTicket(r){const b=parseBlob(r.seats);return {id:r.id,vendor:r.vendor,name:r.name,date:r.show_date||'',time:b.time,qty:r.qty,price:r.price,memo:r.memo,seats:b.seats,transfer:b.transfer,hasImg:b.hasImg};}
function ticketToDB(t){return {vendor:t.vendor,name:t.name,show_date:t.date||null,qty:numOrNull(t.qty),price:numOrNull(t.price),memo:t.memo||null,
  seats:{seats:t.seats||[],time:t.time||'',transfer:t.transfer||{done:false},hasImg:!!t.hasImg}};}

/* ===== backend ===== */
async function boot(){
  render();
  const cfg=getCfg();
  if(cfg.url&&cfg.key&&window.supabase){
    try{ sb=window.supabase.createClient(cfg.url,cfg.key); mode='cloud'; await refresh(); }
    catch(e){ console.error(e); mode='local'; tickets=load(LS_TICKETS,[]); render(); }
  }
  updateSyncPill();
}
async function refresh(){
  if(mode!=='cloud'||!sb)return;
  loading=true; render();
  const ver=dataVer; // 조회 시작 시점의 데이터 버전
  const {data,error}=await sb.from('tickets').select('id,vendor,name,show_date,qty,price,memo,seats,created_at').order('created_at',{ascending:true});
  loading=false;
  if(error){ toast('불러오기 실패: '+error.message); render(); return; }
  if(ver!==dataVer){ render(); return; } // 조회 도중 로컬에서 저장/삭제가 일어남 → 최신 로컬 상태를 오래된 스냅샷으로 되돌리지 않도록 적용 스킵
  tickets=(data||[]).map(rowToTicket);
  try{ const {data:pd}=await sb.from('pending_uploads').select('id,status,result').neq('status','done').order('created_at',{ascending:false}); pendings=pd||[]; }catch(e){}
  render();
}
function renderPending(){
  const el=document.getElementById('pending'); if(!el)return;
  if(!pendings.length){ el.innerHTML=''; return; }
  const pend=pendings.filter(p=>p.status==='pending').length;
  const errs=pendings.filter(p=>p.status==='error').length;
  let label;
  if(pend&&errs) label=`<span class="pend-spin"></span><span>AI 인식 중 <b>${pend}</b> · 실패 <b>${errs}</b> <span class="pend-sub">· 탭해서 관리</span></span>`;
  else if(pend)  label=`<span class="pend-spin"></span><span>AI가 인식 중… <b>${pend}건</b> <span class="pend-sub">· 탭해서 관리</span></span>`;
  else           label=`<span>⚠️ 인식 실패 <b>${errs}건</b> <span class="pend-sub">· 탭해서 관리</span></span>`;
  const html=`<div class="pend-card ${pend?'':'err'}" onclick="openPendManage()" style="cursor:pointer">${label}<span class="pend-chev">›</span></div>`;
  if(el.innerHTML===html)return; // 내용 그대로면 재렌더 안 함 → 25초 새로고침마다 인식중 스피너가 리셋되며 튀던 문제 방지
  el.innerHTML=html;
}
// 대기열 관리 팝업 — 썸네일, 보기, 교체, 삭제
let pendFull=[]; // {id,status,result,image_b64}
async function openPendManage(){
  if(!(mode==='cloud'&&sb))return;
  const body=document.getElementById('pendBody');
  body.innerHTML=`<div class="empty" style="padding:24px 0"><div class="spinner"></div></div>`;
  openOv('pendOverlay');
  try{
    const {data}=await sb.from('pending_uploads').select('id,status,result,image_b64').neq('status','done').order('created_at',{ascending:false});
    pendFull=data||[];
  }catch(e){ pendFull=[]; }
  renderPendList();
}
function renderPendList(){
  const body=document.getElementById('pendBody');
  if(!pendFull.length){ body.innerHTML=`<p class="hint" style="text-align:center;padding:16px 0">대기 중인 업로드가 없어요.</p>`; return; }
  body.innerHTML=pendFull.map(p=>{
    const st=p.status==='error'
      ? `<span class="pend-st err">⚠️ 인식 실패${p.result?' · '+esc(p.result):''}</span>`
      : `<span class="pend-st"><span class="pend-spin"></span>AI가 인식 중…</span>`;
    return `<div class="pend-item" data-id="${p.id}">
      <img class="pend-thumb" src="data:image/jpeg;base64,${p.image_b64}" onclick="viewPendImage('${p.id}')" alt="업로드 사진">
      <div class="pend-item-body">
        ${st}
        <div class="pend-item-btns">
          <button class="sb-btn" onclick="replacePendingPhoto('${p.id}')">🖼️ 교체</button>
          <button class="sb-btn danger" onclick="cancelPending('${p.id}')">🗑 삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

}
function dismissPending(id){ cancelPending(id); }
function cancelPending(id){
  if(!(mode==='cloud'&&sb))return;
  if(!confirm('이 업로드 항목을 삭제할까요?'))return;
  sb.from('pending_uploads').delete().eq('id',id).then(()=>{
    pendings=pendings.filter(p=>String(p.id)!==String(id));
    pendFull=pendFull.filter(p=>String(p.id)!==String(id));
    renderPending(); renderPendList();
    if(!pendFull.length)closePend();
    toast('삭제됨');
  });
}
let pendReplaceId=null;
function replacePendingPhoto(id){
  if(!(mode==='cloud'&&sb))return;
  pendReplaceId=id;
  document.getElementById('pendReplaceFile').click();
}
async function pendReplaceFile(e){
  const file=(e.target.files||[])[0]; e.target.value='';
  const id=pendReplaceId; pendReplaceId=null;
  if(!file||!id||!(mode==='cloud'&&sb))return;
  try{
    const b64=await fileToB64(file);
    const {error}=await sb.from('pending_uploads').update({image_b64:b64,status:'pending',result:null}).eq('id',id);
    if(error)throw error;
    // 로컬 캐시도 갱신해 팝업 썸네일/상태 즉시 반영
    const p=pendFull.find(x=>String(x.id)===String(id));
    if(p){ p.image_b64=b64; p.status='pending'; p.result=null; }
    const pp=pendings.find(x=>String(x.id)===String(id)); if(pp){ pp.status='pending'; pp.result=null; }
    renderPending(); renderPendList();
    toast('사진 교체됨 · 다시 인식해요 🤖');
  }catch(err){ toast('교체 실패: '+(err.message||err)); }
}
function updateSyncPill(){
  const pill=document.getElementById('syncPill'), txt=document.getElementById('syncPillTxt');
  if(mode==='cloud'){pill.classList.add('on');txt.textContent='동기화';}else{pill.classList.remove('on');txt.textContent='오프라인';}

let selectMode=false, selectedIds=new Set();
function toggleSelectMode(){
  if(view==='calendar'){ toast('캘린더 보기에서는 사용할 수 없어요'); return; }
  selectMode=!selectMode; selectedIds.clear(); render();
}
function cancelSelectMode(){ selectMode=false; selectedIds.clear(); render(); }
function toggleSelect(id){
  id=String(id);
  if(selectedIds.has(id))selectedIds.delete(id); else selectedIds.add(id);
  renderSelectBar();
  document.querySelectorAll(`[data-id="${id}"] .tk-check`).forEach(el=>el.classList.toggle('on',selectedIds.has(id)));
}
function selectAllToggle(){
  const ids=byDate(filtered()).map(t=>String(t.id));
  const allSel=ids.length&&ids.every(id=>selectedIds.has(id));
  if(allSel)selectedIds.clear(); else ids.forEach(id=>selectedIds.add(id));
  render();
}
function renderSelectBar(){
  const bar=document.getElementById('selectBar'); if(!bar)return;
  bar.classList.toggle('on',selectMode);
  document.body.classList.toggle('selecting',selectMode);
  const sb2=document.getElementById('settingsBtn'); if(sb2)sb2.classList.toggle('on',selectMode);
  if(!selectMode)return;
  document.getElementById('selectCount').textContent=`${selectedIds.size}개 선택`;
  const ids=byDate(filtered()).map(t=>String(t.id));
  const allSel=ids.length&&ids.every(id=>selectedIds.has(id));
  document.getElementById('selAllBtn').textContent=allSel?'전체해제':'전체선택';
}
async function bulkDelete(){
  if(!selectedIds.size){ toast('선택된 티켓이 없어요'); return; }
  const ids=[...selectedIds];
  if(!confirm(`선택한 ${ids.length}개 티켓을 삭제할까요?`))return;
  try{
    if(mode==='cloud'&&sb){ const {error}=await sb.from('tickets').delete().in('id',ids); if(error)throw error; }
    tickets=tickets.filter(t=>!selectedIds.has(String(t.id))); dataVer++;
    if(mode!=='cloud')saveLocal();
    selectMode=false; selectedIds.clear();
    render(); toast(`${ids.length}개 삭제되었어요`);
  }catch(e){ toast('삭제 실패: '+(e.message||e)); }
}
function setView(v){
  if(v===view)return; // 같은 뷰면 무시
  const dir=SWIPE_VIEWS.indexOf(v)>SWIPE_VIEWS.indexOf(view)?1:-1; // 오른쪽 뷰=+1(왼쪽으로 밀림)
  view=v;localStorage.setItem(LS_VIEW,JSON.stringify(v));if(v==='calendar'){selectMode=false;selectedIds.clear();}
  animateViewSwitch(dir);
}
// 아이폰 화면 전환처럼: 현재 뷰를 방향대로 밀어 내보내고, 새 뷰를 반대편에서 밀어 들어오게
let _viewAnim=false;
function animateViewSwitch(dir){
  const root=document.getElementById('viewRoot');
  if(!root||_viewAnim){ render(); return; } // 애니메이션 중 연속 전환이면 즉시 렌더
  _viewAnim=true;
  const d=Math.max(40,Math.round((root.offsetWidth||320)*0.22));
  root.style.transition='transform .14s ease-in, opacity .14s ease-in';
  root.style.transform='translateX('+(dir>0?-d:d)+'px)'; root.style.opacity='0';
  setTimeout(()=>{
    render(); // 새 뷰 내용으로 교체
    root.style.transition='none';
    root.style.transform='translateX('+(dir>0?d:-d)+'px)'; root.style.opacity='0';
    root.getBoundingClientRect(); // 강제 리플로우(시작 위치 확정)
    root.style.transition='transform .2s cubic-bezier(.2,.85,.25,1), opacity .2s ease-out';
    root.style.transform='translateX(0)'; root.style.opacity='1';
    setTimeout(()=>{ root.style.transition=''; root.style.transform=''; root.style.opacity=''; _viewAnim=false; },220);
  },140);
}
function filtered(){
  const q=(document.getElementById('search').value||'').trim().toLowerCase();
  let a=tickets.slice();
  if(q)a=a.filter(t=>(t.name||'').toLowerCase().includes(q)||(t.vendor||'').toLowerCase().includes(q));
  return a;
}
function byDate(a){return a.slice().sort((x,y)=>{const dx=x.date||'9999',dy=y.date||'9999';if(dx!==dy)return dx<dy?-1:1;return (x.time||'')<(y.time||'')?-1:1;});}

function render(){
  // seg
  document.querySelectorAll('#viewSeg button').forEach(b=>b.classList.toggle('on',b.dataset.v===view));
  // stats
  const acc=tickets.reduce((a,t)=>{const r=ticketAcct(t);a.held+=r.held;a.spend+=r.spend;a.profit+=r.profit;return a;},{held:0,spend:0,profit:0});
  const prof=Math.round(acc.profit);
  document.getElementById('stats').innerHTML=
    `<span>공연 <b>${tickets.length}</b></span><span class="sep">·</span>`+
    `<span>매수 <b>${acc.held}</b></span><span class="sep">·</span>`+
    `<span class="bd-link" onclick="openBreakdown('spend')">실지출 <b>${money(acc.spend)}</b></span>`+
    (prof?`<span class="sep">·</span><span class="x bd-link" onclick="openBreakdown('profit')">양도차익 <b>${signMoney(prof)}</b></span>`:'');

  renderPending();
  renderSelectBar();
  renderUpcoming();

  const root=document.getElementById('viewRoot');
  if(loading&&tickets.length===0){root.innerHTML=`<div class="empty"><div class="spinner"></div><p>불러오는 중…</p></div>`;_calSig=null;return;}
  if(view==='calendar'){ const html=viewHTML('calendar'); if(_calSig!==html){root.innerHTML=html;_calSig=html;} return; } // 내용 그대로면 재렌더 안 함(25초 리셋 깜빡임 방지). root.innerHTML은 브라우저가 재직렬화해 원본과 안 맞으므로 시그니처로 비교
  _calSig=null; // 캘린더가 아닌 뷰 → 시그니처 리셋
  root.innerHTML=viewHTML(view);
}
// 특정 뷰의 #viewRoot 내용 HTML(전역 view를 안 바꾸고 얻음 — 스와이프 드래그 pane 렌더용)
function viewHTML(v){
  if(v==='calendar') return renderCalendar();
  const a=byDate(filtered());
  if(a.length===0) return emptyHTML();
  const groups=groupByMonth(a);
  const head=g=>`<div class="month-head">${g.label}<span class="mh-count">${g.items.length}</span><span class="mh-line"></span></div>`;
  if(v==='list') return `<div class="list">${groups.map(g=>head(g)+g.items.map(listRow).join('')).join('')}</div>`;
  return `<div class="grouped">${groups.map(g=>head(g)+`<div class="tiles">${g.items.map(tileCard).join('')}</div>`).join('')}</div>`;
}
function emptyHTML(){const has=tickets.length>0;return `<div class="empty"><div class="ico">🎭</div><p><b>${has?'검색 결과가 없어요':'아직 등록된 티켓이 없어요'}</b></p><p>${has?'다른 키워드로 찾아보세요':'아래 + 버튼으로 추가해 보세요'}</p></div>`;}

function ddayInfo(dateStr,today){
  const a=new Date(dateStr+'T00:00:00'), b=new Date(today+'T00:00:00');
  const diff=Math.round((a-b)/86400000);
  return {diff, label: diff===0?'오늘':diff>0?'D-'+diff:'지남', soon: diff>=0&&diff<=7};
}
// 이번 달 + 다음 달, 오늘 이후 공연 요약(가로 스크롤)
function renderUpcoming(){
  const el=document.getElementById('upnext'); if(!el)return;
  const q=(document.getElementById('search').value||'').trim();
  if(q){ el.innerHTML=''; _upSig=''; return; }  // 검색 중엔 숨김(캘린더 포함 모든 뷰에서 표시)
  const today=ymd(new Date()), now=new Date();

function groupByMonth(arr){
  const groups=[], map={};
  arr.forEach(t=>{
    let key,label;
    if(t.date){const p=t.date.split('-');key=p[0]+'-'+p[1];label=`${p[0]}년 ${Number(p[1])}월`;}
    else{key='none';label='날짜 미정';}
    if(!map[key]){map[key]={key,label,items:[]};groups.push(map[key]);}
    map[key].items.push(t);
  });
  return groups; // byDate 정렬(오름차순, 날짜없음 마지막) 순서 유지
}
function dayLabel(t){
  if(!t.date)return {main:'미정',sub:''};
  const p=t.date.split('-').map(Number);const dt=new Date(p[0],p[1]-1,p[2]);
  return {main:`${p[1]}/${p[2]}`, sub:`${WD[dt.getDay()]}${t.time?' '+esc(t.time):''}`};
}
function hasCancel(t){ return (t.seats||[]).some(s=>s.x); }
function hasSeatTransfer(t){ return (t.seats||[]).some(s=>s.t); } // 표(좌석)단위 부분 양도
// 자리 요약: 보유(취소·양도 안 된) 좌석만 표기 + 취소/양도 좌석 수. (스탠딩 등 자유텍스트면 N석)
function seatLine(t){
  const all=(t.seats||[]).filter(s=>s.grade||s.floor||s.zone||s.row||s.no);
  const ss=all.filter(s=>!s.x&&!s.t), canceled=all.filter(s=>s.x), xferred=all.filter(s=>s.t);
  if(!all.length)return '';
  const g=(ss.find(s=>s.grade)||{}).grade||'';
  const f=(ss.find(s=>s.floor)||{}).floor||'';
  const z=(ss.find(s=>s.zone)||{}).zone||'';
  const r=(ss.find(s=>s.row)||{}).row||'';
  const nos=ss.map(s=>s.no).filter(Boolean);
  let numStr='';
  if(nos.length&&nos.every(n=>/^\d+$/.test(n))) numStr=nos.join(',')+'번';
  else if(nos.length) numStr=ss.length+'석';
  const main=[g, f&&f+'층', z&&z+'구역', r&&r+'열', numStr].filter(Boolean).join(' ');
  return main+(canceled.length?` · 취소 ${canceled.length}`:'')+(xferred.length?` · 양도 ${xferred.length}`:'');
}

function renderCalendar(){
  const first=new Date(calY,calM,1), start=first.getDay(), days=new Date(calY,calM+1,0).getDate();
  const today=ymd(new Date());
  const _2w=new Date(); _2w.setDate(_2w.getDate()+14); const cut2w=ymd(_2w); // 2주 이내만 효과
  const byDay={};
  tickets.forEach(t=>{if(t.date){(byDay[t.date]=byDay[t.date]||[]).push(t);}});
  let cells='';
  for(let i=0;i<start;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const wd=(start+d-1)%7;
    const list=byDay[ds]||[];
    const upcoming=list.length&&ds>=today&&ds<=cut2w; // 2주 이내 공연만 애니메이션
    const dots=list.length?`<span class="cal-dots">${list.slice(0,3).map((t,di)=>`<i style="background:${colorFor(t.vendor)};animation-delay:${di*220}ms"></i>`).join('')}${list.length>3?`<em>+${list.length-3}</em>`:''}</span>`:'';
    cells+=`<div class="cal-cell ${wd===0?'sun':''} ${wd===6?'sat':''} ${ds===today?'today':''} ${list.length?'has':''} ${upcoming?'up':''}" onclick="calOpen('${ds}')">
      <span class="cal-day">${d}</span>${dots}</div>`;
  }
  const wdh=WD.map((w,i)=>`<div class="cal-wd ${i===0?'sun':''} ${i===6?'sat':''}">${w}</div>`).join('');
  const undated=tickets.filter(t=>!t.date);
  const undHTML=undated.length?`<div class="undated"><div class="u-t">📌 날짜 미정 ${undated.length}건</div><div class="list">${undated.map(listRow).join('')}</div></div>`:'';
  return `<div class="cal">
    <div class="cal-head"><button onclick="calMove(-1)">‹</button><div class="mon">${calY}년 ${calM+1}월</div><button onclick="calMove(1)">›</button></div>
    <div class="cal-grid">${wdh}${cells}</div>
    <div class="cal-hint">← 좌우로 넘겨 월 이동 →</div>
    ${undHTML}
  </div>`;
}

function calOpen(ds){

// 실지출/양도차익이 어떻게 계산됐는지 티켓별 내역 팝업
function openBreakdown(kind){
  const isSpend=kind==='spend';
  let total=0; const rows=[];
  tickets.forEach(t=>{
    const a=ticketAcct(t);
    const qty=Number(t.qty)||0, price=Number(t.price)||0, unit=qty>0?price/qty:0;
    const seats=t.seats||[];
    const canceled=seats.filter(s=>s.x).length;
    const recv=ticketRecv(t);
    const xfer=(t.transfer&&t.transfer.done)?Math.max(0,qty-canceled):seats.filter(s=>s.t).length;
    const dm=t.date?(()=>{const p=t.date.split('-');return p[1]+'/'+p[2];})():'';
    if(isSpend){
      if(a.kept<=0)return; // 관람 좌석이 없으면(전부 취소·양도) 실지출 0 → 제외
      total+=a.spend;
      const ex=[]; if(canceled)ex.push(`취소 ${canceled}`); if(xfer)ex.push(`양도 ${xfer}`);
      const calc=`관람 ${a.kept}석 × ₩${won(Math.round(unit))}`+(ex.length?` (제외: ${ex.join('·')})`:'');
      rows.push({t,dm,calc,val:a.spend,cls:'',vs:money(a.spend)});
    }else{
      if(!recv&&!xfer)return; // 양도 없는 티켓 제외
      total+=a.profit;
      rows.push({t,dm,calc:`양도수령 ₩${won(recv)} · 원가 ${xfer}석 ₩${won(Math.round(xfer*unit))}`,val:a.profit,
        cls:a.profit>0?'bd-pos':a.profit<0?'bd-neg':'',vs:signMoney(a.profit)});
    }
  });
  const body=rows.length?rows.map(r=>`<div class="bd-row" onclick="edit('${jsAttr(String(r.t.id))}')">
      <div class="bd-l"><div class="bd-nm">${esc(r.t.name||'(공연명 없음)')}</div><div class="bd-calc">${r.dm?r.dm+' · ':''}${r.calc}</div></div>
      <div class="bd-v ${r.cls}">${r.vs}</div></div>`).join('')
    :`<div class="empty" style="padding:22px 0"><p>${isSpend?'집계할 내역이 없어요':'양도 내역이 없어요'}</p></div>`;
  document.getElementById('bdTitle').textContent=isSpend?'실지출 상세':'양도차익 상세';
  document.getElementById('bdBody').innerHTML=body+
    `<div class="bd-total"><span>합계</span><span class="bd-v ${total<0?'bd-neg':isSpend?'':'bd-pos'}">${isSpend?money(total):signMoney(total)}</span></div>`;
  openOv('breakdownOverlay');
}

// 등급에서 끝의 "석" 제거(VIP석→VIP, R석→R). 단 "지정석 P"처럼 끝이 석이 아니면 그대로.
function normGrade(g){ return String(g||'').trim().replace(/석$/,'').trim(); }
// 한 좌석 행(active)에서 정규화된 좌석 객체 추출
function seatFromEl(el){
  let grade=normGrade(el.querySelector('.s-grade').value), floor=el.querySelector('.s-floor').value.trim(),
      zone=el.querySelector('.s-zone').value.trim(),
      row=el.querySelector('.s-row').value.trim().replace(/열$/,'').trim(),
      no=el.querySelector('.s-no').value.trim().replace(/번$/,'').trim();
  if(grade.toUpperCase()==='OP'||grade==='오피'){ if(!zone)zone='OP'; grade='OP'; }  // OP(오피)
  return {grade,floor,zone,row,no};
}
function seatEmpty(s){ return !(s.grade||s.floor||s.zone||s.row||s.no); }
function collectSeats(){return [...document.querySelectorAll('#seatBox .seat-edit')].map(seatFromEl).filter(s=>!seatEmpty(s));}
// 취소/양도 버튼: 그 좌석을 요약(editCanceled)으로 내리고 편집 목록에서 제거
function markSeat(btn,flag){
  const el=btn.closest('.seat-edit'); const s=seatFromEl(el);
  if(seatEmpty(s)){ el.remove(); return; }   // 빈 행이면 그냥 삭제
  s[flag]=true; editCanceled.push(s); el.remove();
  renderCanceledNote(); syncTransferUI();
  toast(flag==='t'?'양도로 이동(내역에서 입력)':'취소로 이동');
}

function renderCanceledNote(){
  const el=document.getElementById('canceledNote'); if(!el)return;
  if(!editCanceled.length){ el.innerHTML=''; return; }
  const seatStr=s=>{const no=s.no?(/^\d+$/.test(s.no)?s.no+'번':s.no):'';return [s.grade,(s.floor?s.floor+'층':''),(s.zone?s.zone+'구역':''),(s.row?s.row+'열':''),no].filter(Boolean).join(' ')||'좌석';};
  const rows=editCanceled.map((s,i)=>{const tag=s.t?'양도':'취소';
    return `<div class="cn-row"><span><b class="cn-tag ${s.t?'xf':''}">${tag}</b> ${esc(seatStr(s))}</span><button type="button" onclick="restoreCanceled(${i})">복원</button></div>`;}).join('');
  const nx=editCanceled.filter(s=>s.x).length, nt=editCanceled.filter(s=>s.t).length;
  const title=[nx?`🚫 취소 ${nx}`:'', nt?`↗ 양도 ${nt}`:''].filter(Boolean).join(' · ');
  el.innerHTML=`<div class="cancel-note"><div class="cn-t">${title}</div>${rows}</div>`;

function restoreCanceled(i){
  const s=editCanceled[i]; if(!s)return;

  const c={...s}; delete c.x; delete c.t; delete c.tp; delete c.tvia; delete c.tto; addSeatRow(c);

/* ===== 이미지 뷰어 확대/이동 (사진 영역만, 앱 전체 아님) ===== */
let _iv={scale:1,tx:0,ty:0};
function ivApply(){ const im=document.getElementById('imgViewImg'); im.style.transform=`translate(${_iv.tx}px,${_iv.ty}px) scale(${_iv.scale})`; }
function ivReset(){ _iv={scale:1,tx:0,ty:0}; ivApply(); }
function ivClamp(){
  const st=document.getElementById('imgViewStage'), im=document.getElementById('imgViewImg');
  if(!st||!im)return;
  // transform-origin이 center이므로, 스테이지보다 큰 만큼의 절반까지만 이동 허용(넘치면 가장자리, 작으면 중앙 0)
  const iw=im.clientWidth*_iv.scale, ih=im.clientHeight*_iv.scale;
  const maxX=Math.max(0,(iw-st.clientWidth)/2), maxY=Math.max(0,(ih-st.clientHeight)/2);
  _iv.tx=Math.max(-maxX,Math.min(maxX,_iv.tx));
  _iv.ty=Math.max(-maxY,Math.min(maxY,_iv.ty));
}
function initImgZoom(){
  const st=document.getElementById('imgViewStage'); if(!st)return;
  let pts=new Map(), startDist=0, startScale=1, lastX=0,lastY=0, panId=null, lastTap=0;
  const dist=()=>{ const a=[...pts.values()]; return Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y); };
  const mid=()=>{ const a=[...pts.values()]; return {x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2}; };
  st.addEventListener('touchstart',e=>{
    for(const t of e.changedTouches)pts.set(t.identifier,{x:t.clientX,y:t.clientY});
    if(pts.size===2){ startDist=dist(); startScale=_iv.scale; }
    else if(pts.size===1){ const t=e.touches[0]; lastX=t.clientX; lastY=t.clientY; panId=t.identifier;
      const now=Date.now();
      if(now-lastTap<300){ // 더블탭 토글
        if(_iv.scale>1){ ivReset(); }
        else { _iv.scale=2.5; ivClamp(); ivApply(); }
      }
      lastTap=now;
    }
  },{passive:false});
  st.addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){ if(pts.has(t.identifier))pts.set(t.identifier,{x:t.clientX,y:t.clientY}); }
    if(pts.size===2){ e.preventDefault();
      const s=startDist>0?Math.max(1,Math.min(5, startScale*(dist()/startDist))):_iv.scale; // 두 손가락이 같은 지점이면 startDist=0 → NaN(scale 사라짐) 방지
      _iv.scale=s; ivClamp(); ivApply();
    } else if(pts.size===1 && _iv.scale>1){ e.preventDefault();
      const t=[...e.changedTouches].find(x=>x.identifier===panId)||e.touches[0];
      _iv.tx+=t.clientX-lastX; _iv.ty+=t.clientY-lastY; lastX=t.clientX; lastY=t.clientY;
      ivClamp(); ivApply();
    }
  },{passive:false});
  const end=e=>{ for(const t of e.changedTouches)pts.delete(t.identifier);
    if(pts.size===0 && _iv.scale<=1){ ivReset(); }
    else if(pts.size===1){ const t=e.touches[0]; lastX=t.clientX; lastY=t.clientY; panId=t.identifier; }
  };
  st.addEventListener('touchend',end); st.addEventListener('touchcancel',end);
}
async function save(){
  const name=document.getElementById('fName').value.trim();
  if(!name){toast('공연명을 입력해 주세요');return;}
  const seatsArr=collectSeats();
  const partial=editCanceled.some(s=>s.t);   // 요약으로 내린 양도(표단위) 좌석이 하나라도 있으면 부분 양도
  const done=!partial && document.getElementById('fTransfer').checked; // 전체 양도(양도완료)는 부분 양도가 없을 때만
  const data={
    vendor:formVendor||'기타', name,
    date:document.getElementById('fDate').value,
    time:document.getElementById('fTime').value,
    qty:numOrNull(document.getElementById('fQty').value), // 숫자로 통일(로컬은 문자열, 클라우드는 숫자로 저장되던 불일치 제거)
    price:numOrNull(document.getElementById('fPrice').value),
    memo:document.getElementById('fMemo').value.trim(),
    seats:[...seatsArr, ...editCanceled],
    transfer:{done,
      price:done?numOrNull(document.getElementById('fTPrice').value):null,
      to:done?document.getElementById('fTTo').value.trim():'',
      platform:done?formPlatform:''},
    hasImg: editingId ? !!((tickets.find(x=>String(x.id)===String(editingId))||{}).hasImg) : false
  };
  const btn=document.getElementById('saveBtn'); btn.disabled=true;
  try{
    if(mode==='cloud'&&sb){
      if(editingId){
        const {data:row,error}=await sb.from('tickets').update(ticketToDB(data)).eq('id',editingId).select().single();
        if(error)throw error; const i=tickets.findIndex(x=>x.id===editingId); if(i>-1)tickets[i]=rowToTicket(row); toast('수정되었어요');
      }else{
        const {data:row,error}=await sb.from('tickets').insert(ticketToDB(data)).select().single();
        if(error)throw error; tickets.push(rowToTicket(row)); toast('추가되었어요 🎉');
      }
    }else{
      if(editingId){const i=tickets.findIndex(x=>x.id===editingId);if(i>-1)tickets[i]={...tickets[i],...data};toast('수정되었어요');}
      else{tickets.push({id:'t'+Date.now()+Math.floor(Math.random()*1000),...data});toast('추가되었어요 🎉');}
      saveLocal();
    }
    dataVer++; // 로컬 상태 변경됨 → 진행 중인 새로고침이 이 저장을 덮어쓰지 않게
    if(data.date){const p=data.date.split('-').map(Number);calY=p[0];calM=p[1]-1;selDay=data.date;}
    render(); closeModal();
  }catch(e){ toast('저장 실패: '+(e.message||e)); }
  finally{ btn.disabled=false; }
}
async function del(id){
  const t=tickets.find(x=>String(x.id)===String(id));
  if(!confirm(`"${t?t.name:'이 티켓'}"을(를) 삭제할까요?`))return;

    tickets=tickets.filter(x=>String(x.id)!==String(id)); dataVer++;

  }catch(e){ toast('삭제 실패: '+(e.message||e)); }
}

async function importData(e){

  r.onload=async()=>{try{
    const d=JSON.parse(r.result); if(!Array.isArray(d.tickets))throw 0;
    if(!confirm('백업을 현재 데이터에 합칠까요?')){e.target.value='';return;}
    if(Array.isArray(d.vendors))d.vendors.forEach(v=>{if(!vendors.includes(v))vendors.push(v);});
    const have=new Set(tickets.map(t=>String(t.id)));
    const fresh=d.tickets.filter(t=>!have.has(String(t.id))); // 이미 있는 id는 건너뜀(로컬/클라우드 공통 dedup) → 같은 백업 재import 시 중복 방지
    if(mode==='cloud'&&sb){ if(fresh.length){const {error}=await sb.from('tickets').insert(fresh.map(ticketToDB));if(error)throw error;} await refresh(); }
    else{ fresh.forEach(t=>tickets.push(t)); dataVer++; saveLocal(); render(); }
    toast('불러오기 완료');
  }catch(err){toast('올바른 백업 파일이 아니에요');}};
  r.readAsText(f);e.target.value='';
}

/* ===== 공유 (카톡·문자) ===== */
let shareId=null, shareImgB64=null;
function ticketText(t){
  const L=[`🎫 ${t.name||'(공연명 없음)'}`];
  if(t.vendor)L.push(`예매처: ${t.vendor}`);
  if(t.date)L.push(`일시: ${fmtDate(t.date,t.time)}`);
  if(Number(t.qty))L.push(`매수: ${Number(t.qty)}`);
  if(Number(t.price))L.push(`가격: ${won(t.price)}원`);
  const seatStr=s=>{const no=s.no?(/^\d+$/.test(s.no)?s.no+'번':s.no):'';
    return [s.grade,(s.floor?s.floor+'층':''),(s.zone?s.zone+'구역':''),(s.row?s.row+'열':''),no].filter(Boolean).join(' ');};
  const ss=(t.seats||[]).filter(s=>s.grade||s.floor||s.zone||s.row||s.no).map(seatStr).join(' / ');
  if(ss)L.push(`좌석: ${ss}`);
  if(t.transfer&&t.transfer.done)L.push(`양도: ${[t.transfer.price?won(t.transfer.price)+'원':'',t.transfer.to,t.transfer.platform].filter(Boolean).join(' · ')||'완료'}`);
  if(t.memo)L.push(`메모: ${t.memo}`);
  return L.join('\n');
}
function b64ToFile(b64,name){ const bin=atob(b64), a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return new File([a],name,{type:'image/jpeg'}); }

  shareId=id; shareImgB64=null; shareStep=0; resetShareBtn();

  const wrap=document.getElementById('shImgWrap'), thumb=document.getElementById('shareThumb');
  thumb.style.display='none'; thumb.removeAttribute('src');

    sb.from('tickets').select('img').eq('id',id).single().then(({data})=>{
      shareImgB64=(data&&data.img)||null;
      if(shareImgB64 && String(shareId)===String(id)){ thumb.src='data:image/jpeg;base64,'+shareImgB64; thumb.style.display='block'; }
      else if(!shareImgB64){ wrap.style.display='none'; }
    });

  openOv('shareOverlay');
}
function closeShare(){ shareStep=0; resetShareBtn(); closeOv('shareOverlay'); }
function resetShareBtn(){ const b=document.getElementById('shareGo'); if(b)b.textContent='📤 공유하기'; }
let shareStep=0;
// 글자 줄바꿈(한글은 글자 단위)
function wrapCanvasText(x,text,maxW){
  let line='',out=[];
  for(const ch of String(text)){
    if(ch==='\n'){ out.push(line); line=''; continue; }
    if(line&&x.measureText(line+ch).width>maxW){ out.push(line); line=ch; } else line+=ch;
  }
  if(line)out.push(line);
  return out.length?out:[''];
}
// 공연정보를 예쁜 카드 이미지 1장으로(스크린샷은 별도 파일로 함께 보냄)
function composeInfoCard(t){
  const W=820, pad=36, contentW=W-pad*2, labelX=pad+112;
  const c=document.createElement('canvas'), x=c.getContext('2d');
  const seatStr=s=>{const no=s.no?(/^\d+$/.test(s.no)?s.no+'번':s.no):'';const base=[s.grade,(s.floor?s.floor+'층':''),(s.zone?s.zone+'구역':''),(s.row?s.row+'열':''),no].filter(Boolean).join(' ');return s.x?base+' (취소)':base;};
  const ss=(t.seats||[]).filter(s=>s.grade||s.floor||s.zone||s.row||s.no).map(seatStr).join(' / ');
  const qp=[]; if(Number(t.qty))qp.push(Number(t.qty)+'매'); if(Number(t.price))qp.push('₩'+won(t.price));
  const rows=[];
  const add=(l,v)=>{ if(v)rows.push([l,v]); };
  add('예매처',t.vendor); add('일시',t.date?fmtDate(t.date,t.time):''); add('매수·가격',qp.join('   ·   ')); add('좌석',ss);
  if(t.transfer&&t.transfer.done)add('양도',[t.transfer.price?won(t.transfer.price)+'원':'',t.transfer.to,t.transfer.platform].filter(Boolean).join(' · ')||'완료');
  add('메모',t.memo);
  const titleFont='800 38px system-ui,-apple-system,sans-serif', valFont='500 25px system-ui,sans-serif', labelFont='700 21px system-ui,sans-serif';
  x.textBaseline='top';
  x.font=titleFont; const titleLines=wrapCanvasText(x,t.name||'(공연명 없음)',contentW);
  x.font=valFont; const measured=rows.map(([l,v])=>({l,vl:wrapCanvasText(x,v,contentW-112)}));
  const titleH=titleLines.length*46;
  let bodyH=0; measured.forEach(r=>bodyH+=Math.max(1,r.vl.length)*34+10);
  c.width=W; c.height=pad+titleH+18+bodyH+pad;
  x.fillStyle='#ffffff'; x.fillRect(0,0,c.width,c.height);
  x.fillStyle='#4361ee'; x.fillRect(0,0,W,7);
  let y=pad+6; x.fillStyle='#1f2637'; x.font=titleFont;
  titleLines.forEach(l=>{ x.fillText(l,pad,y); y+=46; });
  y+=18;
  measured.forEach(r=>{
    x.font=labelFont; x.fillStyle='#98a0b3'; x.fillText(r.l,pad,y+2);
    x.font=valFont; x.fillStyle='#2a3345'; let yy=y;
    r.vl.forEach(l=>{ x.fillText(l,labelX,yy); yy+=34; });
    y+=Math.max(1,r.vl.length)*34+10;
  });
  return c.toDataURL('image/jpeg',0.92).split(',')[1];
}
async function doShare(){
  const t=tickets.find(x=>String(x.id)===String(shareId)); if(!t)return;
  const wantTxt=document.getElementById('shTxt').checked;
  const wantImg=document.getElementById('shImg').checked && t.hasImg && shareImgB64;
  if(!wantTxt&&!wantImg){ toast('보낼 항목을 선택하세요'); return; }
  const title=t.name||'티켓', text=ticketText(t);
  const fname=(t.name||'예매내역').replace(/[\\/:*?"<>|]/g,'');
  const dl=(b64,nm)=>{ const a=document.createElement('a'); a.href='data:image/jpeg;base64,'+b64; a.download=nm; a.click(); };
  try{
    if(wantTxt&&wantImg){
      // 정보카드 + 예매내역 스크린샷을 사진 2장으로 함께 전송(카톡 등에서 한 번에 둘 다 감)
      const cardB64=composeInfoCard(t);
      const files=[b64ToFile(cardB64,fname+'_정보.jpg'), b64ToFile(shareImgB64,fname+'_예매내역.jpg')];
      if(navigator.share&&navigator.canShare&&navigator.canShare({files})){
        await navigator.share({files});
      }else if(navigator.share&&navigator.canShare&&navigator.canShare({files:[files[1]]})){
        // 2장 동시 미지원 → 정보카드 저장 후 스크린샷 공유
        dl(cardB64,fname+'_정보.jpg'); await navigator.share({files:[files[1]]});
        toast('정보카드는 저장됨 · 스크린샷 공유');
      }else{
        if(navigator.clipboard)await navigator.clipboard.writeText(text); dl(cardB64,fname+'_정보.jpg'); dl(shareImgB64,fname+'_예매내역.jpg');
        toast('공유 시트 미지원 · 사진 2장 저장 + 텍스트 복사');
      }
    }else if(wantImg){
      const f=b64ToFile(shareImgB64,fname+'.jpg');
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[f]})){ await navigator.share({files:[f]}); }
      else{ dl(shareImgB64,fname+'.jpg'); toast('이 기기는 사진 공유 미지원 · 파일로 저장했어요'); }
    }else{
      if(navigator.share){ await navigator.share({title,text}); }
      else{ if(navigator.clipboard)await navigator.clipboard.writeText(text); toast('이 기기는 공유 시트 미지원 · 텍스트 복사했어요'); }
    }
    closeShare();
  }catch(e){ if(e&&e.name!=='AbortError')toast('공유 실패: '+(e.message||e)); }
}
function copyShareText(){ const t=tickets.find(x=>String(x.id)===String(shareId)); if(!t)return; (navigator.clipboard?navigator.clipboard.writeText(ticketText(t)):Promise.reject()).then(()=>toast('텍스트 복사됨'),()=>toast('복사 미지원')); }

/* ===== AI 캡처 업로드 (예매내역 자동 인식 대기열) ===== */
function fileToB64(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      // 좌석 등 작은 글씨 인식률을 위해 해상도·품질을 넉넉히(긴 변 2200px, JPEG 0.92)
      const max=2200; let w=img.naturalWidth,h=img.naturalHeight;
      const s=Math.min(1,max/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      const ctx=c.getContext('2d'); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',0.92).split(',')[1]);
    };
    img.onerror=rej;
    const fr=new FileReader(); fr.onload=()=>{img.src=fr.result;}; fr.onerror=rej; fr.readAsDataURL(file);
  });
}
async function aiUpload(e){
  const files=[...(e.target.files||[])]; e.target.value=''; if(!files.length)return;
  if(mode!=='cloud'||!sb){ toast('오프라인이라 지금은 안 돼요'); return; }
  toast(`캡처 ${files.length}장 처리 중…`);
  let ok=0, fail=0;
  for(const f of files){
    try{
      const b64=await fileToB64(f);
      const {error}=await sb.from('pending_uploads').insert({image_b64:b64,status:'pending'});
      if(error)throw error; ok++;
    }catch(err){ fail++; }
  }
  toast(`${ok}장 접수됨${fail?` · ${fail}장 실패`:''} · AI가 곧 인식해요 🤖`);
  refresh();
}

/* ===== toast ===== */
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2000);}

/* ===== overlay manager: 팝업마다 history 항목 1개 → 뒤로가기가 항상 최상단 팝업만 닫음 ===== */
let _ovStack=[], _ignorePop=false;
function openOv(id){
  const el=document.getElementById(id), sh=el.querySelector('.sheet');
  if(sh){sh.style.transition='';sh.style.transform='';}
  el.classList.add('on'); document.body.style.overflow='hidden';
  _ovStack.push(id);
  history.pushState({ov:_ovStack.length},'');
}
function closeOv(id){
  const idx=_ovStack.lastIndexOf(id);
  document.getElementById(id).classList.remove('on');
  if(idx===-1){ if(!_ovStack.length)document.body.style.overflow=''; return; }
  _ovStack.splice(idx,1);
  if(!_ovStack.length)document.body.style.overflow='';
  // 이 팝업을 위해 push했던 history 항목 1개 소비(뒤로가기 유발하되 popstate는 무시)
  _ignorePop=true; history.back();
}
window.addEventListener('popstate',()=>{
  if(_ignorePop){_ignorePop=false;return;}
  // 사용자가 뒤로가기 → 최상단 팝업만 닫기(앱은 유지)
  const id=_ovStack.pop();
  if(id){ document.getElementById(id).classList.remove('on'); if(!_ovStack.length)document.body.style.overflow=''; }
});
function initSheetDrag(){
  document.querySelectorAll('.overlay:not(.img-view-overlay):not(.centered) .sheet').forEach(sheet=>{
    let sy=0,cy=0,drag=false;
    sheet.addEventListener('touchstart',e=>{ if(sheet.scrollTop>2){drag=false;return;} sy=e.touches[0].clientY;cy=0;drag=true;sheet.style.transition='none'; },{passive:true});
    sheet.addEventListener('touchmove',e=>{ if(!drag)return; cy=e.touches[0].clientY-sy; sheet.style.transform=cy>0?('translateY('+cy+'px)'):''; },{passive:true});
    sheet.addEventListener('touchend',()=>{ if(!drag)return; drag=false; sheet.style.transition='transform .22s cubic-bezier(.2,.8,.2,1)';
      if(cy>110){ sheet.style.transform='translateY(100%)'; const ov=sheet.closest('.overlay'); setTimeout(()=>{ sheet.style.transform='';sheet.style.transition=''; if(ov)closeOv(ov.id); },170); }
      else{ sheet.style.transform=''; } cy=0; });
  });
}

/* ===== long-press action menu ===== */
let actionId=null, lpTimer=null, lpFired=false, lpX=0, lpY=0;
let calSX=0, calSY=0, calSwiped=false, calTrack=false, swInGrid=false;
const SWIPE_VIEWS=['calendar','tile','list']; // 좌우 스와이프로 순환할 뷰 순서(세그먼트 버튼 순서와 동일)
function swipeView(dir){ const i=SWIPE_VIEWS.indexOf(view), n=i+dir; if(i<0||n<0||n>=SWIPE_VIEWS.length)return; setView(SWIPE_VIEWS[n]); } // dir +1=다음(왼쪽 스와이프)·-1=이전. 양끝에선 무시(순환 안 함)
function openActions(id){

function closeActions(){ closeOv('actionOverlay'); }

function actDelete(){ const id=actionId; closeActions(); del(id); }

async function duplicateTicket(id){
  const t=tickets.find(x=>String(x.id)===String(id)); if(!t)return;
  const copy={vendor:t.vendor,name:t.name,date:t.date,time:t.time,qty:t.qty,price:t.price,memo:t.memo,
    seats:(t.seats||[]).map(s=>({...s})), transfer:{...(t.transfer||{done:false})}};
  try{
    if(mode==='cloud'&&sb){ const {data:row,error}=await sb.from('tickets').insert(ticketToDB(copy)).select().single(); if(error)throw error; tickets.push(rowToTicket(row)); }
    else{ tickets.push({id:'t'+Date.now()+Math.floor(Math.random()*1000),...copy}); saveLocal(); }
    dataVer++;
    render(); toast('복제되었어요 📋');
  }catch(e){ toast('복제 실패: '+(e.message||e)); }
}
function initLongPress(){
  const root=document.getElementById('viewRoot');
  root.addEventListener('pointerdown',e=>{
    const el=e.target.closest('[data-id]'); if(!el||e.target.closest('.cal-chip'))return;
    lpFired=false; lpX=e.clientX; lpY=e.clientY;
    clearTimeout(lpTimer);
    lpTimer=setTimeout(()=>{ lpFired=true; openActions(el.dataset.id); },460);
  });
  root.addEventListener('pointermove',e=>{ if(Math.hypot(e.clientX-lpX,e.clientY-lpY)>12)clearTimeout(lpTimer); });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>root.addEventListener(ev,()=>clearTimeout(lpTimer)));
  root.addEventListener('scroll',()=>clearTimeout(lpTimer),true);
  root.addEventListener('click',e=>{ if(lpFired||calSwiped){ e.preventDefault(); e.stopPropagation(); lpFired=false; calSwiped=false; } },true);
  root.addEventListener('contextmenu',e=>{ const el=e.target.closest('[data-id]'); if(el&&!e.target.closest('.cal-chip')){ e.preventDefault(); openActions(el.dataset.id); } });
}
// 손가락을 따라 화면이 실시간으로 움직이는 인터랙티브 뷰 전환(아이폰 페이지 전환처럼).
// - 캘린더 그리드 안: 좌우 드래그로 월 이동(손가락 따라 살짝 이동 후 릴리즈 시 확정)
// - 그 외 영역·타일·리스트: 인입 뷰를 실제로 렌더해 손가락 따라 슬라이드(임계 넘으면 전환, 아니면 되돌림)
// - #upnext는 #viewRoot 밖이라 여기 안 잡힘 → 다가오는 공연 가로 스크롤 유지
function initCalSwipe(){
  const root=document.getElementById('viewRoot');
  let sx=0, sy=0, active=false, decided=false, kind=null, dir=0, W=0, targetIdx=-1, pane=null;
  const EASE='transform .2s cubic-bezier(.2,.8,.2,1)';
  function clearPane(){ if(pane){ pane.remove(); pane=null; } }
  function resetRoot(anim){ root.style.transition=anim?EASE:'none'; root.style.transform='translateX(0)'; }
  root.addEventListener('touchstart',e=>{
    if(_viewAnim||e.touches.length>1)return;
    const t=e.touches[0]; sx=t.clientX; sy=t.clientY; active=true; decided=false; kind=null; dir=0; calSwiped=false;
    W=root.offsetWidth||320;
  },{passive:true});
  root.addEventListener('touchmove',e=>{
    if(!active)return;
    const t=e.touches[0], dx=t.clientX-sx, dy=t.clientY-sy;
    if(!decided){
      if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
      if(Math.abs(dy)>=Math.abs(dx)){ active=false; return; } // 세로 제스처 → 스크롤에 양보
      decided=true; calSwiped=true;
      dir=dx<0?1:-1;
      const inGrid=view==='calendar'&&!!e.target.closest('.cal-grid');
      if(inGrid){ kind='month'; }
      else{
        targetIdx=SWIPE_VIEWS.indexOf(view)+dir;
        if(targetIdx<0||targetIdx>=SWIPE_VIEWS.length){ kind='edge'; }
        else{
          kind='view';
          pane=document.createElement('div'); pane.className='view-pane'; pane.style.position='absolute';
          pane.innerHTML=viewHTML(SWIPE_VIEWS[targetIdx]);
          root.parentNode.insertBefore(pane, root.nextSibling);
          pane.style.top=root.offsetTop+'px'; pane.style.left=root.offsetLeft+'px'; pane.style.width=root.offsetWidth+'px';
          pane.style.transition='none'; root.style.transition='none';
          pane.style.transform='translateX('+(dir>0?W:-W)+'px)';
        }
      }
    }
    if(kind==='view'){
      e.preventDefault();
      const dxc=dir>0?Math.max(-W,Math.min(0,dx)):Math.min(W,Math.max(0,dx)); // 방향 고정 + 한 화면 이내
      root.style.transform='translateX('+dxc+'px)';
      pane.style.transform='translateX('+((dir>0?W:-W)+dxc)+'px)';
    }else if(kind==='month'){
      e.preventDefault(); root.style.transform='translateX('+dx*0.45+'px)'; // 월 이동: 손가락 따라 감쇠 이동
    }else if(kind==='edge'){
      e.preventDefault(); root.style.transform='translateX('+dx*0.28+'px)'; // 양끝: 고무줄
    }
  },{passive:false});
  root.addEventListener('touchend',e=>{
    if(!active)return; active=false; if(!decided){ return; }
    const dx=e.changedTouches[0].clientX-sx, pass=Math.abs(dx)>W*0.22;
    if(kind==='view'){
      root.style.transition=EASE; pane.style.transition=EASE;
      if(pass){
        root.style.transform='translateX('+(dir>0?-W:W)+'px)'; pane.style.transform='translateX(0)';
        setTimeout(()=>{ // 전환 확정
          view=SWIPE_VIEWS[targetIdx]; localStorage.setItem(LS_VIEW,JSON.stringify(view));
          if(view==='calendar'){selectMode=false;selectedIds.clear();}
          resetRoot(false); render(); clearPane();
        },200);
      }else{ // 임계 미달 → 되돌림
        resetRoot(true); pane.style.transform='translateX('+(dir>0?W:-W)+'px)';
        setTimeout(clearPane,210);
      }
    }else if(kind==='month'){
      if(Math.abs(dx)>45){ resetRoot(false); calMove(dir); } // calMove가 render로 새 달 그림(transform 리셋됨)
      else{ resetRoot(true); setTimeout(()=>{root.style.transition='';},210); }
    }else if(kind==='edge'){ resetRoot(true); setTimeout(()=>{root.style.transition='';},210); }
  });
  root.addEventListener('touchcancel',()=>{ if(active){ active=false; if(kind==='view'){resetRoot(true);setTimeout(clearPane,210);}else resetRoot(true);} });
}
