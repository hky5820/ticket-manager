<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta id="metaTheme" name="theme-color" content="#f4f4f6">
<meta id="metaScheme" name="color-scheme" content="only light">
<title>티켓 보관함</title>
<script>
  // 첫 페인트 전에 테마 지정(깜빡임 방지)
  (function(){try{var s=localStorage.getItem('tm_theme')||'light';var d=s==='dark'||(s==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');var m=document.getElementById('metaTheme');if(m)m.content=d?'#0d0e12':'#f4f4f6';var cs=document.getElementById('metaScheme');if(cs)cs.content=d?'dark':'only light';}catch(e){}})();
</script>
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="티켓 보관함">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ===== 디자인 토큰: "티켓 패스" 언어 — 소프트 그레이 캔버스 + 흰 카드 + 블루 포인트 ===== */
  :root{
    /* 라이트 테마 선택 시 브라우저(안드로이드 크롬 등)의 '강제 다크 모드'가 페이지를 반전시키지 못하게 차단 */
    color-scheme:only light;
    --canvas:#f4f4f6; --page:#f4f4f6; --card:#ffffff; --chip:#ececef;
    --ink:#1a1c22; --ink-soft:#4c4e56; --ink-faint:#8e9096;
    --line:#e2e3e8; --line-soft:#ebebee;
    /* accent = 블루. 모든 CTA·활성·강조를 담당하는 단일 브랜드색 */
    --accent:#2E63F0; --accent-ink:#1b4fd6; --accent-soft:#e8eefe; --accent-bd:#2E63F0;
    --partial:#ec4899; --partial-soft:#fdeaf3; /* 일부 양도 구분색(핑크 — 파랑과 대비) */
    --danger:#c13515; --danger-ink:#b32505; --danger-soft:#fbeceb; --danger-bd:#f3ccc4;
    --ok:#008a05;
    /* warn = 인식 대기열 전용 */
    --warn:#a0761f; --warn-strong:#2f80ed; --warn-soft:#fbf3e0; --warn-bd:#ecdcb4; --warn-ink:#7a5a12;
    --cancel-mark:#b0b0b0;
    /* 다가오는 공연 카드색(블루 계열) */
    --coral:#2f80ed; --peach:#e4ecfb; --mint:#e0eef6; --cream:#eef4fd; --forest:#1b63d6; --yellow:#f4d35e; --mustard:#d9a441; --navy:#222222; --lilac:#e4ecfb; --lime:#e0eef6; --pink:#eef4fd; --magenta:#2f80ed;
    --shadow-sm:none;
    /* Airbnb 단일 섀도우 티어 — 카드를 은은히 띄운다 */
    --shadow:rgba(0,0,0,.04) 0 2px 6px 0,rgba(0,0,0,.09) 0 4px 12px -4px;
    --shadow-lg:0 16px 40px -12px rgba(0,0,0,.22);
    --card-bd:var(--line-soft);
    --card-sh:var(--shadow);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;
    background:var(--page);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4;min-height:100vh;position:relative}
  .wrap{max-width:680px;margin:0 auto;padding:12px 12px calc(104px + env(safe-area-inset-bottom));overflow-x:clip;position:relative} /* 뷰 전환 슬라이드 시 가로 스크롤바 방지 + 드래그 pane 기준. 하단 여백=플로팅 독 높이 */
  #viewRoot{touch-action:pan-y} /* 세로는 브라우저 스크롤, 가로는 JS가 뷰 전환 드래그로 처리 */
  body.swiping #viewRoot,body.swiping .view-pane{will-change:transform;backface-visibility:hidden} /* 스와이프 동안만 GPU 레이어로 승격(평소엔 메모리 절약) */
  .view-pane{z-index:2;contain:content} /* 스와이프 중 인입되는 뷰(현재 뷰 위로 슬라이드) */
  body.swiping *{animation-play-state:paused!important} /* 슬라이드 중 애니메이션 정지 → 끊김 방지 */

  /* app header — 워드마크 + 우측 아이콘(추가·검색·동기화) */
  .apphd{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 10px}
  .wm{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;letter-spacing:-.3px;color:var(--ink)}
  .wm i{width:22px;height:22px;border-radius:7px;background:var(--ink);position:relative;flex:none}
  .wm i::after{content:"";position:absolute;left:4.5px;top:6.5px;width:13px;height:9px;border-radius:2.5px;background:var(--page);transform:rotate(-14deg)}
  .hd-ic{display:flex;gap:4px;align-items:center}
  .hicon{border:none;background:transparent;color:var(--ink-soft);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;padding:0}
  .hicon:active{background:var(--chip)}
  .hicon .dot{width:8px;height:8px;border-radius:99px;background:var(--ink-faint)}
  .hicon.on .dot{background:#34c759;box-shadow:0 0 6px rgba(52,199,89,.55)}
  .icon-btn{border:1px solid var(--line);background:var(--card);border-radius:999px;width:32px;height:32px;flex:0 0 auto;font-size:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
  .icon-btn.on{background:var(--danger-soft);border-color:var(--danger-bd);color:var(--danger-ink)}

  /* stats strip */
  .stats{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin:2px 2px 10px}
  .stats b{color:var(--ink);font-weight:800}
  .stats .sep{color:var(--ink-faint)}
  .stats .x b{color:var(--warn)}
  #pending{margin-bottom:6px}
  .pend-card{display:flex;align-items:center;gap:8px;background:var(--warn-soft);border:1px solid var(--warn-bd);border-radius:12px;padding:9px 12px;font-size:12.5px;color:var(--warn-ink);margin-bottom:8px}
  .pend-card b{color:var(--warn-ink);font-weight:800}
  .pend-card .pend-sub{color:var(--ink-faint)}
  .pend-card{justify-content:space-between}
  .pend-card.err{background:var(--danger-soft);border-color:var(--danger-bd);color:var(--danger)}
  .pend-actions{display:flex;gap:4px;margin-left:auto}
  .pend-actions button{border:none;background:transparent;color:inherit;font-size:15px;cursor:pointer;line-height:1;padding:2px 4px;opacity:.75}
  .pend-actions button:active{opacity:1}
  .pend-card.err .pend-actions button{color:var(--danger)}
  .pend-spin{width:14px;height:14px;border:2px solid var(--warn-bd);border-top-color:var(--warn-strong);border-radius:50%;animation:spin .8s linear infinite;flex:none;display:inline-block;vertical-align:middle;margin-right:5px}
  .pend-chev{margin-left:auto;font-size:18px;color:var(--ink-faint);font-weight:700}
  .pend-item{display:flex;gap:12px;padding:10px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;background:var(--card)}
  .pend-thumb{width:72px;height:72px;flex:none;object-fit:cover;border-radius:10px;cursor:pointer;background:var(--chip)}
  .pend-item-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;gap:8px}
  .pend-st{font-size:13px;font-weight:700;color:var(--warn-ink);display:flex;align-items:center}
  .pend-st.err{color:var(--danger)}
  .pend-item-btns{display:flex;gap:8px}
  .pend-item-btns .sb-btn{flex:1;text-align:center}

  /* search — 기본 숨김, 헤더 돋보기로 토글 */
  .search{position:relative;margin-bottom:12px;display:none}
  .search.on{display:block}
  .search input{width:100%;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:10px 12px 10px 36px;font-size:14px;color:var(--ink);outline:none}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-faint)}

  /* month grouping header */
  .month-head{display:flex;align-items:center;gap:8px;margin:16px 2px 9px;font-size:13px;font-weight:800;color:var(--ink-soft)}
  .grouped>.month-head:first-child,.list>.month-head:first-child{margin-top:2px}
  .month-head .mh-count{font-size:11px;font-weight:700;color:var(--ink-faint);background:var(--chip);border:1px solid var(--line);padding:1px 8px;border-radius:999px}
  .month-head .mh-line{flex:1;height:1px;background:var(--line)}

  /* tile grid — 위:언제 / 가운데:공연명 / 아래:등급·가격 */
  .tiles{display:grid;grid-template-columns:repeat(var(--tile-cols,2),1fr);gap:10px;align-items:stretch;transition:--tile-cols .1s}
  .tk{position:relative;display:flex;flex-direction:column;height:126px;overflow:hidden;background:var(--card);border:1px solid var(--card-bd);border-radius:18px;padding:10px 12px;box-shadow:var(--card-sh);cursor:pointer;transition:transform .15s;-webkit-touch-callout:none;user-select:none}
  .tk:active{transform:scale(.98)}
  .tk-top{display:flex;align-items:baseline;justify-content:space-between;gap:6px;height:18px;margin-bottom:3px}
  .tk-when{font-size:14.5px;font-weight:800;color:var(--ink);letter-spacing:-.3px;white-space:nowrap}
  .tk-when small{font-size:10px;font-weight:700;color:var(--ink-faint);margin-left:3px}
  .tk-when.nodate{color:var(--ink-faint)}
  .tk-vendor{display:flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;color:var(--ink-soft);white-space:nowrap;overflow:hidden;max-width:48%}
  .tk-vendor i{width:6px;height:6px;border-radius:99px;flex:none}
  .tk-vendor span{overflow:hidden;text-overflow:ellipsis}
  .tk-name{font-size:13px;font-weight:800;letter-spacing:-.3px;line-height:1.25;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:33px;margin-bottom:4px}
  .tk-seatline{font-size:11px;font-weight:700;color:var(--ink-soft);background:var(--chip);border-radius:6px;padding:2px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;align-self:flex-start;max-width:100%;height:19px;line-height:15px}
  /* 타일 하단 = 티켓 스텁: 절취선만 담백하게(노치는 카드 경계가 드러나 제거) */
  .tk-bottom{margin-top:auto;display:flex;align-items:baseline;justify-content:space-between;gap:6px;padding-top:8px;border-top:2px dashed var(--line-soft)}
  .tk-qty{font-size:11.5px;font-weight:800;color:var(--ink-soft);white-space:nowrap}
  .tk-price{font-size:13.5px;font-weight:800;color:var(--ink);white-space:nowrap}
  .tk-price.xf{color:var(--warn)}
  .tk-memo{display:none;font-size:11.5px;font-weight:600;color:var(--ink-soft);line-height:1.4;margin:2px 0 4px;word-break:keep-all;overflow:hidden;-webkit-line-clamp:3;-webkit-box-orient:vertical}
  /* 핀치 배율: 한 행 타일 수(1~4). 클수록 상세, 작을수록 촘촘 */
  body[data-cols="1"] .tk{height:auto;min-height:150px;padding:14px 16px}
  body[data-cols="1"] .tk-when{font-size:17px} body[data-cols="1"] .tk-name{font-size:16px;height:auto;-webkit-line-clamp:3}
  body[data-cols="1"] .tk-seatline{font-size:12.5px;height:auto;white-space:normal} body[data-cols="1"] .tk-price{font-size:15.5px}
  body[data-cols="1"] .tk-memo{display:-webkit-box} /* 1행1개일 때만 메모 노출 */
  body[data-cols="3"] .tk{height:118px;padding:8px 9px}
  body[data-cols="3"] .tk-name{font-size:12px;height:31px} body[data-cols="3"] .tk-when{font-size:13px}
  body[data-cols="3"] .tk-qty{flex:none} /* 매수는 유지 */
  body[data-cols="3"] .tk-price{min-width:0;overflow:hidden;text-overflow:ellipsis} /* 넘치는 가격은 말줄임표 */
  body[data-cols="4"] .tk{height:104px;padding:7px 8px;border-radius:12px}
  body[data-cols="4"] .tk-name{font-size:11px;height:15px;-webkit-line-clamp:1;margin-bottom:2px}
  body[data-cols="4"] .tk-when{font-size:12px} body[data-cols="4"] .tk-qty{font-size:11.5px;font-weight:800}
  body[data-cols="4"] .tk-vendor{font-size:8.5px}
  /* 작을수록 가격보다 좌석·매수가 중요 → 4개일 땐 좌석줄 살리고 가격 숨김 */
  body[data-cols="4"] .tk-seatline{display:block;font-size:9.5px;height:16px;line-height:13px;padding:1px 6px;margin-bottom:2px}
  body[data-cols="4"] .tk-price{display:none}
  body[data-cols="4"] .tk-bottom{padding-top:4px}
  /* 양도된 티켓: 은은한 앰버 틴트 */
  .tk.is-transfer{background:var(--warn-soft)}
  .tk.is-transfer .tk-when{color:#b45309}
  .tk.is-transfer .tk-name{color:var(--warn-ink)}
  /* 상태 표시: 우상단 대각선 리본 */
  .tk-ribbon{position:absolute;top:12px;right:-30px;width:110px;transform:rotate(40deg);background:var(--warn-strong);color:#fff;font-size:9px;font-weight:800;text-align:center;padding:3px 0;letter-spacing:.4px;pointer-events:none;z-index:1}
  .tk-ribbon.cancel{background:var(--cancel-mark)}
  .tk.is-cancel{background:var(--chip)}
  .tk.is-cancel .tk-name{color:var(--ink-soft)}
  .xtag.cancel{background:var(--cancel-mark)}
  .lrow.is-cancel{position:relative;background:var(--chip);padding-left:16px}
  .lrow.is-cancel::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:99px;background:var(--cancel-mark)}
  .lrow.is-cancel .nm{color:var(--ink-soft)}
  .tk-cam{font-size:12px;line-height:1}
  .badge{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:999px;color:#fff;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .xtag{font-size:9.5px;font-weight:800;color:#fff;background:var(--warn);padding:2px 6px;border-radius:999px;white-space:nowrap}
  .tk-share{border:none;background:var(--accent-soft);color:var(--accent-ink);border-radius:8px;width:26px;height:26px;font-size:13px;cursor:pointer;flex:none;line-height:1;padding:0}
  .tk-share:active{transform:scale(.9)}
  .lrow .tk-share{margin-left:auto}
  .chk{display:flex;align-items:center;gap:9px;background:var(--chip);border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:8px;cursor:pointer}
  .chk input{width:18px;height:18px;accent-color:var(--accent)}
  .share-prev{white-space:pre-wrap;font-size:12.5px;color:var(--ink-soft);background:var(--chip);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin:0 0 10px;line-height:1.6}
  .share-thumb{width:100%;max-height:200px;object-fit:contain;border-radius:11px;border:1px solid var(--line);margin-bottom:12px;background:var(--chip)}
  .tk-seat{display:inline-block;font-size:10px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);padding:2px 6px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58%}

  /* list */
  .list{display:flex;flex-direction:column;gap:9px}
  .lrow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--card-bd);border-radius:16px;padding:11px 13px;box-shadow:var(--card-sh);cursor:pointer;-webkit-touch-callout:none;user-select:none}
  .act-title{font-size:15px;font-weight:800;text-align:center;margin:2px 0 14px;color:var(--ink)}
  .act-btn{width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:15px;font-size:15px;font-weight:700;color:var(--ink);font-family:inherit;cursor:pointer;margin-bottom:9px;text-align:center}
  .act-btn:active{transform:scale(.98);background:var(--chip)}
  .act-btn.danger{color:var(--danger-ink);background:var(--danger-soft);border-color:var(--danger-bd)}
  .act-btn.cancel{background:var(--chip);color:var(--ink-soft);border-color:transparent;margin-top:2px}
  .lrow:active{background:var(--chip)}
  .ldate{flex:none;width:42px;text-align:center;line-height:1.1}
  .ldate b{display:block;font-size:15px;font-weight:800;color:var(--ink)}
  .ldate span{font-size:10.5px;color:var(--ink-faint);font-weight:700}
  .ldate.none b{font-size:16px;color:var(--ink-faint)}
  .lbody{flex:1;min-width:0}
  .lname{font-size:14px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:6px}
  .lname .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lname .ltags{flex:none;margin-left:auto;display:flex;gap:4px}
  .lseat{font-size:11px;font-weight:700;color:var(--ink-soft);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lsub{font-size:11.5px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lsub b{color:var(--ink);font-weight:800}
  .lsub .lxf{color:var(--warn);font-weight:800}
  .lrow.is-transfer{position:relative;background:var(--warn-soft);padding-left:16px}
  .lrow.is-transfer::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:99px;background:var(--warn-strong)}
  .lrow.is-transfer .nm{color:var(--warn-ink)}
  .ldot{flex:none;width:9px;height:9px;border-radius:99px}

  /* ===== 홈 뷰: 히어로 티켓 패스 + 다가오는 티켓 리스트 ===== */
  .hsec{display:flex;align-items:center;justify-content:space-between;font-size:13.5px;font-weight:700;color:var(--ink);margin:15px 2px 9px}
  .hsec em{font-style:normal;font-size:11px;color:var(--ink-faint);font-weight:600}
  .hxf{border:1px solid var(--line);background:var(--card);color:var(--ink-faint);border-radius:99px;padding:3.5px 11px;font-size:10.5px;font-weight:700;font-family:inherit;cursor:pointer}
  .hxf.on{color:var(--accent-ink);border-color:var(--accent-bd);background:var(--accent-soft)}
  .home>.hsec:first-child{margin-top:2px}
  /* 히어로 = 실물 티켓 패스(절취선·노치·바코드). 다크에서도 항상 흰 카드 */
  .pass{background:#fff;color:#191b23;border-radius:16px;border:1px solid var(--line-soft);box-shadow:0 10px 26px -16px rgba(0,0,0,.4);cursor:pointer;-webkit-touch-callout:none;user-select:none;transition:transform .15s}
  .pass:active{transform:scale(.99)}
  :root[data-theme="dark"] .pass{border-color:transparent;box-shadow:0 12px 28px -12px rgba(0,0,0,.7)}
  .p-top{padding:13px 15px 12px}
  .p-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
  .vch{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;color:#8b8d95}
  .vch i{width:9px;height:9px;border-radius:3px;flex:none}
  .ddy{font-size:11px;font-weight:800;background:#191b23;color:#fff;border-radius:7px;padding:2px 9px;white-space:nowrap}
  .p-name{font-size:18px;font-weight:800;letter-spacing:-.4px;line-height:1.25;word-break:keep-all}
  .p-meta{font-family:ui-monospace,"SF Mono",Consolas,monospace;font-size:11px;color:#8b8d95;margin-top:4px}
  .p-perf{height:0;border-top:2px dashed #e6e6ea;margin:0 10px;position:relative}
  .p-perf i{position:absolute;top:-8px;width:16px;height:16px;border-radius:50%;background:var(--page)}
  .p-perf i.l{left:-18px}.p-perf i.r{right:-18px}
  .p-bot{padding:11px 15px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .p-seat{font-size:12px;font-weight:600;color:#4c4e56;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .p-seat small{display:block;font-size:10.5px;color:#8b8d95;font-weight:600;margin-top:2px}
  .p-code{flex:none;text-align:right}
  .p-code .bc{display:inline-block;width:78px;height:22px;border-radius:2px;background:repeating-linear-gradient(90deg,#191b23 0 1.5px,transparent 1.5px 3.5px,#191b23 3.5px 6.5px,transparent 6.5px 8px,#191b23 8px 9px,transparent 9px 12px)}
  .p-code small{display:block;font-family:ui-monospace,Consolas,monospace;font-size:8.5px;color:#b0b2b9;letter-spacing:.06em;margin-top:3px}
  .pass.empty-pass{cursor:default;text-align:center}
  .pass.empty-pass .p-top{padding:26px 14px}
  /* 홈: 다가오는 티켓 리스트(한 카드 안에 행으로) */
  .hlist{background:var(--card);border:1px solid var(--card-bd);border-radius:16px;overflow:hidden;box-shadow:var(--card-sh)}
  .hrow{display:flex;align-items:center;gap:11px;padding:11px 13px;cursor:pointer;-webkit-touch-callout:none;user-select:none}
  .hrow+.hrow{border-top:1px solid var(--line-soft)}
  .hrow:active{background:var(--chip)}
  .hrow.is-transfer{opacity:.45;filter:grayscale(.7)}
  .h-d{flex:none;width:47px;line-height:1.25}
  .h-d b{display:block;font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums}
  .h-d span{font-size:9.5px;color:var(--ink-faint);font-weight:700}
  .h-b{flex:1;min-width:0}
  .h-n{display:flex;align-items:center;gap:6px;font-size:13.5px;font-weight:700;letter-spacing:-.2px}
  .h-n i{width:8px;height:8px;border-radius:3px;flex:none}
  .h-n span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .h-n .xtag{flex:none;font-style:normal}
  .h-s{font-size:10.5px;color:var(--ink-faint);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .h-r{flex:none;text-align:right}
  .h-r b{display:block;font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums}
  .h-r span{font-size:9.5px;color:var(--ink-faint);font-weight:600}
  .hnone{font-size:12px;color:var(--ink-faint);text-align:center;padding:18px 0;background:var(--card);border:1px dashed var(--line);border-radius:14px}
  .hall{width:100%;border:none;background:transparent;color:var(--ink-faint);font-size:12.5px;font-weight:700;font-family:inherit;padding:14px 0 2px;cursor:pointer}
  .hall:active{color:var(--ink)}
  /* 홈 히어로 캐러셀: 옆으로 넘기면 다음 공연 패스 */
  .pdeck{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;margin:0 -12px;padding:2px 12px 8px;touch-action:auto;scrollbar-width:none}
  .pdeck::-webkit-scrollbar{display:none}
  .pdeck .pass{flex:0 0 calc(100% - 30px);scroll-snap-align:center;scroll-snap-stop:always} /* 플릭해도 한 장씩만 */
  .pdeck .pass:only-child{flex-basis:100%}
  /* ===== 티켓 상세: 세로 종이 티켓(보딩패스)이 그대로 팝업 ===== */
  /* 스크림 = 완전 불투명 단색 — 노치 구멍색과 정확히 일치해 진짜 뚫린 것처럼 */
  #detailOverlay{background:#0e0f13}
  .overlay.centered .detail-sheet{background:transparent;border:none;box-shadow:none;padding:0;max-width:420px;overflow-y:auto}
  .tkt{position:relative;background:linear-gradient(168deg,#ffffff,#fbfbfc 55%,#f4f5f8);color:#191b23;border-radius:0;max-width:330px;margin:0 auto;overflow:hidden;box-shadow:0 30px 70px -18px rgba(0,0,0,.8)}
  /* 상단 = 예매처 색 스트립(각진 티켓 머리) */
  .tkt-band{height:6px}
  .tkt-name{font-size:21px;font-weight:800;letter-spacing:-.4px;line-height:1.22;word-break:keep-all;padding:16px 18px 0}
  /* 하단 푸터: 좌측 예매처(스와치+이름) · 우측 잉크 블랙 액션 버튼 */
  .tkt-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:2px 14px 15px 18px}
  .tkt-foot .vch{font-size:11.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tkt-ics{display:flex;gap:6px;flex:none}
  .tkt-ic{border:none;background:#191b23;color:#fff;width:32px;height:32px;border-radius:10px;display:grid;place-items:center;cursor:pointer;font-family:inherit;padding:0}
  .tkt-ic:active{background:#33353c}
  .tkt-when{display:flex;gap:22px;padding:14px 18px 16px}
  .tkt-when small{display:block;font-size:9px;color:#b0b2b9;font-weight:800;letter-spacing:.16em}
  .tkt-when b{display:block;font-family:ui-monospace,"SF Mono",Consolas,monospace;font-size:23px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;margin-top:4px;line-height:1.1}
  .tkt-when span{display:block;font-size:10.5px;color:#8b8d95;font-weight:600;margin-top:3px}
  /* 절취선: 대시 + 양옆 진짜 '펀치 구멍'(스크림색 원이 티켓 밖으로 반쯤 걸침) */
  .tkt-perf{position:relative;border-top:2px dashed #e3e4e9;margin:0 18px}
  .tkt-perf::before,.tkt-perf::after{content:"";position:absolute;top:-10px;width:20px;height:20px;border-radius:50%;background:#0e0f13} /* 스크림과 동일색 = 진짜 구멍 */
  .tkt-perf::before{left:-28px}
  .tkt-perf::after{right:-28px}
  .tkt-sec{padding:13px 18px 11px}
  .tkt-sec>small{display:block;font-size:9px;color:#b0b2b9;font-weight:800;letter-spacing:.16em;margin-bottom:7px}
  .tkt-seat{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:#33353c;padding:3.5px 0}
  .tkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px 14px;padding:2px 18px 15px}
  .dt-g small{display:block;font-size:9px;color:#b0b2b9;font-weight:800;letter-spacing:.16em;margin-bottom:3px}
  .dt-g b{font-size:14.5px;color:#191b23;font-weight:700;font-variant-numeric:tabular-nums}
  .dt-g b.gn{color:#0aa060}.dt-g b.rd{color:#d9453a}
  .tkt-xin{padding:0 18px 13px;margin-top:-6px;font-size:11px;font-weight:600;color:#8b8d95}
  /* 메모 스텁(절취선 아래) */
  .tkt-memo{padding:12px 18px 15px}
  .tkt-memo>small{display:block;font-size:9px;color:#b0b2b9;font-weight:800;letter-spacing:.16em;margin-bottom:5px}
  .tkt-memo .tm-tx{font-size:12.5px;color:#4c4e56;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .tkt-memo .tm-tx.none{color:#c3c5cc}
  .tkt-no{margin-top:9px;text-align:right;font-family:ui-monospace,Consolas,monospace;font-size:9px;color:#c3c5cc;letter-spacing:.1em}
  /* 종이 절단면(톱니) */
  .tkt-zig{height:11px;max-width:330px;margin:0 auto;background:conic-gradient(from -45deg at 50% 0,#f4f5f8 90deg,transparent 0) 0 0/14px 100% repeat-x;filter:drop-shadow(0 12px 20px rgba(0,0,0,.45))}
  .dt-stamp{position:absolute;top:50px;right:14px;transform:rotate(9deg);z-index:1;border:2.5px solid #2E63F0;color:#2E63F0;border-radius:9px;font-size:14px;font-weight:900;padding:3px 10px;opacity:.5;letter-spacing:.05em;pointer-events:none}
  /* ===== 수정 모달 = 티켓 종이(테마 무관 흰 종이 + 예매처색 스트립) ===== */
  #overlay .sheet{background:#fff;color:#191b23;border-top:none;
    --canvas:#ffffff;--page:#f6f6f8;--card:#ffffff;--chip:#f1f2f5;
    --ink:#1a1c22;--ink-soft:#4c4e56;--ink-faint:#8e9096;
    --line:#e2e3e8;--line-soft:#ebebee;
    --accent:#2E63F0;--accent-ink:#1b4fd6;--accent-soft:#e8eefe;--accent-bd:#2E63F0;
    --danger:#c13515;--danger-ink:#b32505;--danger-soft:#fbeceb;--danger-bd:#f3ccc4;
    --warn:#a0761f;--warn-strong:#2E63F0;--warn-soft:#fbf3e0;--warn-bd:#ecdcb4;--warn-ink:#7a5a12;
    --card-bd:#ebebee;--card-sh:none;--shadow:none;--shadow-sm:none}
  /* 티켓 팝업 형태: 각진 종이 + 예매처 스트립, 바텀시트보다 살짝 좁게 */
  .overlay.centered#overlay{align-items:center}
  #overlay .sheet{max-width:352px;border-radius:0;max-height:88vh;padding:0 18px 0;box-shadow:0 30px 70px -18px rgba(0,0,0,.7)}
  #overlay .tkt-band{margin:0 -18px 12px;height:6px}
  #overlay .sheet h2{font-size:19px;margin-top:2px}
  /* 취소·저장은 스크롤과 무관하게 항상 하단 고정(절취선 포함) */
  #overlay .save-row{position:sticky;bottom:0;z-index:2;background:#fff;margin:16px -18px 0;padding:12px 18px 14px;border-top:2px dashed #e3e4e9}

  /* calendar — 모눈 없는 라운드 칩 스타일 */
  .cal{background:var(--card);border:1px solid var(--card-bd);border-radius:20px;padding:16px 12px 14px;box-shadow:var(--card-sh)}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;padding:0 6px}
  .cal-head .mon{font-size:17px;font-weight:800;letter-spacing:-.3px}
  .cal-head button{border:none;background:var(--chip);border-radius:11px;width:32px;height:32px;font-size:16px;line-height:1;cursor:pointer;color:var(--ink-soft);font-weight:800}
  .cal-head button:active{background:var(--line-soft)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;touch-action:pan-y}
  .cal-wd{text-align:center;font-size:10.5px;font-weight:700;color:var(--ink-faint);padding:0 0 7px}
  .cal-wd.sun{color:#ef6a6a}.cal-wd.sat{color:#5b93f5}
  .cal-cell{position:relative;border:none;background:var(--chip);border-radius:13px;aspect-ratio:1/.92;min-height:0;padding:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
  .cal-cell.empty{background:transparent;cursor:default;padding:0} /* 전역 .empty(빈 상태, padding 52px)가 스며들어 첫 주가 터지는 것 차단 */
  .cal-cell:active{filter:brightness(.96)}
  .cal-day{font-size:13px;font-weight:700;color:var(--ink);line-height:1}
  .cal-cell.sun .cal-day{color:#ef6a6a}.cal-cell.sat .cal-day{color:#5b93f5}
  .cal-dots{display:flex;gap:3px;align-items:center;justify-content:center;flex-wrap:wrap;line-height:1}
  .cal-dots i{width:5.5px;height:5.5px;border-radius:50%;display:block}
  .cal-dots em{font-size:8.5px;font-style:normal;font-weight:800;color:var(--ink-soft)}
  /* 일정 있는 날: 은은한 포인트 틴트 */
  .cal-cell.has{background:var(--accent-soft)}
  .cal-cell.has .cal-day{color:var(--accent-ink);font-weight:800}
  /* 다가오는 공연(2주 이내): 진한 포인트 채움 + 은은한 숨쉬기 */
  .cal-cell.up{background:var(--accent);animation:calGlow 2.4s ease-in-out infinite}
  .cal-cell.up .cal-day{color:#fff;font-weight:800}
  .cal-cell.up .cal-dots i{background:#fff!important}
  .cal-cell.up .cal-dots em{color:rgba(255,255,255,.85)}
  @keyframes calGlow{50%{box-shadow:0 0 0 5px var(--accent-soft)}}
  @media (prefers-reduced-motion:reduce){.cal-cell.up{animation:none}}
  /* 오늘: 잉크 원 안의 숫자 */
  .cal-cell.today .cal-day{width:22px;height:22px;border-radius:50%;background:var(--ink);color:var(--canvas);display:grid;place-items:center}
  .cal-cell.up.today .cal-day{background:#fff;color:var(--accent-ink)}
  /* 선택한 날: 잉크 아웃라인 */
  .cal-cell.sel{box-shadow:0 0 0 2px var(--ink) inset}
  .cal-cell.up.sel{box-shadow:0 0 0 2px var(--ink) inset,0 0 0 5px var(--accent-soft)}
  .cal-daylist{margin-top:12px;border-top:1px solid var(--line-soft);padding-top:12px;display:flex;flex-direction:column;gap:8px}
  .cal-daylist .dl-title{font-size:13px;font-weight:700;color:var(--ink);margin:0 2px 2px}
  .cal-daylist .dl-title em{font-style:normal;font-size:11px;color:var(--ink-faint);font-weight:700;margin-left:4px}
  .cal-daylist .lrow{border:1px solid var(--line-soft);box-shadow:none}
  .cal-empty{font-size:12.5px;color:var(--ink-faint);text-align:center;padding:14px 0}
  .undated{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
  .undated .u-t{font-size:11.5px;color:var(--ink-faint);font-weight:700;margin:0 2px 6px}

  /* empty state */
  .empty{text-align:center;padding:52px 20px;color:var(--ink-faint)}
  .empty .ico{font-size:46px;margin-bottom:8px}
  .empty p{margin:3px 0;font-size:13.5px}
  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* util */
  .util{display:flex;gap:8px;justify-content:center;margin-top:20px;flex-wrap:wrap}
  .util button{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  /* ===== 플로팅 독 (가운데): 홈·캘린더·전체·설정. 라이트/다크 모두 다크 유리 ===== */
  .dock{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + env(safe-area-inset-bottom));z-index:41;display:flex;align-items:center;gap:2px;padding:8px 10px;border-radius:999px;background:rgba(24,25,31,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.09);box-shadow:0 14px 30px -12px rgba(0,0,0,.55)}
  .dock .dtab{border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;font-weight:600;width:56px;padding:2px 0;color:#83858e;cursor:pointer;font-family:inherit}
  .dock .dtab svg{stroke:currentColor}
  .dock .dtab.on{color:#fff}
  .dock .dtab:active{transform:scale(.94)}

  .select-bar{position:fixed;left:0;right:0;bottom:0;z-index:45;display:none;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:var(--card);border-top:1px solid var(--line);box-shadow:0 -8px 24px -12px rgba(0,0,0,.15)}
  .select-bar.on{display:flex}
  .select-bar #selectCount{font-size:13px;font-weight:800;color:var(--ink-soft);white-space:nowrap}
  .sb-actions{display:flex;gap:8px}
  .sb-btn{border:1px solid var(--line);background:var(--card);border-radius:11px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink-soft);transition:.12s}
  .sb-btn:active{transform:scale(.96);background:var(--chip)}
  .sb-btn.danger{background:var(--danger-soft);color:var(--danger-ink);border:1px solid var(--danger-bd);font-weight:800}
  .sb-btn.danger:active{background:#fee2e2}
  body.selecting .dock{display:none}
  .tk-check{position:absolute;top:10px;left:10px;width:20px;height:20px;border-radius:50%;border:2px solid var(--line);background:var(--card);z-index:2}
  .tk-check.on{background:var(--accent);border-color:var(--accent)}
  .tk-check.on::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
  .tk.sel-mode{position:relative;padding-left:34px}
  .lrow .tk-check{position:static;margin-right:2px}

  /* sheets / overlays */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.on{display:flex;animation:fade .18s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{position:relative;background:var(--card);width:100%;max-width:680px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;padding:6px 16px 24px;box-shadow:var(--shadow-lg);border-top:1px solid var(--line);animation:up .26s cubic-bezier(.2,.8,.2,1)}
  @keyframes up{from{transform:translateY(36px)}to{transform:none}}
  .grab{width:42px;height:5px;background:var(--line);border-radius:99px;margin:8px auto 8px}
  /* 중앙에 뜨는 '진짜 팝업'(아래서 올라오는 시트 대신) */
  .overlay.centered{align-items:center;padding:18px}
  .overlay.centered .sheet{width:100%;max-width:460px;border-radius:20px;max-height:86vh;animation:popIn .2s cubic-bezier(.2,.85,.25,1)}
  .overlay.centered .grab{display:none}
  @keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
  /* 금액 상세(실지출·양도차익) */
  .bd-link{cursor:pointer;display:inline-flex;align-items:center;padding:1px 7px;border-radius:999px;background:var(--accent-soft);transition:background .15s,transform .08s}
  .bd-link:active{transform:scale(.95)}
  .bd-link::after{content:"›";font-weight:800;opacity:.5;margin-left:3px}
  .bd-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:11px 6px;border-bottom:1px solid var(--line);cursor:pointer}
  .bd-row:active{background:var(--chip)}
  .bd-l{min-width:0}
  .bd-nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bd-calc{font-size:11px;color:var(--ink-soft);margin-top:3px;line-height:1.4}
  .bd-v{font-weight:800;font-size:14px;white-space:nowrap}
  .bd-total{display:flex;justify-content:space-between;align-items:center;padding:13px 6px 2px;margin-top:4px;border-top:2px solid var(--line);font-weight:800}
  .bd-total .bd-v{font-size:16px}
  .bd-pos{color:var(--accent)} .bd-neg{color:var(--warn)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .modal-head h2{margin:0}
  .modal-head-actions{display:flex;gap:6px}
  .img-view-overlay{background:rgba(10,12,20,.92)}
  .img-view-overlay .sheet{background:transparent;box-shadow:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;overflow:hidden}
  .img-view-stage{width:100%;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none}
  .img-view-overlay img{max-width:100%;max-height:80vh;border-radius:14px;box-shadow:var(--shadow-lg);transform-origin:center center;will-change:transform;user-select:none;-webkit-user-drag:none}
  .img-view-hint{color:rgba(255,255,255,.55);font-size:12px;margin-top:6px}
  .img-view-close{margin-top:16px;border:none;background:rgba(255,255,255,.15);color:#fff;border-radius:999px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .sheet h2{font-size:17px;font-weight:800;margin:4px 2px 14px;letter-spacing:-.4px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin:0 2px 5px}
  .field input,.field textarea{width:100%;border:1px solid var(--line);background:var(--chip);border-radius:11px;padding:11px 12px;font-size:15px;color:var(--ink);outline:none;font-family:inherit}
  .field input:focus,.field textarea:focus{border-color:var(--accent);background:var(--card);box-shadow:0 0 0 3px var(--accent-soft)}
  .field textarea{resize:vertical;min-height:52px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  /* vendor button */
  .vbtn{width:100%;border:1px solid var(--line);background:var(--chip);border-radius:11px;padding:11px 12px;font-size:15px;color:var(--ink);font-family:inherit;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
  .vbtn .vlabel{display:flex;align-items:center;gap:8px}
  .vbtn .vdot{width:12px;height:12px;border-radius:99px}
  .vbtn .chev{color:var(--ink-faint);font-size:13px}
  .vbtn.placeholder{color:var(--ink-faint)}
  /* seat editor */
  .seat-edit{border:1px solid var(--line);border-radius:12px;padding:34px 10px 10px;margin-bottom:8px;background:var(--chip);position:relative}
  .seat-edit .sgrid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seat-edit .sgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
  .seat-flags{position:absolute;top:8px;left:10px;display:flex;gap:7px}
  .seat-btn{font-size:11.5px;font-weight:800;border-radius:8px;height:26px;padding:0 12px;cursor:pointer;font-family:inherit;line-height:24px;border:1px solid}
  .seat-btn.cancel{color:var(--danger-ink);background:var(--danger-soft);border-color:var(--danger-bd)}
  .seat-btn.xfer{color:var(--warn-ink);background:var(--warn-soft);border-color:var(--warn-bd)}
  .cn-tag{font-size:10px;color:#fff;background:var(--danger);padding:1px 6px;border-radius:99px}
  .cn-tag.xf{background:var(--warn)}
  .seat-edit .rm{position:absolute;top:7px;right:8px;border:1px solid var(--danger-bd);background:var(--danger-soft);color:var(--danger-ink);border-radius:8px;height:24px;padding:0 10px;font-size:12px;font-weight:700;cursor:pointer;line-height:22px}
  .seat-edit .rm::before{content:"삭제 "}
  .seat-edit label{font-size:11px}
  .seat-edit input{padding:9px 10px;font-size:14px;background:var(--card)}
  .gwrap{display:flex;flex-direction:column}
  .gbtn{width:100%;border:1px solid var(--line);background:var(--card);border-radius:9px;padding:9px 10px;font-size:14px;color:var(--ink);font-family:inherit;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:700}
  .gbtn.placeholder{color:var(--ink-faint);font-weight:400}
  .gbtn .chev{color:var(--ink-faint);font-size:11px}
  .add-seat{width:100%;border:1px dashed var(--accent-bd);background:var(--accent-soft);color:var(--accent-ink);border-radius:11px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:4px}
  .cancel-note{margin-top:10px;border:1px solid var(--danger-bd);background:var(--danger-soft);border-radius:11px;padding:10px 12px}
  .cancel-note .cn-t{font-size:12px;font-weight:800;color:var(--danger-ink);margin-bottom:6px}
  .cancel-note .cn-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px;color:var(--ink-soft);padding:3px 0}
  .cancel-note .cn-row button{border:1px solid var(--line);background:var(--card);color:var(--accent-ink);border-radius:8px;padding:4px 10px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit}
  /* switch */
  .switch-row{display:flex;align-items:center;justify-content:space-between;background:var(--chip);border:1px solid var(--line);border-radius:11px;padding:11px 12px}
  .switch-row .sl{font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px}
  .switch{position:relative;display:inline-block;width:46px;height:27px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .switch .track{position:absolute;inset:0;background:var(--line);border-radius:99px;transition:.2s}
  .switch .track:before{content:"";position:absolute;width:21px;height:21px;left:3px;top:3px;background:#fff;border-radius:99px;transition:.2s;box-shadow:var(--shadow-sm)}
  .switch input:checked+.track{background:var(--warn-strong)}
  .switch input:checked+.track:before{transform:translateX(19px)}
  .transfer-box{margin-top:10px;padding:12px;border-radius:12px;background:var(--warn-soft);border:1px solid var(--warn-bd);display:none}
  .transfer-box.on{display:block}
  #seatXferList .sxl-t{font-size:12px;font-weight:800;color:var(--warn);margin-bottom:8px}
  .sxl-item{border:1px solid var(--warn-bd);border-radius:10px;padding:9px 10px;margin-bottom:8px;background:var(--card)}
  .sxl-item:last-child{margin-bottom:0}
  .sxl-item .sxl-seat{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:7px}
  .sxl-item .sgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .sxl-item label{font-size:11px}
  .sxl-item input{padding:9px 10px;font-size:14px;width:100%}
  /* save row */
  .save-row{display:flex;gap:9px;margin-top:16px}
  .save-row button{flex:1;border:none;border-radius:13px;padding:14px;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit}
  .save-row .cancel{background:var(--chip);color:var(--ink-soft);flex:0 0 32%}
  .save-row .save{background:var(--accent);color:#fff}
  .save-row .save:disabled{opacity:.6}

  /* vendor picker */
  .vlist{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;max-height:46vh;overflow-y:auto;padding:2px}
  .vitem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--chip);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.12s}
  .vitem:active{background:var(--accent-soft)}
  .vitem.sel{border-color:var(--accent);background:var(--accent-soft)}
  .vitem .vd{width:14px;height:14px;border-radius:99px;flex:none}
  .vitem .vn{flex:1;font-size:14.5px;font-weight:700}
  .vitem .vchk{color:var(--accent-ink);font-weight:800;font-size:15px}
  .vitem .vd{border:2px solid rgba(255,255,255,.6);cursor:pointer}
  .vcm-hint{font-size:12.5px;color:var(--ink-soft);margin:-4px 0 10px}
  .vcm-sec{font-size:11.5px;font-weight:800;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.03em;margin:14px 2px 6px}
  .vcm-sec:first-of-type{margin-top:0}
  #vcolorMgrOverlay .sheet{max-height:80vh;overflow:auto}
  #vcolorMgrList .vitem{cursor:pointer}
  #vcolorMgrList .vitem .vn{flex:1}
  .vcm-tag{font-size:10.5px;font-weight:800;color:var(--accent-ink);background:var(--accent-soft);padding:2px 8px;border-radius:99px;margin-right:6px}
  #vcolorMgrList .chev{color:var(--ink-faint);font-size:18px}
  .sw-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
  .sw-grid .sw{aspect-ratio:1;border-radius:11px;border:2px solid transparent;cursor:pointer}
  .sw-grid .sw.on{border-color:var(--ink);box-shadow:0 0 0 3px var(--accent-soft)}
  .color-custom{display:flex;align-items:center;justify-content:space-between;background:var(--chip);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:14px;font-weight:700;color:var(--ink-soft)}
  .color-custom input[type=color]{width:54px;height:36px;border:none;background:none;cursor:pointer;padding:0}
  .vitem .vdel:active{background:var(--danger-soft);color:var(--danger)}
  .vadd{display:flex;gap:8px;border-top:1px solid var(--line);padding-top:12px}
  .vadd input{flex:1;border:1px solid var(--line);background:var(--chip);border-radius:11px;padding:11px 12px;font-size:15px;outline:none;font-family:inherit}
  .vadd input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .vadd button{border:none;background:var(--accent);color:#fff;border-radius:11px;padding:0 18px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}

  .statusbox{border-radius:12px;padding:13px;font-size:13px;margin-bottom:12px;border:1px solid var(--line)}
  .statusbox.good{background:#ecfdf5;border-color:#a7f3d0;color:#047857}
  .statusbox.warn{background:var(--warn-soft);border-color:var(--warn-bd);color:var(--warn-ink)}
  .btn-ghost{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--card);color:var(--ink-soft);margin-top:8px}
  .btn-danger{width:100%;border:1px solid var(--danger-bd);border-radius:12px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;background:var(--danger-soft);color:var(--danger-ink);margin-top:8px;transition:.12s}
  .btn-danger:active{background:#fee2e2}
  .btn-primary{width:100%;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;background:var(--accent);color:#fff}

  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:60;background:#18181b;color:#fff;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;max-width:86vw;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(-6px)}

  /* ===== 다크모드 (data-theme='dark') — 시안 ②-R의 딥 다크 캔버스 ===== */
  :root[data-theme="dark"]{
    color-scheme:dark;
    --canvas:#0d0e12; --page:#0d0e12; --card:#17181d; --chip:#1f2026;
    --ink:#f2f2f0; --ink-soft:#c6c7cd; --ink-faint:#8e9096;
    --line:#26272d; --line-soft:#222329;
    /* accent = 블루(다크에서 약간 밝게) */
    --accent:#4e8cff; --accent-ink:#7dabff; --accent-soft:rgba(78,140,255,.16); --accent-bd:#4e8cff;
    --partial:#f472b6; --partial-soft:rgba(244,114,182,.16); /* 일부 양도 구분색(핑크) */
    --danger:#ff6f57; --danger-ink:#ff8f7c; --danger-soft:rgba(255,111,87,.14); --danger-bd:rgba(255,111,87,.4);
    --ok:#4caf50;
    --warn:#d9a441; --warn-strong:#4e9bff; --warn-soft:rgba(217,164,65,.12); --warn-bd:rgba(217,164,65,.3); --warn-ink:#e6bf6a;
    --cancel-mark:#8a8a8e;
    --coral:#4e9bff; --peach:#26344a; --mint:#22323f; --cream:#242f42; --forest:#7db4ff; --yellow:#4a4020; --mustard:#4a3a1c; --navy:#2a2a2d; --lilac:#26344a; --lime:#22323f; --pink:#242f42; --magenta:#4e9bff;
    --shadow-sm:none;
    --shadow:0 2px 12px -5px rgba(0,0,0,.5);
    --shadow-lg:0 16px 40px -12px rgba(0,0,0,.6);
    --card-bd:var(--line);
    --card-sh:none;
  }
  :root[data-theme="dark"] .tk.is-transfer .tk-when{color:var(--ink)}
  :root[data-theme="dark"] .lrow.is-transfer .nm,:root[data-theme="dark"] .tk.is-transfer .tk-name{color:var(--ink)}
  :root[data-theme="dark"] .cal-wd.sat,:root[data-theme="dark"] .cal-cell.sat .cal-day{color:#60a5fa}
  :root[data-theme="dark"] .cal-wd.sun,:root[data-theme="dark"] .cal-cell.sun .cal-day{color:#f87171}
  :root[data-theme="dark"] .badge{color:#111}
  :root[data-theme="dark"] .switch .track:before{background:#e4e4e7}
  :root[data-theme="dark"] .statusbox.good{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.3);color:#6ee7b7}
  :root[data-theme="dark"] .sb-btn.danger:active,:root[data-theme="dark"] .btn-danger:active{background:rgba(248,113,113,.2)}
  :root[data-theme="dark"] .toast{background:#f4f4f5;color:#18181b}

  /* 테마 세그먼트(설정) */
  .theme-seg{display:flex;gap:6px;background:var(--chip);border:1px solid var(--line);border-radius:50px;padding:4px;margin-bottom:10px}
  .theme-seg button{flex:1;border:none;background:transparent;border-radius:50px;padding:10px;font-size:13.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:inherit}
  .theme-seg button.on{background:var(--accent);color:var(--canvas);box-shadow:none}

  /* ============================================================
     Figma 언어 오버라이드 — 흑백 코어 · 알약 · 모노 라벨 · 파스텔 블록
     (구조만 여기서 재정의, 색은 위 토큰이 담당) ============================================================ */
  /* accent 위 글자는 canvas로 — 다크 반전 시 자동 대비 */
  .btn-primary,.save-row .save,.vadd button{color:var(--canvas)}
  .tk-ribbon{color:var(--canvas)}
  .tk-check.on::after{color:var(--canvas)}
  /* 양도/취소 표시 = 티켓 '스탬프' (아웃라인 뱃지). 양도표임을 바로 알면서 멋스럽게 */
  .xtag{border:1.2px solid var(--accent);background:var(--accent-soft);color:var(--accent-ink);font-size:9px;font-weight:800;padding:1.5px 6px;border-radius:6px;letter-spacing:0;white-space:nowrap}
  .xtag.cancel{border-color:var(--cancel-mark);background:var(--chip);color:var(--ink-faint)}
  .xtag.partial{border-color:var(--partial);border-style:dashed;background:var(--partial-soft);color:var(--partial)}
  .badge{color:var(--ink)}
  /* 타일: 중앙에 반투명 '스탬프' 워터마크(내용은 비치되 양도 티켓임을 표시) */
  .tk-ribbon{top:50%;left:50%;right:auto;bottom:auto;width:auto;transform:translate(-50%,-50%) rotate(-15deg);
    border:2.5px solid var(--accent);background:transparent;color:var(--accent);border-radius:9px;
    font-size:17px;font-weight:900;padding:3px 12px;letter-spacing:.04em;text-align:center;
    opacity:.26;box-shadow:none;pointer-events:none;white-space:nowrap}
  .tk-ribbon.cancel{border-color:var(--cancel-mark);color:var(--cancel-mark)}
  .tk-ribbon.partial{border-color:var(--partial);border-style:dashed;color:var(--partial);opacity:.42} /* 일부 양도=핑크 점선(파랑과 대비로 눈에 띔) */
  /* 굵기 절제(Airtable: bold-for-its-own-sake 지양, 500~600) */
  .tk-name,.lname,.tk-when,.tk-price,.cal-day,.cal-head .mon,.month-head,
  .stats b,.lsub b,.ldate b,.pend-st,.act-title,.sheet h2,.mtitle{font-weight:600}
  .btn-primary,.save-row button,.tk-qty,.tk-vendor{font-weight:500}
  /* 좌석줄: pill 배경 제거하고 담백한 캡션으로 */
  .tk-seatline{background:transparent;padding:0;height:auto;font-weight:400;color:var(--ink-soft);letter-spacing:0}
  /* 카드 라운드(Airbnb: 부드러운 14~16px) */
  .tk{border-radius:16px}
  .lrow{border-radius:14px}
  /* 양도 = 흰 카드 유지 + Rausch 리본·가격·스트라이프로만 표시(과한 색면 지양) */
  .tk.is-transfer{background:var(--card)}
  .tk.is-transfer .tk-when,.tk.is-transfer .tk-name{color:var(--ink)}
  .tk-price.xf,.lsub .lxf{color:var(--accent-ink)}
  .lrow.is-transfer{background:var(--card)}
  .lrow.is-transfer .nm{color:var(--ink)}
  /* 리스트 좌측 세로선 제거 */
  .lrow.is-transfer::before,.lrow.is-cancel::before{display:none}
  .lrow.is-transfer,.lrow.is-cancel{padding-left:13px}
  .tk.is-cancel{background:var(--chip)}
  /* 일부 양도 카드는 취소 좌석이 있어도 정상 흰색으로(일반 티켓처럼) */
  .tk.is-cancel:has(.tk-ribbon.partial){background:var(--card)}
  .lrow.is-cancel:has(.xtag.partial){background:var(--card)}
  /* 예매처 식별색: 점 → 라운드 사각 스와치 */
  .tk-vendor i{border-radius:3px;width:9px;height:9px}
  .ldot{border-radius:3px}
  /* 버튼 라운드(Airtable rounded-lg) */
  .btn-primary,.btn-ghost,.btn-danger,.save-row .save,.save-row .cancel,.act-btn{border-radius:12px}
  .sb-btn,.vadd button{border-radius:10px}
  /* 포커스: 링크블루 링 */
  .search input:focus,.field input:focus,.field textarea:focus,.vadd input:focus{border-color:var(--ink);box-shadow:0 0 0 3px var(--chip)}
  /* (캘린더 룩은 상단 'calendar' 블록에서 일원 관리) */
  /* 지난 공연은 한 톤 가라앉힘 → 살아있는 티켓이 도드라짐 */
  .tk.is-past,.lrow.is-past{opacity:.62}
  /* 완전 양도 티켓은 dim+흑백(넘겨서 안 가는 표). 정상 티켓의 컬러와 확실히 대비 */
  .tk.is-transfer,.lrow.is-transfer{opacity:.48;filter:grayscale(.75)}
  .tk.is-transfer .tk-ribbon{opacity:.6}
  /* 전체 뷰 = 티켓 문법: 리스트 행 좌측 날짜 스텁 + 세로 절취선 */
  .lrow{position:relative}
  .ldate{width:48px;padding:8px 0}
  .lrow::after{content:"";position:absolute;left:66px;top:8px;bottom:8px;border-left:2px dashed var(--line-soft);pointer-events:none}
  .lbody{padding-left:9px}
  .month-head{font-size:14px}
  .month-head .mh-count{background:var(--accent-soft);border:none;color:var(--accent-ink)}
  /* 검색창 라운드 */
  .search input{border-radius:10px}
  /* 모달: '양도' 관련 UI를 블루 테마로 통일(앰버 잔재 제거. 인식 대기열 앰버는 유지) */
  .seat-btn.xfer{color:var(--accent-ink);background:var(--accent-soft);border-color:var(--accent-bd)}
  .transfer-box{background:var(--accent-soft);border-color:var(--accent-bd)}
  .sxl-item{border-color:var(--accent-bd)}
  #seatXferList .sxl-t{color:var(--accent-ink)}
  .cn-tag.xf{background:var(--accent)}
  /* 입력창: 채움형 — 평소 테두리 없이 부드러운 칩, 포커스에만 포인트 링 */
  .field input,.field textarea,.vbtn,.gbtn,.vadd input,.seat-edit input{background:var(--chip);border:1.5px solid transparent;border-radius:13px;transition:border-color .15s,background .15s}
  .field input,.field textarea{padding:13.5px 15px;font-size:15px;font-weight:600}
  .field input::placeholder,.field textarea::placeholder{color:var(--ink-faint);font-weight:500}
  .field input:focus,.field textarea:focus,.vadd input:focus,.seat-edit input:focus{background:var(--card);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .field label{font-weight:700;color:var(--ink-faint);font-size:11.5px;letter-spacing:.04em;margin:0 4px 6px}
  .vbtn,.gbtn{padding:12.5px 14px;font-weight:600}
  .vbtn.placeholder,.gbtn.placeholder{color:var(--ink-faint);font-weight:500}
  .two{gap:11px}
  .sheet{border-radius:24px 24px 0 0;padding:6px 18px 26px}
  .sheet h2{font-size:18px;margin:6px 2px 16px}
  .save-row .save{border-radius:14px;box-shadow:0 8px 18px -8px rgba(46,99,240,.5)}
  .save-row .cancel{border-radius:14px}
  /* 모달 폴리시: 회색/색면 청크·촌스러운 버튼 정리 */
  .seat-edit{background:var(--card);border:1px solid var(--line-soft);border-radius:15px;padding:42px 13px 13px;box-shadow:var(--card-sh)}
  .seat-edit input{border-radius:11px;padding:10px 11px}
  .seat-btn{background:transparent;color:var(--ink-soft);font-weight:600}
  .seat-btn.cancel{background:transparent;color:var(--danger-ink);border-color:var(--danger-bd)}
  .seat-btn.xfer{background:transparent;color:var(--accent-ink);border-color:var(--accent-bd)}
  .seat-edit .rm{background:transparent;border:none;color:var(--ink-faint);font-weight:600;padding:0 4px}
  .seat-edit .rm:active{color:var(--danger-ink)}
  .transfer-box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .cancel-note{background:var(--card);border:1px solid var(--line);border-radius:14px}
  .add-seat{background:transparent;border:1px dashed var(--line);color:var(--accent-ink);font-weight:600}
  .btn-danger{background:transparent;border:1px solid var(--line);color:var(--danger-ink);font-weight:600}
  .btn-danger:active{background:var(--danger-soft)}
  .btn-ghost{font-weight:600}
  .switch-row{background:var(--card);border:1px solid var(--line)}
  /* 리스트 sub 라인: 좌측 수량·가격 / 우측 예매처(색점+이름, 우측 정렬) */

<script>
/* ===== storage ===== */
const LS_TICKETS='tm_tickets_v1', LS_VENDORS='tm_vendors_v1', LS_CFG='tm_cfg_v1', LS_VIEW='tm_view_v1', LS_GRADES='tm_grades_v1', LS_PLATFORMS='tm_platforms_v1';
const DEFAULT_VENDORS=['티켓링크','멜론티켓','세종문화회관','YES24','클립서비스','NOL 인터파크','샤롯데씨어터'];

const DEFAULT_PLATFORMS=['티켓베이','중고나라','당근마켓','번개장터','트위터/X','지인','기타'];
const PALETTE=['#c5b0f4','#f3c9b6','#c8e6cd','#efd4d4','#dceeb1','#f4ecd6','#b8d4e8','#e8c9e0','#d9d0f0','#cfe6c0'];
// 좌석 아이콘(이모지 대신 얇은 선 SVG)
const ICON_SEAT='<svg class="ic-seat" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" style="vertical-align:-1px;margin-right:4px;opacity:.7"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 1-2 2H5a2 2 0 0 1-2-2 2 2 0 0 0 0-4z"/><path d="M9 6v12" stroke-dasharray="2 2"/></svg>';
// 예매처 브랜드 색(파비콘에서 영감). 사용자가 컬러 피커로 덮어쓸 수 있음.
const VENDOR_COLORS={'티켓링크':'#E03E3E','멜론티켓':'#00A33F','세종문화회관':'#F9A825','YES24':'#3B82F6','샤롯데씨어터':'#E0457A','클립서비스':'#22C3E6','NOL 인터파크':'#2E63F0','LG아트센터':'#B00046'};
const LS_VCOLORS='tm_vcolors_v1';
const PICK_PALETTE=['#E03E3E','#FF6B6B','#FF4D8D','#F0629E','#B00046','#F9A825','#FF8C42','#FFC24B','#00A33F','#2FBF71','#12B886','#35C0F0','#38BDF8','#1565D8','#4B79FF','#5B6EF5','#8B5CF6','#E0457A','#7c8598','#495a70'];
const WD=['일','월','화','수','목','금','토'];
const BUILTIN_CFG={url:'https://ydqabdlwzseommowiupw.supabase.co',key:'sb_publishable_t5MlvS1Ea8ftD7IkfzqaiA_BCrzU80J'};

let tickets=load(LS_TICKETS,[]);
let pendings=[];
let _homeSig=null; // 홈 뷰 이전 렌더 시그니처(DOM 밖 보관) — 25초 새로고침마다 내용이 같으면 재렌더 안 함

let dataVer=0; // 로컬 티켓 변경(저장/삭제/복제/import)마다 증가. 조회 도중 로컬 변경이 나면 오래된 새로고침 스냅샷이 덮어쓰지 않도록 하는 가드용
let vendors=load(LS_VENDORS,DEFAULT_VENDORS.slice());
let grades=load(LS_GRADES,DEFAULT_GRADES.slice());
let platforms=load(LS_PLATFORMS,DEFAULT_PLATFORMS.slice());
let vcolors=load(LS_VCOLORS,{});
let gradeTargetBtn=null;
let view=load(LS_VIEW,'home');
if(view==='tile')view='list'; // 타일 뷰 폐지 → 전체=리스트 단일
if(!['home','calendar','list'].includes(view))view='home';
let editingId=null, formVendor='', formPlatform='', editCanceled=[];
let sb=null, mode='local', loading=false;
const _now=new Date();
let calY=_now.getFullYear(), calM=_now.getMonth(); // 0-based
let selDay=ymd(_now);

function load(k,def){try{const v=JSON.parse(localStorage.getItem(k));return v??def;}catch(e){return def;}}
function saveLocal(){localStorage.setItem(LS_TICKETS,JSON.stringify(tickets));localStorage.setItem(LS_VENDORS,JSON.stringify(vendors));}
function getCfg(){const c=load(LS_CFG,null);return (c&&c.url&&c.key)?c:{...BUILTIN_CFG};}
function colorFor(v){v=v||'';if(vcolors[v])return vcolors[v];if(VENDOR_COLORS[v])return VENDOR_COLORS[v];let h=0;for(let i=0;i<v.length;i++)h=(h*31+v.charCodeAt(i))>>>0;return PALETTE[h%PALETTE.length];}
function won(n){return (Number(n)||0).toLocaleString('ko-KR');}
function money(v){v=Math.round(v);return (v<0?'−₩':'₩')+won(Math.abs(v));} // 음수는 −₩ 로
function signMoney(v){v=Math.round(v);return (v>0?'+₩':v<0?'−₩':'₩')+won(Math.abs(v));} // 양도차익용: +/− 부호 표시
// 티켓 단위 회계: 매수(취소만 제외)·실지출(원가−취소환불−양도수령)·양도차익(양도수령−양도석 원가). 단가=price/qty
function ticketAcct(t){
  const qty=Number(t.qty)||0, price=Number(t.price)||0, unit=qty>0?price/qty:0;
  const seats=t.seats||[];
  const canceled=seats.filter(s=>s.x).length;
  let xfer, recv;
  if(t.transfer&&t.transfer.done){ recv=Number(t.transfer.price)||0; xfer=Math.max(0,qty-canceled); } // 전체 양도: 취소 뺀 나머지 전부 양도
  else{ const xs=seats.filter(s=>s.t); xfer=xs.length; recv=xs.reduce((a,s)=>a+(Number(s.tp)||0),0); } // 부분 양도: 좌석별 tp 합
  const kept=Math.max(0,qty-canceled-xfer); // 취소도 양도도 아닌 실제 관람 좌석
  return { held: qty-canceled, kept, spend: kept*unit, profit: recv - xfer*unit }; // 실지출=관람 좌석 원가만(양도수령·양도석 원가는 양도차익에서만 계산)
}
function ticketRecv(t){ if(t.transfer&&t.transfer.done)return Number(t.transfer.price)||0; return (t.seats||[]).filter(s=>s.t).reduce((a,s)=>a+(Number(s.tp)||0),0); } // 양도로 받은 총액(카드 표시용)
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
// inline onclick="f('...')" 처럼 'HTML속성 안의 JS 문자열'에 값을 넣을 때 사용. JS 이스케이프(\ ' 개행) 후 속성용 HTML 인코딩. esc()+replace(/'/)는 esc가 먼저 '를 &#39;로 바꿔 replace가 무효라 깨졌었음
function jsAttr(s){return String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r?\n/g,'\\n').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function numOrNull(v){return v===''||v==null?null:Number(v);}
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(d,t){ if(!d)return ''; const p=d.split('-').map(Number); if(p.length<3)return d+(t?' '+t:''); const dt=new Date(p[0],p[1]-1,p[2]); return `${p[1]}/${p[2]} (${WD[dt.getDay()]})`+(t?` ${t}`:''); }

/* ===== blob mapping (time + transfer packed into jsonb 'seats' column, no DB change) ===== */
function parseBlob(raw){
  if(Array.isArray(raw)) return {seats:raw,time:'',transfer:{done:false}};
  raw=(raw&&typeof raw==='object')?raw:{};
  return {seats:Array.isArray(raw.seats)?raw.seats:[], time:raw.time||'', transfer:raw.transfer||{done:false}, hasImg:!!raw.hasImg};
}
function rowToTicket(r){const b=parseBlob(r.seats);return {id:r.id,vendor:r.vendor,name:r.name,date:r.show_date||'',time:b.time,qty:r.qty,price:r.price,memo:r.memo,seats:b.seats,transfer:b.transfer,hasImg:b.hasImg};}
function ticketToDB(t){return {vendor:t.vendor,name:t.name,show_date:t.date||null,qty:numOrNull(t.qty),price:numOrNull(t.price),memo:t.memo||null,
  seats:{seats:t.seats||[],time:t.time||'',transfer:t.transfer||{done:false},hasImg:!!t.hasImg}};}

/* ===== backend ===== */
async function boot(){
  render();
  const cfg=getCfg();
  if(cfg.url&&cfg.key&&window.supabase){
    try{ sb=window.supabase.createClient(cfg.url,cfg.key); mode='cloud'; await refresh(); }
    catch(e){ console.error(e); mode='local'; tickets=load(LS_TICKETS,[]); render(); }
  }
  updateSyncPill();
}
async function refresh(){
  if(mode!=='cloud'||!sb)return;
  loading=true; render();
  const ver=dataVer; // 조회 시작 시점의 데이터 버전
  const {data,error}=await sb.from('tickets').select('id,vendor,name,show_date,qty,price,memo,seats,created_at').order('created_at',{ascending:true});
  loading=false;
  if(error){ toast('불러오기 실패: '+error.message); render(); return; }
  if(ver!==dataVer){ render(); return; } // 조회 도중 로컬에서 저장/삭제가 일어남 → 최신 로컬 상태를 오래된 스냅샷으로 되돌리지 않도록 적용 스킵
  tickets=(data||[]).map(rowToTicket);
  try{ const {data:pd}=await sb.from('pending_uploads').select('id,status,result').neq('status','done').order('created_at',{ascending:false}); pendings=pd||[]; }catch(e){}
  render();
}
function renderPending(){
  const el=document.getElementById('pending'); if(!el)return;
  if(!pendings.length){ el.innerHTML=''; return; }
  const pend=pendings.filter(p=>p.status==='pending').length;
  const errs=pendings.filter(p=>p.status==='error').length;
  let label;
  if(pend&&errs) label=`<span class="pend-spin"></span><span>AI 인식 중 <b>${pend}</b> · 실패 <b>${errs}</b> <span class="pend-sub">· 탭해서 관리</span></span>`;
  else if(pend)  label=`<span class="pend-spin"></span><span>AI가 인식 중… <b>${pend}건</b> <span class="pend-sub">· 탭해서 관리</span></span>`;
  else           label=`<span>⚠️ 인식 실패 <b>${errs}건</b> <span class="pend-sub">· 탭해서 관리</span></span>`;
  const html=`<div class="pend-card ${pend?'':'err'}" onclick="openPendManage()" style="cursor:pointer">${label}<span class="pend-chev">›</span></div>`;
  if(el.innerHTML===html)return; // 내용 그대로면 재렌더 안 함 → 25초 새로고침마다 인식중 스피너가 리셋되며 튀던 문제 방지
  el.innerHTML=html;
}
// 대기열 관리 팝업 — 썸네일, 보기, 교체, 삭제
let pendFull=[]; // {id,status,result,image_b64}
async function openPendManage(){
  if(!(mode==='cloud'&&sb))return;
  const body=document.getElementById('pendBody');
  body.innerHTML=`<div class="empty" style="padding:24px 0"><div class="spinner"></div></div>`;
  openOv('pendOverlay');
  try{
    const {data}=await sb.from('pending_uploads').select('id,status,result,image_b64').neq('status','done').order('created_at',{ascending:false});
    pendFull=data||[];
  }catch(e){ pendFull=[]; }
  renderPendList();
}
function renderPendList(){
  const body=document.getElementById('pendBody');
  if(!pendFull.length){ body.innerHTML=`<p class="hint" style="text-align:center;padding:16px 0">대기 중인 업로드가 없어요.</p>`; return; }
  body.innerHTML=pendFull.map(p=>{
    const st=p.status==='error'
      ? `<span class="pend-st err">⚠️ 인식 실패${p.result?' · '+esc(p.result):''}</span>`
      : `<span class="pend-st"><span class="pend-spin"></span>AI가 인식 중…</span>`;
    return `<div class="pend-item" data-id="${p.id}">
      <img class="pend-thumb" src="data:image/jpeg;base64,${p.image_b64}" onclick="viewPendImage('${p.id}')" alt="업로드 사진">
      <div class="pend-item-body">
        ${st}
        <div class="pend-item-btns">
          <button class="sb-btn" onclick="replacePendingPhoto('${p.id}')">🖼️ 교체</button>
          <button class="sb-btn danger" onclick="cancelPending('${p.id}')">🗑 삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function closePend(){ closeOv('pendOverlay'); }
function openImgView(b64){
  const im=document.getElementById('imgViewImg');
  im.src='data:image/jpeg;base64,'+b64;
  ivReset();
  im.onload=()=>{ ivReset(); };
  openOv('imgViewOverlay');
}
function viewPendImage(id){
  const p=pendFull.find(x=>String(x.id)===String(id)); if(!p||!p.image_b64)return;
  openImgView(p.image_b64);
}
function dismissPending(id){ cancelPending(id); }
function cancelPending(id){
  if(!(mode==='cloud'&&sb))return;
  if(!confirm('이 업로드 항목을 삭제할까요?'))return;
  sb.from('pending_uploads').delete().eq('id',id).then(()=>{
    pendings=pendings.filter(p=>String(p.id)!==String(id));
    pendFull=pendFull.filter(p=>String(p.id)!==String(id));
    renderPending(); renderPendList();
    if(!pendFull.length)closePend();
    toast('삭제됨');
  });
}
let pendReplaceId=null;
function replacePendingPhoto(id){
  if(!(mode==='cloud'&&sb))return;
  pendReplaceId=id;
  document.getElementById('pendReplaceFile').click();
}
async function pendReplaceFile(e){
  const file=(e.target.files||[])[0]; e.target.value='';
  const id=pendReplaceId; pendReplaceId=null;
  if(!file||!id||!(mode==='cloud'&&sb))return;
  try{
    const b64=await fileToB64(file);
    const {error}=await sb.from('pending_uploads').update({image_b64:b64,status:'pending',result:null}).eq('id',id);
    if(error)throw error;
    // 로컬 캐시도 갱신해 팝업 썸네일/상태 즉시 반영
    const p=pendFull.find(x=>String(x.id)===String(id));
    if(p){ p.image_b64=b64; p.status='pending'; p.result=null; }
    const pp=pendings.find(x=>String(x.id)===String(id)); if(pp){ pp.status='pending'; pp.result=null; }
    renderPending(); renderPendList();
    toast('사진 교체됨 · 다시 인식해요 🤖');
  }catch(err){ toast('교체 실패: '+(err.message||err)); }
}
function updateSyncPill(){
  const pill=document.getElementById('syncPill'); if(!pill)return;
  pill.classList.toggle('on',mode==='cloud');
  pill.title=mode==='cloud'?'동기화 중 (클라우드 자동 저장)':'오프라인 (이 기기에 임시 저장)';
}

/* ===== render ===== */
let selectMode=false, selectedIds=new Set();
function toggleSelectMode(){
  if(view==='calendar'||view==='home'){ toast('전체 탭에서 사용할 수 있어요'); return; }
  selectMode=!selectMode; selectedIds.clear(); render();
}
function cancelSelectMode(){ selectMode=false; selectedIds.clear(); render(); }
function toggleSelect(id){
  id=String(id);
  if(selectedIds.has(id))selectedIds.delete(id); else selectedIds.add(id);
  renderSelectBar();
  document.querySelectorAll(`[data-id="${id}"] .tk-check`).forEach(el=>el.classList.toggle('on',selectedIds.has(id)));
}
function selectAllToggle(){
  const ids=byDate(filtered()).map(t=>String(t.id));
  const allSel=ids.length&&ids.every(id=>selectedIds.has(id));
  if(allSel)selectedIds.clear(); else ids.forEach(id=>selectedIds.add(id));
  render();
}
function renderSelectBar(){
  const bar=document.getElementById('selectBar'); if(!bar)return;
  bar.classList.toggle('on',selectMode);
  document.body.classList.toggle('selecting',selectMode);
  if(!selectMode)return;
  document.getElementById('selectCount').textContent=`${selectedIds.size}개 선택`;
  const ids=byDate(filtered()).map(t=>String(t.id));
  const allSel=ids.length&&ids.every(id=>selectedIds.has(id));
  document.getElementById('selAllBtn').textContent=allSel?'전체해제':'전체선택';
}
async function bulkDelete(){
  if(!selectedIds.size){ toast('선택된 티켓이 없어요'); return; }
  const ids=[...selectedIds];
  if(!confirm(`선택한 ${ids.length}개 티켓을 삭제할까요?`))return;
  try{
    if(mode==='cloud'&&sb){ const {error}=await sb.from('tickets').delete().in('id',ids); if(error)throw error; }
    tickets=tickets.filter(t=>!selectedIds.has(String(t.id))); dataVer++;
    if(mode!=='cloud')saveLocal();
    selectMode=false; selectedIds.clear();
    render(); toast(`${ids.length}개 삭제되었어요`);
  }catch(e){ toast('삭제 실패: '+(e.message||e)); }
}
function setView(v){
  if(v===view)return; // 같은 뷰면 무시
  const dir=SWIPE_VIEWS.indexOf(v)>SWIPE_VIEWS.indexOf(view)?1:-1; // 오른쪽 뷰=+1(왼쪽으로 밀림)
  view=v;localStorage.setItem(LS_VIEW,JSON.stringify(v));if(v==='calendar'||v==='home'){selectMode=false;selectedIds.clear();}
  animateViewSwitch(dir);
}
// 아이폰 화면 전환처럼: 현재 뷰를 방향대로 밀어 내보내고, 새 뷰를 반대편에서 밀어 들어오게
let _viewAnim=false;
function animateViewSwitch(dir){
  const root=document.getElementById('viewRoot');
  if(!root||_viewAnim){ render(); return; } // 애니메이션 중 연속 전환이면 즉시 렌더
  _viewAnim=true;
  const d=Math.max(40,Math.round((root.offsetWidth||320)*0.22));
  root.style.transition='transform .14s ease-in, opacity .14s ease-in';
  root.style.transform='translateX('+(dir>0?-d:d)+'px)'; root.style.opacity='0';
  setTimeout(()=>{
    render(); // 새 뷰 내용으로 교체
    root.style.transition='none';
    root.style.transform='translateX('+(dir>0?d:-d)+'px)'; root.style.opacity='0';
    root.getBoundingClientRect(); // 강제 리플로우(시작 위치 확정)
    root.style.transition='transform .2s cubic-bezier(.2,.85,.25,1), opacity .2s ease-out';
    root.style.transform='translateX(0)'; root.style.opacity='1';
    setTimeout(()=>{ root.style.transition=''; root.style.transform=''; root.style.opacity=''; _viewAnim=false; },220);
  },140);
}
function filtered(){
  const q=(document.getElementById('search').value||'').trim().toLowerCase();
  let a=tickets.slice();
  if(q)a=a.filter(t=>(t.name||'').toLowerCase().includes(q)||(t.vendor||'').toLowerCase().includes(q));
  return a;
}
function byDate(a){return a.slice().sort((x,y)=>{const dx=x.date||'9999',dy=y.date||'9999';if(dx!==dy)return dx<dy?-1:1;return (x.time||'')<(y.time||'')?-1:1;});}

function render(){
  // dock 활성 표시('전체'는 타일·리스트 공용)
  document.querySelectorAll('#dock .dtab[data-v]').forEach(b=>{const v=b.dataset.v;b.classList.toggle('on',v===view||(v==='all'&&view==='list'));});
  // stats
  const acc=tickets.reduce((a,t)=>{const r=ticketAcct(t);a.held+=r.held;a.spend+=r.spend;a.profit+=r.profit;return a;},{held:0,spend:0,profit:0});
  const prof=Math.round(acc.profit);
  document.getElementById('stats').innerHTML=
    `<span>공연 <b>${tickets.length}</b></span><span class="sep">·</span>`+
    `<span>매수 <b>${acc.held}</b></span><span class="sep">·</span>`+
    `<span class="bd-link" onclick="openBreakdown('spend')">실지출 <b>${money(acc.spend)}</b></span>`+
    (prof?`<span class="sep">·</span><span class="x bd-link" onclick="openBreakdown('profit')">양도차익 <b>${signMoney(prof)}</b></span>`:'');

  renderPending();
  renderSelectBar();

  const root=document.getElementById('viewRoot');
  if(loading&&tickets.length===0){root.innerHTML=`<div class="empty"><div class="spinner"></div><p>불러오는 중…</p></div>`;_calSig=null;_homeSig=null;return;}
  // 홈·캘린더: 내용 그대로면 재렌더 안 함(25초 리셋 깜빡임 방지). root.innerHTML은 브라우저가 재직렬화해 원본과 안 맞으므로 시그니처로 비교
  if(view==='home'){ const html=viewHTML('home'); if(_homeSig!==html){root.innerHTML=html;_homeSig=html;} _calSig=null; return; }
  _homeSig=null;
  if(view==='calendar'){ const html=viewHTML('calendar'); if(_calSig!==html){root.innerHTML=html;_calSig=html;} return; }
  _calSig=null; // 캘린더가 아닌 뷰 → 시그니처 리셋
  root.innerHTML=viewHTML(view);
}
// 특정 뷰의 #viewRoot 내용 HTML(전역 view를 안 바꾸고 얻음 — 스와이프 드래그 pane 렌더용)
function viewHTML(v){
  if(v==='home') return homeHTML();
  if(v==='calendar') return renderCalendar();
  const a=byDate(filtered());
  if(a.length===0) return emptyHTML();
  const groups=groupByMonth(a);
  const head=g=>`<div class="month-head">${g.label}<span class="mh-count">${g.items.length}</span><span class="mh-line"></span></div>`;
  return `<div class="list">${groups.map(g=>head(g)+g.items.map(listRow).join('')).join('')}</div>`;
}
function emptyHTML(){const has=tickets.length>0;return `<div class="empty"><div class="ico">🎭</div><p><b>${has?'검색 결과가 없어요':'아직 등록된 티켓이 없어요'}</b></p><p>${has?'다른 키워드로 찾아보세요':'오른쪽 위 + 버튼으로 추가해 보세요'}</p></div>`;}

function ddayInfo(dateStr,today){
  const a=new Date(dateStr+'T00:00:00'), b=new Date(today+'T00:00:00');
  const diff=Math.round((a-b)/86400000);
  return {diff, label: diff===0?'오늘':diff>0?'D-'+diff:'지남', soon: diff>=0&&diff<=7};
}
// 티켓 일련번호 표기(패스·상세·공유카드 공용)
function ticketNo(t){const d=String(t.date||'').replace(/-/g,'')||'0000';const id=String(t.id).replace(/[^0-9a-zA-Z]/g,'').slice(-4).toUpperCase()||'0000';return `NO. ${d}-${id}`;}
// 티켓 패스 카드 HTML(홈 캐러셀용)

      <div class="p-code"><span class="bc"></span><small>${esc(ticketNo(t))}</small></div>

// 홈에서 양도완료 표 표시 여부(리스트 헤더의 칩으로 간편 토글)
let hideXfer=load('tm_hidexfer',false);
function toggleHideXfer(){ hideXfer=!hideXfer; localStorage.setItem('tm_hidexfer',JSON.stringify(hideXfer)); render(); }
// 홈 뷰: 히어로 = 다가오는 공연 패스 캐러셀(좌우 스와이프, 완전 양도 제외) + 나머지 리스트
function homeHTML(){
  const today=ymd(new Date());
  const fut=byDate(filtered()).filter(t=>t.date&&t.date>=today);
  const deckTs=fut.filter(t=>!(t.transfer&&t.transfer.done)); // 캐러셀 = 완전 양도 아닌 다가오는 공연들
  const hasX=fut.some(t=>t.transfer&&t.transfer.done);
  let rest=fut.slice(); // 리스트 = 다가오는 티켓 전부(히어로 포함 — 빠지는 항목 없이)
  if(hideXfer)rest=rest.filter(t=>!(t.transfer&&t.transfer.done)); // 토글 꺼짐 → 양도완료 표 숨김
  let hero;
  if(deckTs.length){
    hero=`<div class="pdeck">${deckTs.map(t=>passHTML(t,today)).join('')}</div>`;
  }else{
    hero=`<div class="pass empty-pass"><div class="p-top"><div style="font-size:26px">🎫</div><div class="p-name" style="font-size:14px;margin-top:6px">다가오는 공연이 없어요</div><div class="p-meta" style="font-family:inherit">오른쪽 위 ＋ 로 티켓을 추가해 보세요</div></div></div>`;
  }
  const rows=rest.map(t=>{

function groupByMonth(arr){
  const groups=[], map={};
  arr.forEach(t=>{
    let key,label;
    if(t.date){const p=t.date.split('-');key=p[0]+'-'+p[1];label=`${p[0]}년 ${Number(p[1])}월`;}
    else{key='none';label='날짜 미정';}
    if(!map[key]){map[key]={key,label,items:[]};groups.push(map[key]);}
    map[key].items.push(t);
  });
  return groups; // byDate 정렬(오름차순, 날짜없음 마지막) 순서 유지
}
function dayLabel(t){
  if(!t.date)return {main:'미정',sub:''};
  const p=t.date.split('-').map(Number);const dt=new Date(p[0],p[1]-1,p[2]);
  return {main:`${p[1]}/${p[2]}`, sub:`${WD[dt.getDay()]}${t.time?' '+esc(t.time):''}`};
}
function hasCancel(t){ return (t.seats||[]).some(s=>s.x); }
function hasSeatTransfer(t){ return (t.seats||[]).some(s=>s.t); } // 표(좌석)단위 부분 양도
// 자리 요약: 보유(취소·양도 안 된) 좌석만 표기 + 취소/양도 좌석 수. (스탠딩 등 자유텍스트면 N석)
function seatLine(t){
  const all=(t.seats||[]).filter(s=>s.grade||s.floor||s.zone||s.row||s.no);
  const ss=all.filter(s=>!s.x&&!s.t), canceled=all.filter(s=>s.x), xferred=all.filter(s=>s.t);
  if(!all.length)return '';
  const g=(ss.find(s=>s.grade)||{}).grade||'';
  const f=(ss.find(s=>s.floor)||{}).floor||'';
  const z=(ss.find(s=>s.zone)||{}).zone||'';
  const r=(ss.find(s=>s.row)||{}).row||'';
  const nos=ss.map(s=>s.no).filter(Boolean);
  let numStr='';
  if(nos.length&&nos.every(n=>/^\d+$/.test(n))) numStr=nos.join(',')+'번';
  else if(nos.length) numStr=ss.length+'석';
  const main=[g, f&&f+'층', z&&z+'구역', r&&r+'열', numStr].filter(Boolean).join(' ');
  return main+(canceled.length?` · 취소 ${canceled.length}`:'')+(xferred.length?` · 양도 ${xferred.length}`:'');
}

function renderCalendar(){
  const first=new Date(calY,calM,1), start=first.getDay(), days=new Date(calY,calM+1,0).getDate();
  const today=ymd(new Date());
  const _2w=new Date(); _2w.setDate(_2w.getDate()+14); const cut2w=ymd(_2w); // 2주 이내만 효과
  const byDay={};
  tickets.forEach(t=>{if(t.date){(byDay[t.date]=byDay[t.date]||[]).push(t);}});
  const monPrefix=`${calY}-${String(calM+1).padStart(2,'0')}`;
  const sel=(selDay&&selDay.startsWith(monPrefix))?selDay:null; // 선택은 표시 중인 달에서만
  let cells='';
  for(let i=0;i<start;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${monPrefix}-${String(d).padStart(2,'0')}`;
    const wd=(start+d-1)%7;
    const list=byDay[ds]||[];
    const upcoming=list.length&&ds>=today&&ds<=cut2w; // 2주 이내 공연만 애니메이션
    const dots=list.length?`<span class="cal-dots">${list.slice(0,3).map((t,di)=>`<i style="background:${colorFor(t.vendor)};animation-delay:${di*220}ms"></i>`).join('')}${list.length>3?`<em>+${list.length-3}</em>`:''}</span>`:'';
    cells+=`<div class="cal-cell ${wd===0?'sun':''} ${wd===6?'sat':''} ${ds===today?'today':''} ${list.length?'has':''} ${upcoming?'up':''} ${ds===sel?'sel':''}" onclick="calSel('${ds}')">
      <span class="cal-day">${d}</span>${dots}</div>`;
  }
  const wdh=WD.map((w,i)=>`<div class="cal-wd ${i===0?'sun':''} ${i===6?'sat':''}">${w}</div>`).join('');
  // 선택한 날짜의 내역을 캘린더 아래 인라인으로
  let dayHTML='';

    const list=byDate(byDay[sel]||[]);

    dayHTML=`<div class="cal-daylist"><div class="dl-title">${p[1]}월 ${p[2]}일 (${WD[dt.getDay()]})${list.length?` <em>${list.length}건</em>`:''}</div>${list.length?`<div class="list">${list.map(listRow).join('')}</div>`:`<div class="cal-empty">이 날은 일정이 없어요</div>`}</div>`;

  return `<div class="cal">

    <div class="cal-grid">${wdh}${cells}</div>
    ${dayHTML}
    ${undHTML}
  </div>`;
}

// 실지출/양도차익이 어떻게 계산됐는지 티켓별 내역 팝업
function openBreakdown(kind){
  const isSpend=kind==='spend';
  let total=0; const rows=[];
  tickets.forEach(t=>{
    const a=ticketAcct(t);
    const qty=Number(t.qty)||0, price=Number(t.price)||0, unit=qty>0?price/qty:0;
    const seats=t.seats||[];
    const canceled=seats.filter(s=>s.x).length;
    const recv=ticketRecv(t);
    const xfer=(t.transfer&&t.transfer.done)?Math.max(0,qty-canceled):seats.filter(s=>s.t).length;
    const dm=t.date?(()=>{const p=t.date.split('-');return p[1]+'/'+p[2];})():'';
    if(isSpend){
      if(a.kept<=0)return; // 관람 좌석이 없으면(전부 취소·양도) 실지출 0 → 제외
      total+=a.spend;
      const ex=[]; if(canceled)ex.push(`취소 ${canceled}`); if(xfer)ex.push(`양도 ${xfer}`);
      const calc=`관람 ${a.kept}석 × ₩${won(Math.round(unit))}`+(ex.length?` (제외: ${ex.join('·')})`:'');
      rows.push({t,dm,calc,val:a.spend,cls:'',vs:money(a.spend)});
    }else{
      if(!recv&&!xfer)return; // 양도 없는 티켓 제외
      total+=a.profit;
      rows.push({t,dm,calc:`양도수령 ₩${won(recv)} · 원가 ${xfer}석 ₩${won(Math.round(xfer*unit))}`,val:a.profit,
        cls:a.profit>0?'bd-pos':a.profit<0?'bd-neg':'',vs:signMoney(a.profit)});
    }
  });
  const body=rows.length?rows.map(r=>`<div class="bd-row" onclick="edit('${jsAttr(String(r.t.id))}')">
      <div class="bd-l"><div class="bd-nm">${esc(r.t.name||'(공연명 없음)')}</div><div class="bd-calc">${r.dm?r.dm+' · ':''}${r.calc}</div></div>
      <div class="bd-v ${r.cls}">${r.vs}</div></div>`).join('')
    :`<div class="empty" style="padding:22px 0"><p>${isSpend?'집계할 내역이 없어요':'양도 내역이 없어요'}</p></div>`;
  document.getElementById('bdTitle').textContent=isSpend?'실지출 상세':'양도차익 상세';
  document.getElementById('bdBody').innerHTML=body+
    `<div class="bd-total"><span>합계</span><span class="bd-v ${total<0?'bd-neg':isSpend?'':'bd-pos'}">${isSpend?money(total):signMoney(total)}</span></div>`;
  openOv('breakdownOverlay');
}

/* ===== 이미지 뷰어 확대/이동 (사진 영역만, 앱 전체 아님) ===== */
let _iv={scale:1,tx:0,ty:0};
function ivApply(){ const im=document.getElementById('imgViewImg'); im.style.transform=`translate(${_iv.tx}px,${_iv.ty}px) scale(${_iv.scale})`; }
function ivReset(){ _iv={scale:1,tx:0,ty:0}; ivApply(); }
function ivClamp(){
  const st=document.getElementById('imgViewStage'), im=document.getElementById('imgViewImg');
  if(!st||!im)return;
  // transform-origin이 center이므로, 스테이지보다 큰 만큼의 절반까지만 이동 허용(넘치면 가장자리, 작으면 중앙 0)
  const iw=im.clientWidth*_iv.scale, ih=im.clientHeight*_iv.scale;
  const maxX=Math.max(0,(iw-st.clientWidth)/2), maxY=Math.max(0,(ih-st.clientHeight)/2);
  _iv.tx=Math.max(-maxX,Math.min(maxX,_iv.tx));
  _iv.ty=Math.max(-maxY,Math.min(maxY,_iv.ty));
}
function initImgZoom(){
  const st=document.getElementById('imgViewStage'); if(!st)return;
  let pts=new Map(), startDist=0, startScale=1, lastX=0,lastY=0, panId=null, lastTap=0;
  const dist=()=>{ const a=[...pts.values()]; return Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y); };
  const mid=()=>{ const a=[...pts.values()]; return {x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2}; };
  st.addEventListener('touchstart',e=>{
    for(const t of e.changedTouches)pts.set(t.identifier,{x:t.clientX,y:t.clientY});
    if(pts.size===2){ startDist=dist(); startScale=_iv.scale; }
    else if(pts.size===1){ const t=e.touches[0]; lastX=t.clientX; lastY=t.clientY; panId=t.identifier;
      const now=Date.now();
      if(now-lastTap<300){ // 더블탭 토글
        if(_iv.scale>1){ ivReset(); }
        else { _iv.scale=2.5; ivClamp(); ivApply(); }
      }
      lastTap=now;
    }
  },{passive:false});
  st.addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){ if(pts.has(t.identifier))pts.set(t.identifier,{x:t.clientX,y:t.clientY}); }
    if(pts.size===2){ e.preventDefault();
      const s=startDist>0?Math.max(1,Math.min(5, startScale*(dist()/startDist))):_iv.scale; // 두 손가락이 같은 지점이면 startDist=0 → NaN(scale 사라짐) 방지
      _iv.scale=s; ivClamp(); ivApply();
    } else if(pts.size===1 && _iv.scale>1){ e.preventDefault();
      const t=[...e.changedTouches].find(x=>x.identifier===panId)||e.touches[0];
      _iv.tx+=t.clientX-lastX; _iv.ty+=t.clientY-lastY; lastX=t.clientX; lastY=t.clientY;
      ivClamp(); ivApply();
    }
  },{passive:false});
  const end=e=>{ for(const t of e.changedTouches)pts.delete(t.identifier);
    if(pts.size===0 && _iv.scale<=1){ ivReset(); }
    else if(pts.size===1){ const t=e.touches[0]; lastX=t.clientX; lastY=t.clientY; panId=t.identifier; }
  };
  st.addEventListener('touchend',end); st.addEventListener('touchcancel',end);
}
